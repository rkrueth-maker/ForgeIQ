<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
.launcher{display:grid;grid-template-columns:repeat(3,minmax(220px,1fr));gap:14px}.app-tile{background:#fff;border:1px solid var(--line);border-radius:10px;padding:18px;box-shadow:var(--shadow);cursor:pointer;text-align:left}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.form-grid label{font-size:.72rem;font-weight:800}.form-grid input,.form-grid textarea,.form-grid select{width:100%;padding:11px;border:1px solid var(--line);background:#fff;border-radius:7px}.full{grid-column:1/-1}.quote-lines{width:100%;border-collapse:collapse}.quote-lines th,.quote-lines td{padding:9px;border-bottom:1px solid var(--line)}.quote-lines input,.quote-lines select{width:100%;padding:8px;border:1px solid var(--line);border-radius:6px;background:#fff}.quote-total{font-family:Oswald,sans-serif;font-size:2rem;text-align:right}.capture-bar,.ai-actions{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:12px}.photo{position:relative;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}.photo img{width:100%;height:120px;object-fit:cover;display:block}.photo button{position:absolute;right:5px;top:5px;border:0;border-radius:50%;width:30px;height:30px;background:#7b1f1f;color:#fff}.voice-on{background:#7b1f1f!important}.toast{position:fixed;right:20px;bottom:20px;background:#092a21;color:#fff;padding:12px 16px;border-radius:8px;z-index:99}.hidden{display:none!important}.ai-card{border:1px solid #b7cbbf;background:#f4faf6;border-radius:10px;padding:16px;margin-top:14px}.ai-card h3{margin:0 0 6px}.ai-warning{border-left:4px solid #b47713;background:#fff7df;padding:10px 12px;margin-top:10px;font-size:.85rem}.ai-result{white-space:pre-wrap;background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px;margin-top:12px;line-height:1.45}.concept img{width:min(100%,760px);display:block;border:1px solid var(--line);border-radius:10px;margin-top:12px}.concept strong{display:block;margin-top:8px;color:#7b4a08}.toolbar{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:14px}@media(max-width:900px){.launcher,.form-grid{grid-template-columns:1fr}.full{grid-column:auto}.quote-lines{min-width:720px}.table-scroll{overflow:auto}.capture-bar .btn,.ai-actions .btn{flex:1 1 210px}}
</style>
</head>
<body>
<div class="app"><aside class="side"><div class="side-brand"><img src="assets/diamond-logo.svg" alt="Northern Lakes logo"><div><strong>Northern Lakes</strong><span>Full Business Office</span></div></div><nav id="appNav" aria-label="Application navigation"></nav><div class="side-footer">One connected office · Approval controls on<br><a href="index.html">← Public website</a></div></aside><div class="main"><header class="topbar"><button class="menu" id="menuBtn" aria-label="Open app navigation">☰</button><div class="search"><input id="globalSearch" aria-label="Search modules" placeholder="Search office modules"></div><div class="top-actions"><span class="chip">Northern Lakes</span><span class="chip">Approval Controls On</span><span class="avatar">NL</span></div></header><main class="content" id="view"></main></div></div>
<nav class="mobile-bottom"><button data-open="dashboard">Today</button><button data-open="quoteBuilder">Quote Builder</button><button data-open="jobs">Jobs</button><button data-open="approvals">Approvals</button></nav>
<input id="cameraInput" class="hidden" type="file" accept="image/*" capture="environment">
<input id="uploadInput" class="hidden" type="file" accept="image/*" multiple>
<script>
(function(){
'use strict';
var modules={dashboard:'Today',quoteBuilder:'Quote Builder',requests:'Requests',customers:'Customers',properties:'Properties',quotes:'Quotes & Estimates',workorders:'Work Orders',jobs:'Jobs & Projects',schedule:'Schedule',equipment:'Equipment',inventory:'Inventory',materials:'Materials',purchases:'Purchases',documents:'Documents',invoices:'Invoices',payments:'Payments',expenses:'Expenses',reports:'Reports',approvals:'Approvals',users:'Users & Roles',audit:'Audit Log',backups:'Backups'};
var groups=[['Business Apps',[['dashboard','Today'],['quoteBuilder','Quote Builder']]],['Work',[['requests','Requests'],['customers','Customers'],['properties','Properties'],['quotes','Quotes & Estimates'],['workorders','Work Orders'],['jobs','Jobs & Projects'],['schedule','Schedule']]],['Operations',[['equipment','Equipment'],['inventory','Inventory'],['materials','Materials'],['purchases','Purchases'],['documents','Documents']]],['Money',[['invoices','Invoices'],['payments','Payments'],['expenses','Expenses'],['reports','Reports']]],['Control',[['approvals','Approvals'],['users','Users & Roles'],['audit','Audit Log'],['backups','Backups']]]];
var data={requests:[['NLR-126','Sarah Anderson','Snow & Ice','New'],['NLR-125','Northland Dental','Commercial Services','Review']],customers:[['NLC-041','Sarah Anderson','(218) 555-0114','Active'],['NLC-040','Northland Dental','(218) 555-0177','Active']],properties:[['NLP-052','Anderson Residence','Residential','Seasonal'],['NLP-051','Northland Dental','Commercial','Active']],quotes:[['NLQ-244','Sarah Anderson','Seasonal snow service','$2,480','Draft'],['NLQ-243','Northland Dental','Commercial snow contract','$8,900','Owner review']],workorders:[['NLW-188','Anderson Residence','Driveway plowing','Scheduled']],jobs:[['NLJ-116','Northland Dental','Commercial snow','In progress']],schedule:[['Today 7:00 AM','Northland Dental','Snow & Ice','Confirmed']],equipment:[['EQ-01','Chevrolet Duramax','Plow Truck','Ready']],inventory:[['INV-001','Road Salt','18.5 ton','Ready']],materials:[['MAT-001','Road Salt','$168 / ton','Available']],purchases:[['PO-072','Northland Supply','Road Salt','$3,250','Owner review']],documents:[['DOC-281','Snow Contract - Northland.pdf','Contract','Approved']],invoices:[['NLI-193','Northland Dental','$4,450','Open']],payments:[['PAY-091','Pine Ridge HOA','$3,460','Posted']],expenses:[['EXP-121','Diesel Fuel','$486','Approved']],approvals:[['APR-039','Quote','Commercial snow contract','$8,900','Waiting']],users:[['USR-01','Owner','Owner','Active']],audit:[['Today 10:42','Owner','Approved quote','Success']],backups:[['BKP-031','Today 2:00 AM','Full beta data','Success']]};
var photos=[],recognition=null;
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]})}
function nav(){var h='';groups.forEach(function(g){h+='<div class="nav-group"><div class="nav-label">'+g[0]+'</div>';g[1].forEach(function(i){h+='<button class="nav-item" data-open="'+i[0]+'"><span>•</span>'+i[1]+'</button>'});h+='</div>'});document.getElementById('appNav').innerHTML=h;bind()}
function bind(){document.querySelectorAll('[data-open]').forEach(function(b){b.onclick=function(){openModule(b.getAttribute('data-open'))}})}
function pill(s){return '<span class="pill '+(/approved|paid|ready|active|success|posted|available|confirmed/i.test(s)?'good':/review|waiting|pending|reorder|open/i.test(s)?'warn':'blue')+'">'+esc(s)+'</span>'}
function openModule(k){document.querySelector('.app').classList.remove('side-open');document.querySelectorAll('.nav-item').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-open')===k)});location.hash='module='+k;if(k==='dashboard')return dashboard();if(k==='quoteBuilder')return quoteBuilder();if(k==='reports')return reports();return table(k)}
function dashboard(){document.getElementById('view').innerHTML='<div class="page-head"><div><div class="eyebrow">Owner control center</div><h1>Northern Lakes Business Office</h1><div class="muted">Quote Builder and every office module use this one connected workspace.</div></div><button class="btn" data-open="quoteBuilder">Create Quote</button></div><div class="metrics"><button class="metric" data-open="approvals"><span>Needs review</span><strong>2</strong><small>Owner decisions</small></button><button class="metric" data-open="jobs"><span>Active jobs</span><strong>4</strong><small>In progress</small></button><button class="metric" data-open="quotes"><span>Open quotes</span><strong>$12,355</strong><small>Draft and sent</small></button></div><section class="card"><div class="card-head"><h2>Installed Business Apps</h2></div><div class="launcher"><button class="app-tile" data-open="quoteBuilder"><h3>Quote Builder</h3><p>Take pictures, upload photos, dictate notes, build an AI-assisted draft and submit it for owner approval.</p></button><button class="app-tile" data-open="customers"><h3>Customers</h3><p>Customer and property records.</p></button><button class="app-tile" data-open="jobs"><h3>Jobs & Work Orders</h3><p>Schedule and track work.</p></button></div></section>';bind()}
function table(k){var rows=data[k]||[],body=rows.map(function(r){return '<tr>'+r.map(function(v,i){return '<td>'+(i===r.length-1?pill(v):esc(v))+'</td>'}).join('')+'<td><button class="btn secondary" onclick="officeToast(\'Opened record\')">Open</button></td></tr>'}).join('');document.getElementById('view').innerHTML='<div class="page-head"><div><div class="eyebrow">Northern Lakes Business Office</div><h1>'+modules[k]+'</h1></div><button class="btn" onclick="officeToast(\'New draft created\')">+ New</button></div><div class="table-wrap"><table class="data-table"><tbody>'+body+'</tbody></table></div>'}
function reports(){document.getElementById('view').innerHTML='<div class="page-head"><div><div class="eyebrow">Performance</div><h1>Reports</h1></div></div><div class="metrics"><div class="metric"><span>Revenue MTD</span><strong>$23,845</strong></div><div class="metric"><span>Gross margin</span><strong>48%</strong></div></div>'}
function quoteBuilder(){document.getElementById('view').innerHTML='<div class="page-head"><div><div class="eyebrow">Installed office module</div><h1>Quote Builder</h1><div class="muted">Camera, uploads, voice, pricing, AI drafting, completion concepts and approvals inside Northern Lakes Business Office.</div></div><button class="btn" id="saveQuote">Save Draft</button></div><section class="card"><div class="capture-bar"><button class="btn" id="takePhoto">📷 Take Picture</button><button class="btn secondary" id="uploadPhotos">🖼️ Upload Photos</button><button class="btn secondary" id="voiceScope">🎤 Start Talking</button><button class="btn secondary" id="voiceLine">🎤 Dictate Line Item</button></div><div id="voiceStatus" class="muted"></div><div class="photo-grid" id="photoGrid"></div><div class="ai-card"><h3>AI Quote Assistant</h3><p class="muted">Use the field photos and notes to prepare an owner-review draft and an optional proposed-completion concept.</p><div class="ai-actions"><button class="btn" id="buildAi">✨ Build Quote with AI</button><button class="btn secondary" id="createVisual">🖼️ Create Completion Visual</button></div><div class="ai-warning"><strong>Owner review required.</strong> AI cannot approve pricing, send a quote, schedule work, charge a customer, or treat a concept image as proof of completion.</div><div id="aiResult" class="ai-result hidden"></div><div id="concept" class="concept"></div></div></section><section class="card"><div class="form-grid"><div><label>Customer</label><select id="qCustomer"><option value="">Select customer</option><option value="NLC-041">Sarah Anderson</option><option value="NLC-040">Northland Dental</option><option value="NLC-039">Mark Jensen</option><option value="NLC-038">Pine Ridge HOA</option></select></div><div><label>Property</label><input id="qProperty" placeholder="Service address"></div><div><label>Quote title</label><input id="qTitle" value="Property service quote"></div><div><label>Expiration date</label><input id="qExpire" type="date"></div><div class="full"><label>Scope of work / field notes</label><textarea id="qScope" rows="6" placeholder="Type or use Start Talking"></textarea></div><div class="full"><label>Terms, exclusions and assumptions</label><textarea id="qTerms" rows="3" placeholder="Payment terms, exclusions and assumptions"></textarea></div></div></section><section class="card"><div class="card-head"><h2>Line Items</h2><button class="btn secondary" id="addLine">+ Add Item</button></div><div class="table-scroll"><table class="quote-lines"><thead><tr><th>Description</th><th>Qty</th><th>Unit</th><th>Unit Price</th><th>Markup %</th><th>Total</th><th></th></tr></thead><tbody id="lineBody"></tbody></table></div><div class="quote-total">Quote Total: <span id="quoteTotal">$0.00</span></div><div class="toolbar"><button class="btn secondary" id="previewQuote">Preview</button><button class="btn" id="requestApproval">Submit for Owner Approval</button></div></section>';
document.getElementById('takePhoto').onclick=function(){document.getElementById('cameraInput').click()};document.getElementById('uploadPhotos').onclick=function(){document.getElementById('uploadInput').click()};document.getElementById('voiceScope').onclick=function(){startVoice('qScope',this)};document.getElementById('voiceLine').onclick=function(){if(!document.querySelector('#lineBody tr'))addLine();startVoice(document.querySelector('#lineBody tr:last-child .desc'),this)};document.getElementById('buildAi').onclick=buildAiDraft;document.getElementById('createVisual').onclick=createCompletionVisual;document.getElementById('addLine').onclick=function(){addLine()};document.getElementById('saveQuote').onclick=function(){saveQuote()};document.getElementById('previewQuote').onclick=previewQuote;document.getElementById('requestApproval').onclick=function(){saveQuote('owner-review');officeToast('Quote added to owner approval queue')};addLine();restoreQuote();renderPhotos()}
function addLine(v){v=v||{};var tr=document.createElement('tr');tr.innerHTML='<td><input class="desc" placeholder="Service, material or equipment" value="'+esc(v.description||'')+'"></td><td><input class="qty" type="number" min="0" step="0.01" value="'+(v.qty||1)+'"></td><td><select class="unit"><option>each</option><option>hour</option><option>ton</option><option>yard</option><option>foot</option><option>job</option></select></td><td><input class="price" type="number" min="0" step="0.01" value="'+(v.price||0)+'"></td><td><input class="markup" type="number" step="0.01" value="'+(v.markup||0)+'"></td><td class="lineTotal">$0.00</td><td><button class="btn secondary remove">Remove</button></td>';document.getElementById('lineBody').appendChild(tr);if(v.unit)tr.querySelector('.unit').value=v.unit;['qty','price','markup'].forEach(function(c){tr.querySelector('.'+c).oninput=calc});tr.querySelector('.remove').onclick=function(){tr.remove();calc()};calc()}
function calc(){var total=0;document.querySelectorAll('#lineBody tr').forEach(function(r){var q=+r.querySelector('.qty').value||0,p=+r.querySelector('.price').value||0,m=+r.querySelector('.markup').value||0,t=q*p*(1+m/100);total+=t;r.querySelector('.lineTotal').textContent='$'+t.toFixed(2)});document.getElementById('quoteTotal').textContent='$'+total.toFixed(2)}
function collect(){var lines=[];document.querySelectorAll('#lineBody tr').forEach(function(r){lines.push({description:r.querySelector('.desc').value,qty:r.querySelector('.qty').value,unit:r.querySelector('.unit').value,price:r.querySelector('.price').value,markup:r.querySelector('.markup').value})});return{customer:val('qCustomer'),property:val('qProperty'),title:val('qTitle'),expires:val('qExpire'),scope:val('qScope'),terms:val('qTerms'),lines:lines,total:document.getElementById('quoteTotal').textContent,photos:photos,status:'draft',saved:new Date().toISOString()}}
function saveQuote(status){var q=collect();if(status)q.status=status;localStorage.setItem('nl_office_quote_draft',JSON.stringify(q));officeToast('Northern Lakes quote draft saved')}
function restoreQuote(){try{var q=JSON.parse(localStorage.getItem('nl_office_quote_draft')||'null');if(!q)return;var map={qCustomer:'customer',qProperty:'property',qTitle:'title',qExpire:'expires',qScope:'scope',qTerms:'terms'};Object.keys(map).forEach(function(id){var el=document.getElementById(id);if(el&&q[map[id]]!=null)el.value=q[map[id]]});document.getElementById('lineBody').innerHTML='';(q.lines||[]).forEach(addLine);photos=q.photos||[];calc()}catch(e){}}
function renderPhotos(){var g=document.getElementById('photoGrid');if(!g)return;g.innerHTML=photos.map(function(p,i){return '<div class="photo"><img src="'+p+'" alt="Quote photo '+(i+1)+'"><button data-remove-photo="'+i+'" aria-label="Remove photo">×</button></div>'}).join('');g.querySelectorAll('[data-remove-photo]').forEach(function(b){b.onclick=function(){photos.splice(+b.getAttribute('data-remove-photo'),1);renderPhotos()}})}
function addFiles(files){Array.from(files||[]).forEach(function(f){if(f.size>8*1024*1024)return officeToast('Photo is larger than 8 MB');var r=new FileReader();r.onload=function(){photos.push(r.result);renderPhotos()};r.readAsDataURL(f)})}
function startVoice(target,button){var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return officeToast('Voice dictation is not available in this browser');if(recognition)try{recognition.stop()}catch(e){}recognition=new SR();recognition.continuous=false;recognition.interimResults=false;recognition.lang='en-US';button.classList.add('voice-on');document.getElementById('voiceStatus').textContent='Listening…';recognition.onresult=function(e){var text=e.results[0][0].transcript,el=typeof target==='string'?document.getElementById(target):target;el.value=(el.value?el.value+' ':'')+text};recognition.onerror=function(){officeToast('Voice dictation stopped')};recognition.onend=function(){button.classList.remove('voice-on');document.getElementById('voiceStatus').textContent=''};recognition.start()}
function buildAiDraft(){var customer=val('qCustomer'),notes=val('qScope').trim();if(!customer)return officeToast('Select a customer first');if(!notes&&!photos.length)return officeToast('Add field notes or photos first');var lower=notes.toLowerCase(),suggestions=[];if(/snow|plow|driveway/.test(lower))suggestions.push({description:'Snow plowing service',qty:1,unit:'job',price:0});if(/salt|ice|deic/.test(lower))suggestions.push({description:'Deicing material and application',qty:1,unit:'job',price:0});if(/mow|lawn|grass/.test(lower))suggestions.push({description:'Lawn mowing and trimming',qty:1,unit:'job',price:0});if(/cleanup|debris|brush|leaves/.test(lower))suggestions.push({description:'Property cleanup and debris removal',qty:1,unit:'job',price:0});if(!suggestions.length)suggestions.push({description:'Field service — confirm exact scope and quantity',qty:1,unit:'job',price:0});var scope='Provide labor, equipment and materials required for the described property service. Work will be completed at the listed property after owner confirmation of measurements, access, quantities and final pricing.';if(!val('qScope').trim())document.getElementById('qScope').value=scope;var body=document.getElementById('lineBody');if(body&&body.children.length===1&&!body.querySelector('.desc').value)body.innerHTML='';suggestions.forEach(addLine);document.getElementById('qTerms').value=document.getElementById('qTerms').value||'Final quantities, concealed conditions, permits, disposal requirements and site access must be confirmed before approval. AI suggestions are draft-only and pricing requires owner review.';var result=document.getElementById('aiResult');result.classList.remove('hidden');result.textContent='OWNER-REVIEW DRAFT\n\nSuggested scope prepared from field notes and photos.\n\nMissing information:\n• Confirm measurements and quantities\n• Confirm material selections and colors\n• Confirm access, disposal and hidden conditions\n• Enter or verify final Price Book rates\n\nAI did not approve or send this quote.';calc();saveQuote();officeToast('AI-assisted quote draft prepared for owner review')}
function createCompletionVisual(){if(!photos.length)return officeToast('Take or upload a jobsite photo first');var instructions=window.prompt('Describe the completed result, including materials, colors, layout and what must remain unchanged.');if(!instructions)return;var host=document.getElementById('concept');host.innerHTML='<img src="'+photos[0]+'" alt="Original jobsite photo selected for completion concept"><strong>AI Concept Rendering — Proposed Appearance Only</strong><p class="muted">Original photo selected. Completion instructions saved for the production AI renderer: '+esc(instructions)+'</p><p class="muted">Not a construction guarantee or completion photograph. Owner approval is required before proposal use.</p>';localStorage.setItem('nl_completion_visual_request',JSON.stringify({photo:photos[0],instructions:instructions,created:new Date().toISOString(),status:'owner-review'}));officeToast('Completion visual request saved for owner review')}
function previewQuote(){var q=collect(),w=window.open('','_blank');if(!w)return officeToast('Allow pop-ups to preview');w.document.write('<title>Northern Lakes Quote Preview</title><style>body{font-family:Arial;padding:30px;max-width:800px;margin:auto}img{width:150px;height:110px;object-fit:cover;margin:5px}table{width:100%;border-collapse:collapse}td,th{padding:8px;border-bottom:1px solid #ccc;text-align:left}</style><h1>Northern Lakes Property Maintenance LLC</h1><h2>'+esc(q.title)+'</h2><p><strong>Scope:</strong><br>'+esc(q.scope).replace(/\n/g,'<br>')+'</p><table><tr><th>Description</th><th>Qty</th><th>Unit</th><th>Price</th></tr>'+q.lines.map(function(l){return '<tr><td>'+esc(l.description)+'</td><td>'+esc(l.qty)+'</td><td>'+esc(l.unit)+'</td><td>'+esc(l.price)+'</td></tr>'}).join('')+'</table><h3>'+esc(q.total)+'</h3><p>'+esc(q.terms).replace(/\n/g,'<br>')+'</p>'+q.photos.map(function(p){return '<img src="'+p+'">'}).join(''));w.document.close()}
function val(id){var e=document.getElementById(id);return e?e.value:''}
window.officeToast=function(msg){var n=document.createElement('div');n.className='toast';n.textContent=msg;document.body.appendChild(n);setTimeout(function(){n.remove()},2400)};
document.getElementById('cameraInput').onchange=function(){addFiles(this.files);this.value=''};document.getElementById('uploadInput').onchange=function(){addFiles(this.files);this.value=''};document.getElementById('menuBtn').onclick=function(){document.querySelector('.app').classList.toggle('side-open')};document.getElementById('globalSearch').oninput=function(){var q=this.value.toLowerCase();document.querySelectorAll('.nav-item').forEach(function(b){b.style.display=b.textContent.toLowerCase().indexOf(q)>-1?'flex':'none'})};nav();var start=(location.hash.split('module=')[1]||'dashboard');openModule(modules[start]?start:'dashboard')
})();
</script>
</body>
</html>
