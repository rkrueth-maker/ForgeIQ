<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Business Office | Northern Lakes</title><meta name="robots" content="noindex,nofollow,noarchive"><link rel="stylesheet" href="app-ui.css?v=office-self-contained-1"><style>.launcher{display:grid;grid-template-columns:repeat(3,minmax(220px,1fr));gap:14px}.app-tile{background:#fff;border:1px solid var(--line);border-radius:10px;padding:18px;box-shadow:var(--shadow);cursor:pointer;text-align:left}.app-tile h3{margin:0 0 6px;font-family:Oswald,sans-serif}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.form-grid label{font-size:.68rem;font-weight:800}.form-grid input,.form-grid textarea,.form-grid select{width:100%;padding:11px;border:1px solid var(--line);background:#fff}.quote-lines{width:100%;border-collapse:collapse}.quote-lines th,.quote-lines td{padding:9px;border-bottom:1px solid var(--line)}.quote-lines input{width:100%;padding:8px;border:1px solid var(--line)}.quote-total{font-family:Oswald,sans-serif;font-size:2rem;text-align:right}.toast{position:fixed;right:20px;bottom:20px;background:#092a21;color:#fff;padding:12px 16px;border-radius:8px;z-index:99}@media(max-width:900px){.launcher{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}}</style></head><body><div class="app"><aside class="side"><div class="side-brand"><img src="assets/diamond-logo.svg" alt="Northern Lakes logo"><div><strong>Northern Lakes</strong><span>Full Business Office</span></div></div><nav id="appNav" aria-label="Application navigation"></nav><div class="side-footer">Public beta access · Approval controls on<br><a href="index.html">← Public website</a></div></aside><div class="main"><header class="topbar"><button class="menu" id="menuBtn" aria-label="Open app navigation">☰</button><div class="search"><input id="globalSearch" aria-label="Search records" placeholder="Search customers, quotes, jobs and documents"></div><div class="top-actions"><span class="chip">Full Office</span><span class="chip">Approval Controls On</span><span class="avatar">NL</span></div></header><main class="content" id="view"></main></div></div><nav class="mobile-bottom"><button data-open="dashboard">Today</button><button data-open="requests">Requests</button><button data-open="jobs">Jobs</button><button data-open="quoteBuilder">Quote Builder</button></nav><script>
(function(){
var modules={dashboard:'Today',apps:'All Apps',quoteBuilder:'Quote Builder',requests:'Requests',customers:'Customers',properties:'Properties',quotes:'Quotes & Estimates',workorders:'Work Orders',jobs:'Jobs & Projects',schedule:'Schedule',equipment:'Equipment',inventory:'Inventory',materials:'Materials',purchases:'Purchases',documents:'Documents',invoices:'Invoices',payments:'Payments',expenses:'Expenses',reports:'Reports',approvals:'Approvals',users:'Users & Roles',audit:'Audit Log',backups:'Backups'};
var groups=[['Business Apps',[['apps','All Apps'],['quoteBuilder','Quote Builder'],['dashboard','Today']]],['Work',[['requests','Requests'],['customers','Customers'],['properties','Properties'],['quotes','Quotes & Estimates'],['workorders','Work Orders'],['jobs','Jobs & Projects'],['schedule','Schedule']]],['Operations',[['equipment','Equipment'],['inventory','Inventory'],['materials','Materials'],['purchases','Purchases'],['documents','Documents']]],['Money',[['invoices','Invoices'],['payments','Payments'],['expenses','Expenses'],['reports','Reports']]],['Control',[['approvals','Approvals'],['users','Users & Roles'],['audit','Audit Log'],['backups','Backups']]]];
var data={requests:[['NLR-126','Sarah Anderson','Snow & Ice','New'],['NLR-125','Northland Dental','Commercial Services','Review']],customers:[['NLC-041','Sarah Anderson','(218) 555-0114','Active'],['NLC-040','Northland Dental','(218) 555-0177','Active']],properties:[['NLP-052','Anderson Residence','Residential','Seasonal'],['NLP-051','Northland Dental','Commercial','Active']],quotes:[['NLQ-244','Sarah Anderson','Seasonal snow service','$2,480','Draft'],['NLQ-243','Northland Dental','Commercial snow contract','$8,900','Owner review']],workorders:[['NLW-188','Anderson Residence','Driveway plowing','Scheduled'],['NLW-187','Northland Dental','Parking lot service','In progress']],jobs:[['NLJ-116','Northland Dental','Commercial snow','In progress'],['NLJ-115','Pine Ridge HOA','Material delivery','Scheduled']],schedule:[['Today 7:00 AM','Northland Dental','Snow & Ice','Confirmed'],['Tomorrow 8:00 AM','Jensen Property','Equipment Drop','Scheduled']],equipment:[['EQ-01','Chevrolet Duramax','Plow Truck','Ready'],['EQ-03','Bobcat S650','Skid Steer','Rented']],inventory:[['INV-001','Road Salt','18.5 ton','Ready'],['INV-003','Brown Mulch','12 yd','Reorder']],materials:[['MAT-001','Road Salt','$168 / ton','Available'],['MAT-002','Class 5 Gravel','$42 / yard','Available']],purchases:[['PO-072','Northland Supply','Road Salt','$3,250','Owner review'],['PO-071','Fleet Farm','Shop supplies','$286','Approved']],documents:[['DOC-281','Snow Contract - Northland.pdf','Contract','Approved'],['DOC-280','Jensen Rental Inspection.pdf','Inspection','Draft']],invoices:[['NLI-193','Northland Dental','$4,450','Open'],['NLI-192','Pine Ridge HOA','$3,460','Paid']],payments:[['PAY-091','Pine Ridge HOA','$3,460','Posted'],['PAY-090','Sarah Anderson','$620','Posted']],expenses:[['EXP-121','Diesel Fuel','$486','Approved'],['EXP-120','Boss Plow Parts','$312','Approved']],approvals:[['APR-039','Quote','Commercial snow contract','$8,900','Waiting'],['APR-038','Purchase','Road salt order','$3,250','Waiting']],users:[['USR-01','Josh Lewins','Owner','Active'],['USR-02','Crystal Lewins','Administrator','Active']],audit:[['Today 10:42','Josh','Approved quote','Success'],['Today 9:24','Crystal','Created customer','Success']],backups:[['BKP-031','Today 2:00 AM','Full beta data','Success'],['BKP-030','Yesterday 2:00 AM','Full beta data','Success']]};
function nav(){var h='';groups.forEach(function(g){h+='<div class="nav-group"><div class="nav-label">'+g[0]+'</div>';g[1].forEach(function(i){h+='<button class="nav-item" data-open="'+i[0]+'"><span>•</span>'+i[1]+'</button>';});h+='</div>';});document.getElementById('appNav').innerHTML=h;bind();}
function bind(){document.querySelectorAll('[data-open]').forEach(function(b){b.onclick=function(){openModule(b.getAttribute('data-open'));};});}
function pill(s){return '<span class="pill '+(/approved|paid|ready|active|success|posted|available|confirmed/i.test(s)?'good':/review|waiting|pending|reorder|open/i.test(s)?'warn':'blue')+'">'+s+'</span>';}
function openModule(k){document.querySelector('.app').classList.remove('side-open');document.querySelectorAll('.nav-item').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-open')===k);});location.hash='module='+k;if(k==='dashboard')return dashboard();if(k==='apps')return apps();if(k==='quoteBuilder')return quoteBuilder();if(k==='reports')return reports();return table(k);}
function dashboard(){document.getElementById('view').innerHTML='<div class="page-head"><div><div class="eyebrow">Owner control center</div><h1>Full Business Office</h1><div class="muted">Every installed module is open from the left navigation.</div></div><button class="btn" data-open="quoteBuilder">Create Quote</button></div><div class="metrics"><button class="metric" data-open="approvals"><span>Needs review</span><strong>2</strong><small>Owner decisions</small></button><button class="metric" data-open="jobs"><span>Active jobs</span><strong>4</strong><small>In progress</small></button><button class="metric" data-open="quotes"><span>Open quotes</span><strong>$12,355</strong><small>Draft and sent</small></button><button class="metric" data-open="invoices"><span>Outstanding</span><strong>$5,425</strong><small>Invoice balance</small></button></div><div class="dashboard"><section class="card"><div class="card-head"><h2>Business Apps</h2><button class="btn secondary" data-open="apps">View all</button></div><div class="launcher"><button class="app-tile" data-open="quoteBuilder"><h3>Quote Builder</h3><p>Create scope, line items, pricing, terms and approval-ready drafts.</p></button><button class="app-tile" data-open="customers"><h3>Customer Management</h3><p>Customers, contacts and properties.</p></button><button class="app-tile" data-open="jobs"><h3>Jobs & Work Orders</h3><p>Schedule and track active work.</p></button></div></section><section class="card"><h2>Approval controls</h2><p>'+pill('External actions locked')+' '+pill('Owner approval on')+'</p><p class="muted">Customer sends, charges, payments and scheduling require owner approval.</p></section></div>';bind();}
function apps(){var cards='';Object.keys(modules).forEach(function(k){if(k!=='apps'&&k!=='dashboard')cards+='<button class="app-tile" data-open="'+k+'"><h3>'+modules[k]+'</h3><p>Open '+modules[k]+' workspace.</p></button>';});document.getElementById('view').innerHTML='<div class="page-head"><div><div class="eyebrow">Installed products and modules</div><h1>All Apps</h1><div class="muted">Click any app to open it.</div></div></div><div class="launcher">'+cards+'</div>';bind();}
function table(k){var rows=data[k]||[];var body=rows.map(function(r){return '<tr>'+r.map(function(v,i){return '<td>'+(i===r.length-1?pill(v):v)+'</td>';}).join('')+'<td><button class="btn secondary" onclick="window.officeToast(\'Opened '+k+' record\')">Open</button></td></tr>';}).join('');document.getElementById('view').innerHTML='<div class="page-head"><div><div class="eyebrow">Northern Lakes Business Office</div><h1>'+modules[k]+'</h1><div class="muted">Working beta workspace. External actions remain approval gated.</div></div><button class="btn" onclick="window.officeToast(\'New '+modules[k]+' draft created\')">+ New</button></div><div class="table-wrap"><table class="data-table"><tbody>'+body+'</tbody></table></div>';}
function reports(){document.getElementById('view').innerHTML='<div class="page-head"><div><div class="eyebrow">Performance</div><h1>Reports</h1></div></div><div class="metrics"><div class="metric"><span>Revenue MTD</span><strong>$23,845</strong><small>Up 12%</small></div><div class="metric"><span>Gross margin</span><strong>48%</strong><small>Target 45%</small></div><div class="metric"><span>Quote win rate</span><strong>64%</strong><small>Last 30 days</small></div></div>';}
function quoteBuilder(){document.getElementById('view').innerHTML='<div class="page-head"><div><div class="eyebrow">Standalone quoting app</div><h1>Quote Builder</h1><div class="muted">Create and save approval-ready quote drafts.</div></div><button class="btn" id="saveQuote">Save Draft</button></div><section class="card"><div class="form-grid"><div><label>Customer</label><input id="qCustomer" placeholder="Customer name"></div><div><label>Property</label><input id="qProperty" placeholder="Service address"></div><div><label>Quote title</label><input id="qTitle" value="Property service quote"></div><div><label>Expiration date</label><input id="qExpire" type="date"></div><div style="grid-column:1/-1"><label>Scope of work</label><textarea id="qScope" rows="4" placeholder="Describe the work"></textarea></div></div></section><section class="card"><div class="card-head"><h2>Line Items</h2><button class="btn secondary" id="addLine">+ Add Item</button></div><table class="quote-lines"><thead><tr><th>Description</th><th>Qty</th><th>Unit Price</th><th>Total</th><th></th></tr></thead><tbody id="lineBody"></tbody></table><div class="quote-total">Quote Total: <span id="quoteTotal">$0.00</span></div><div class="toolbar"><button class="btn secondary" id="previewQuote">Preview</button><button class="btn" id="requestApproval">Submit for Owner Approval</button></div></section>';document.getElementById('addLine').onclick=addLine;document.getElementById('saveQuote').onclick=saveQuote;document.getElementById('previewQuote').onclick=function(){window.officeToast('Quote preview opened');};document.getElementById('requestApproval').onclick=function(){saveQuote();window.officeToast('Quote submitted to owner approval queue');};addLine();}
function addLine(){var tr=document.createElement('tr');tr.innerHTML='<td><input class="desc" placeholder="Service or material"></td><td><input class="qty" type="number" min="0" step="0.01" value="1"></td><td><input class="price" type="number" min="0" step="0.01" value="0"></td><td class="lineTotal">$0.00</td><td><button class="btn secondary remove">Remove</button></td>';document.getElementById('lineBody').appendChild(tr);tr.querySelector('.qty').oninput=calc;tr.querySelector('.price').oninput=calc;tr.querySelector('.remove').onclick=function(){tr.remove();calc();};}
function calc(){var total=0;document.querySelectorAll('#lineBody tr').forEach(function(r){var q=parseFloat(r.querySelector('.qty').value)||0;var p=parseFloat(r.querySelector('.price').value)||0;var t=q*p;total+=t;r.querySelector('.lineTotal').textContent='$'+t.toFixed(2);});document.getElementById('quoteTotal').textContent='$'+total.toFixed(2);}
function saveQuote(){var quote={customer:document.getElementById('qCustomer').value,property:document.getElementById('qProperty').value,title:document.getElementById('qTitle').value,scope:document.getElementById('qScope').value,total:document.getElementById('quoteTotal').textContent,saved:new Date().toISOString()};localStorage.setItem('nl_quote_draft',JSON.stringify(quote));window.officeToast('Quote draft saved in this browser');}
window.officeToast=function(msg){var n=document.createElement('div');n.className='toast';n.textContent=msg;document.body.appendChild(n);setTimeout(function(){n.remove();},2200);};
document.getElementById('menuBtn').onclick=function(){document.querySelector('.app').classList.toggle('side-open');};document.getElementById('globalSearch').oninput=function(){var q=this.value.toLowerCase();document.querySelectorAll('.nav-item').forEach(function(b){b.style.display=b.textContent.toLowerCase().indexOf(q)>-1?'flex':'none';});};nav();openModule((location.hash.split('module=')[1]||'dashboard'));
})();
</script></body></html>
