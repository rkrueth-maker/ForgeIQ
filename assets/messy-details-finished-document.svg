<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="t d">
  <title id="t">Messy details to finished document visual</title>
  <desc id="d">Messy notes, screenshots, receipts, and photos are sorted into details and turned into a finished document, quote, and checklist.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.55" stop-color="#202124"/>
      <stop offset="1" stop-color="#3a2418"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#111827" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="720" rx="34" fill="url(#bg)"/>
  <rect x="38" y="38" width="1124" height="644" rx="30" fill="#fbf7ef"/>
  <text x="74" y="102" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="900" fill="#171717">Messy Details In → Finished Document Out</text>
  <text x="76" y="139" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#5f5b55">Photos, notes, screenshots, receipts, and rough messages become a clear usable output.</text>

  <g filter="url(#shadow)">
    <rect x="78" y="194" width="300" height="352" rx="24" fill="#fffefb" stroke="#ded2c2" stroke-width="3"/>
    <text x="108" y="242" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="900" fill="#171717">Messy inputs</text>
    <rect x="112" y="280" width="122" height="86" rx="12" fill="#f0e8dc" stroke="#d7bea7"/>
    <text x="130" y="314" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#5f5b55">Notes</text>
    <path d="M130 334h70M130 350h52" stroke="#9d4317" stroke-width="6" stroke-linecap="round"/>
    <rect x="220" y="330" width="120" height="96" rx="12" fill="#e7dac9" stroke="#d7bea7" transform="rotate(-7 280 378)"/>
    <text x="244" y="372" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#5f5b55" transform="rotate(-7 280 378)">Receipt</text>
    <path d="M244 392h64" stroke="#55785f" stroke-width="6" stroke-linecap="round" transform="rotate(-7 280 378)"/>
    <rect x="112" y="404" width="128" height="92" rx="12" fill="#111827"/>
    <rect x="130" y="424" width="92" height="52" rx="8" fill="#334155"/>
    <text x="132" y="520" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="800" fill="#5f5b55">Screenshots</text>
    <rect x="252" y="450" width="88" height="62" rx="12" fill="#c85f28" opacity="0.9"/>
    <circle cx="278" cy="480" r="13" fill="#fff0e5"/>
    <path d="M304 504l18-30 20 30z" fill="#fff0e5"/>
    <text x="252" y="535" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="800" fill="#5f5b55">Photos</text>
  </g>

  <path d="M408 365h78" stroke="#c85f28" stroke-width="12" stroke-linecap="round"/>
  <path d="M468 335l38 30-38 30" fill="none" stroke="#c85f28" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="520" y="194" width="250" height="352" rx="24" fill="#202124"/>
    <text x="552" y="242" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="900" fill="#fffefb">Sorted details</text>
    <rect x="552" y="284" width="185" height="48" rx="14" fill="#334155"/>
    <text x="578" y="315" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="800" fill="#fffefb">Facts</text>
    <rect x="552" y="352" width="185" height="48" rx="14" fill="#475569"/>
    <text x="578" y="383" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="800" fill="#fffefb">Missing info</text>
    <rect x="552" y="420" width="185" height="48" rx="14" fill="#334155"/>
    <text x="578" y="451" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="800" fill="#fffefb">Quote fields</text>
    <rect x="552" y="488" width="185" height="48" rx="14" fill="#475569"/>
    <text x="578" y="519" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="800" fill="#fffefb">Next action</text>
  </g>

  <path d="M800 365h78" stroke="#55785f" stroke-width="12" stroke-linecap="round"/>
  <path d="M860 335l38 30-38 30" fill="none" stroke="#55785f" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="914" y="194" width="208" height="352" rx="24" fill="#fffefb" stroke="#ded2c2" stroke-width="3"/>
    <text x="944" y="242" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="900" fill="#171717">Finished output</text>
    <rect x="946" y="280" width="144" height="206" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="968" y="312" width="100" height="12" rx="6" fill="#c85f28"/>
    <rect x="968" y="344" width="78" height="10" rx="5" fill="#94a3b8"/>
    <rect x="968" y="372" width="98" height="10" rx="5" fill="#94a3b8"/>
    <rect x="968" y="400" width="66" height="10" rx="5" fill="#94a3b8"/>
    <path d="M968 448l13 13 28-33" fill="none" stroke="#55785f" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="948" y="520" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="800" fill="#5f5b55">Document · Quote · Checklist</text>
  </g>

  <rect x="76" y="592" width="1048" height="54" rx="18" fill="#fff0e5" stroke="#f0c7a9"/>
  <text x="108" y="626" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="900" fill="#9d4317">Start with a Problem Snapshot: $79 intro / $99 normal</text>
  <text x="690" y="626" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#5f5b55">Owner review before customer-facing output.</text>
</svg>
