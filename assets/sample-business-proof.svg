<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="t d"><title id="t">Business cleanup tracker sample visual</title><desc id="d">A visual showing scattered quote messages becoming a clean quote-to-deposit tracker.</desc><rect width="1200" height="720" rx="34" fill="#111827"/><rect x="36" y="36" width="1128" height="648" rx="28" fill="#f8fafc"/><text x="70" y="96" font-family="Arial" font-size="34" font-weight="800" fill="#0f172a">Business Cleanup · Quote-to-deposit path</text><text x="70" y="132" font-family="Arial" font-size="18" fill="#475569">Hypothetical sample: texts, quotes, and follow-ups turned into one tracker.</text><rect x="80" y="185" width="460" height="360" rx="24" fill="#f1f5f9"/><text x="110" y="235" font-family="Arial" font-size="26" font-weight="800" fill="#0f172a">Before</text><rect x="120" y="285" width="340" height="45" rx="12" fill="#cbd5e1"/><rect x="150" y="350" width="310" height="45" rx="12" fill="#e2e8f0"/><rect x="120" y="415" width="280" height="45" rx="12" fill="#cbd5e1"/><text x="110" y="610" font-family="Arial" font-size="20" fill="#0f172a">Text threads · old quotes · no next action</text><rect x="610" y="185" width="510" height="360" rx="24" fill="#0f172a"/><text x="640" y="235" font-family="Arial" font-size="26" font-weight="800" fill="#fff">After tracker</text><g font-family="Arial" font-size="18" fill="#fff"><rect x="650" y="285" width="100" height="120" rx="14" fill="#334155"/><text x="678" y="350">New</text><rect x="770" y="285" width="100" height="120" rx="14" fill="#475569"/><text x="786" y="350">Quote</text><rect x="890" y="285" width="100" height="120" rx="14" fill="#334155"/><text x="904" y="350">Deposit</text><rect x="1010" y="285" width="80" height="120" rx="14" fill="#475569"/><text x="1023" y="350">Build</text></g><path d="M748 345h18M868 345h18M988 345h18" stroke="#e5e7eb" stroke-width="8" stroke-linecap="round"/><text x="640" y="610" font-family="Arial" font-size="20" fill="#0f172a">Output: service menu, quote fields, status path, follow-up scripts</text></svg>