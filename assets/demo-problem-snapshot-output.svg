<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680" role="img" aria-labelledby="t d"><title id="t">Problem Snapshot finished output</title><desc id="d">A cluttered garage before image with problem markers and a first action list.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fffaf3"/><stop offset="1" stop-color="#eef2ff"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#111827" flood-opacity=".18"/></filter></defs><rect width="1100" height="680" rx="28" fill="url(#bg)"/><rect x="34" y="26" width="1032" height="76" rx="18" fill="#111827"/><text x="64" y="72" font-family="Arial" font-size="28" font-weight="900" fill="#fff">Problem Snapshot — Sample Garage Bay</text><text x="820" y="72" font-family="Arial" font-size="14" font-weight="800" fill="#fed7aa">Sample output — not customer work</text><g filter="url(#s)"><rect x="48" y="130" width="610" height="390" rx="22" fill="#fff"/><rect x="78" y="162" width="550" height="250" rx="16" fill="#172033"/><rect x="105" y="300" width="90" height="72" rx="8" fill="#b45309"/><rect x="220" y="264" width="110" height="108" rx="8" fill="#92400e"/><rect x="350" y="302" width="90" height="70" rx="8" fill="#a16207"/><rect x="470" y="250" width="100" height="122" rx="10" fill="#475569"/><rect x="118" y="178" width="85" height="62" rx="8" fill="#64748b"/><rect x="248" y="190" width="125" height="52" rx="8" fill="#334155"/><line x1="104" y1="395" x2="590" y2="395" stroke="#ef4444" stroke-width="10" stroke-linecap="round"/><circle cx="160" cy="225" r="24" fill="#ef4444"/><text x="151" y="234" font-family="Arial" font-size="26" font-weight="900" fill="#fff">1</text><circle cx="500" cy="278" r="24" fill="#ef4444"/><text x="491" y="287" font-family="Arial" font-size="26" font-weight="900" fill="#fff">2</text><circle cx="290" cy="350" r="24" fill="#ef4444"/><text x="281" y="359" font-family="Arial" font-size="26" font-weight="900" fill="#fff">3</text><text x="88" y="455" font-family="Arial" font-size="18" font-weight="800" fill="#111827">Before photo review: clutter blocks work lane, tools and parts mixed, measurements missing.</text></g><g filter="url(#s)"><rect x="700" y="130" width="350" height="390" rx="22" fill="#fff"/><rect x="728" y="158" width="294" height="46" rx="12" fill="#fee2e2"/><text x="748" y="188" font-family="Arial" font-size="19" font-weight="900" fill="#991b1b">Top Problems</text><text x="736" y="244" font-family="Arial" font-size="18" font-weight="800" fill="#111827">1. Vehicle lane blocked</text><text x="736" y="286" font-family="Arial" font-size="18" font-weight="800" fill="#111827">2. No measured wall plan</text><text x="736" y="328" font-family="Arial" font-size="18" font-weight="800" fill="#111827">3. Storage decision too early</text><rect x="728" y="372" width="294" height="92" rx="14" fill="#f0fdf4" stroke="#86efac"/><text x="748" y="407" font-family="Arial" font-size="18" font-weight="900" fill="#14532d">First action:</text><text x="748" y="436" font-family="Arial" font-size="16" fill="#14532d">Tape one clear vehicle lane.</text></g><rect x="48" y="560" width="1002" height="70" rx="18" fill="#f0fdf4" stroke="#86efac"/><text x="72" y="603" font-family="Arial" font-size="20" font-weight="900" fill="#14532d">Rick Review Required / Owner Approval Required before customer-facing delivery</text></svg>