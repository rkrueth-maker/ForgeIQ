<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Version 5 package ladder proof visual</title>
  <desc id="desc">A sample proof card showing five package levels from 500 to 2500 dollars with review gates.</desc>
  <rect width="1200" height="760" fill="#0f172a"/>
  <rect x="50" y="50" width="1100" height="660" rx="32" fill="#fffaf4"/>
  <text x="90" y="120" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#111827">Version 5 Package Ladder</text>
  <text x="90" y="160" font-family="Arial, sans-serif" font-size="20" fill="#475569">Sample visual — hypothetical demo output</text>
  <g font-family="Arial, sans-serif">
    <rect x="90" y="220" width="180" height="280" rx="22" fill="#fee8d6" stroke="#d97706"/>
    <text x="125" y="280" font-size="36" font-weight="700" fill="#111827">$500</text>
    <text x="118" y="330" font-size="17" fill="#334155">Snapshot +</text>
    <text x="118" y="355" font-size="17" fill="#334155">starter layout</text>
    <text x="118" y="420" font-size="15" fill="#14532d">Review path</text>

    <rect x="300" y="200" width="180" height="300" rx="22" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="330" y="270" font-size="36" font-weight="700" fill="#111827">$1k</text>
    <text x="328" y="320" font-size="17" fill="#334155">Layout +</text>
    <text x="328" y="345" font-size="17" fill="#334155">packet</text>
    <text x="328" y="420" font-size="15" fill="#14532d">Review path</text>

    <rect x="510" y="180" width="180" height="320" rx="22" fill="#dcfce7" stroke="#16a34a"/>
    <text x="535" y="260" font-size="36" font-weight="700" fill="#111827">$1.5k</text>
    <text x="538" y="315" font-size="17" fill="#334155">Flow +</text>
    <text x="538" y="340" font-size="17" fill="#334155">cleanup</text>
    <text x="538" y="420" font-size="15" fill="#14532d">Review path</text>

    <rect x="720" y="160" width="180" height="340" rx="22" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="755" y="250" font-size="36" font-weight="700" fill="#111827">$2k</text>
    <text x="748" y="310" font-size="17" fill="#334155">Business +</text>
    <text x="748" y="335" font-size="17" fill="#334155">digital setup</text>
    <text x="748" y="420" font-size="15" fill="#14532d">Review path</text>

    <rect x="930" y="140" width="180" height="360" rx="22" fill="#fce7f3" stroke="#db2777"/>
    <text x="955" y="240" font-size="36" font-weight="700" fill="#111827">$2.5k</text>
    <text x="958" y="305" font-size="17" fill="#334155">Defined</text>
    <text x="958" y="330" font-size="17" fill="#334155">product build</text>
    <text x="958" y="420" font-size="15" fill="#14532d">Review path</text>
  </g>
  <rect x="90" y="565" width="1020" height="74" rx="18" fill="#ecfdf5" stroke="#86efac"/>
  <text x="125" y="610" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#14532d">Rick Review Required / Owner Approval Required before customer-facing action</text>
</svg>