<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000"><defs><filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".35"/></filter><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#020617"/><stop offset=".55" stop-color="#071426"/><stop offset="1" stop-color="#0f172a"/></linearGradient></defs><rect width="1600" height="1000" fill="url(#bg)"/><text x="800" y="62" text-anchor="middle" font-family="Arial" font-size="36" font-weight="900" fill="#f8fafc">Repeatable demo-product system</text><text x="800" y="105" text-anchor="middle" font-family="Arial" font-size="22" font-weight="800" fill="#93c5fd">Sample input becomes finished draft deliverables, then stops for approval.</text><text x="800" y="143" text-anchor="middle" font-family="Arial" font-size="17" font-weight="900" fill="#bfdbfe">Rick Review Required → Owner Approval Required → Then build.</text><g filter="url(#shadow)"><rect x="35" y="175" width="760" height="260" rx="22" fill="#071426" stroke="#1e3a8a"/><text x="62" y="210" font-family="Arial" font-size="20" font-weight="900" fill="#bae6fd">1) Problem Snapshot — finished product preview</text><rect x="62" y="238" width="310" height="170" rx="10" fill="#111827"/><rect x="82" y="258" width="270" height="120" rx="8" fill="#6b4f2a"/><rect x="105" y="318" width="70" height="45" fill="#92400e"/><rect x="190" y="300" width="82" height="63" fill="#7c2d12"/><rect x="285" y="316" width="45" height="47" fill="#b45309"/><text x="217" y="395" text-anchor="middle" font-family="Arial" font-size="12" font-weight="900" fill="#e0f2fe">Customer input photo</text><text x="392" y="326" font-family="Arial" font-size="34" fill="#cbd5e1">→</text><rect x="445" y="238" width="240" height="170" rx="10" fill="#f8fafc"/><text x="470" y="272" font-family="Arial" font-size="17" font-weight="900" fill="#0f172a">Problem Snapshot Report</text><line x1="470" y1="288" x2="655" y2="288" stroke="#