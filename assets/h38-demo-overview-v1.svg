t="55" rx="8" fill="#0b1220" stroke="#2563eb"/><text x="1497" y="278" text-anchor="middle" font-family="Arial" font-size="12" fill="#bfdbfe">Rick</text><text x="1497" y="294" text-anchor="middle" font-family="Arial" font-size="12" fill="#bfdbfe">Review</text><rect x="1460" y="330" width="75" height="55" rx="8" fill="#0b1220" stroke="#2563eb"/><text x="1497" y="353" text-anchor="middle" font-family="Arial" font-size="12" fill="#bfdbfe">Owner</text><text x="1497" y="369" text-anchor="middle" font-family="Arial" font-size="12" fill="#bfdbfe">Approval</text></g><g filter="url(#shadow)"><rect x="35" y="455" width="500" height="220" rx="22" fill="#071426" stroke="#1e3a8a"/><text x="62" y="490" font-family="Arial" font-size="19" font-weight="900" fill="#bae6fd">3) Shop Flow</text><rect x="76" y="520" width="180" height="110" fill="#f8fafc" rx="8"/><path d="M110 575 C160 525 225 535 235 595" stroke="#2563eb" stroke-width="5" fill="none"/><text x="310" y="574" font-family="Arial" font-size="22" fill="#cbd5e1">→</text><rect x="362" y="532" width="120" height="45" rx="8" fill="#0b1220" stroke="#2563eb"/><text x="422" y="560" text-anchor="middle" font-family="Arial" font-size="13" fill="#bfdbfe">Review gate</text></g><g filter="url(#shadow)"><rect x="555" y="455" width="500" height="220" rx="22" fill="#071426" stroke="#1e3a8a"/><text x="582" y="490" font-family="Arial" font-size="19" font-weight="900" fill="#bae6fd">4) Project Packet</text><rect x="620" y="520" width="210" height="110" rx="8" fill="#f8fafc"/><text x="650" y="550" font-family="Arial" font-size="16" font-weight="900" fill="#111827">Project Packet</text><text x="650" y="582" font-family="Arial" font-size="12" fill="#111827">Scope • Materials • Steps</text><text x="865" y="574" font-family="Arial" font-size="22" fill="#cbd5e1">→</text><rect x="930" y="532" width="90" height="45" rx="8" fill="#0b1220" stroke="#2563eb"/><text x="975" y="560" text-anchor="middle" font-family="Arial" font-size="13" fill="#bfdbfe">Approval</text></g><g filter="url(#shadow)"><rect x="1075" y="455" width="490" height="220" rx="22" fill="#071426" stroke="#1e3a8a"/><text x="1102" y="490" font-family="Arial" font-size="19" font-weight="900" fill="#bae6fd">5) Business Cleanup</text><rect x="1130" y="520" width="210" height="110" rx="8" fill="#f8fafc"/><text x="1160" y="550" font-family="Arial" font-size="16" font-weight="900" fill="#111827">Business Cleanup Report</text><text x="1160" y="582" font-family="Arial" font-size="12" fill="#111827">Processes • Pricing • Systems</text><rect x="1390" y="532" width="110" height="45" rx="8" fill="#0b1220" stroke="#2563eb"/><text x="1445" y="560" text-anchor="middle" font-family="Arial" font-size="13" fill="#bfdbfe">Draft only</text></g><g filter="url(#shadow)"><rect x="35" y="695" width="760" height="210" rx="22" fill="#071426" stroke="#1e3a8a"/><text x="62" y="730" font-family="Arial" font-size="19" font-weight="900" fill="#bae6fd">6) Cleanup Rescue — urgent problem solving</text><rect x="86" y="760" width="170" height="95" rx="8" fill="#f8fafc"/><text x="110" y="790" font-family="Arial" font-size="13" font-weight="900" fill="#111827">Messy files</text><text x="292" y="816" font-family="Arial" font-size="30" fill="#cbd5e1">→</text><rect x="370" y="750" width="245" height="115" rx="8" fill="#f8fafc"/><text x="398" y="785" font-family="Arial" font-size="16" font-weight="900" fill="#111827">Cleanup Rescue Plan</text><text x="398" y="817" font-family="Arial" font-size="12" fill="#111827">Immediate actions • Stabilize</text><rect x="660" y="770" width="92" height="62" rx="8" fill="#0b1220" stroke="#2563eb"/><text x="706" y="797" text-anchor="middle" font-family="Arial" font-size="13" fill="#bfdbfe">Owner</text><text x="706" y="815" text-anchor="middle" font-family="Arial" font-size="13" fill="#bfdbfe">Approval</text></g><g filter="url(#shadow)"><rect x="815" y="695" width="750" height="210" rx="22" fill="#071426" stroke="#1e3a8a"/><text x="842" y="730" font-family="Arial" font-size="19" font-weight="900" fill="#bae6fd">7) Workflow Opportunity — improvements and growth</text><rect x="872" y="760" width="190" height="95" rx="8" fill="#f8fafc"/><text x="900" y="790" font-family="Arial" font-size="13" font-weight="900" fill="#111827">Current workflow</text><text x="1090" y="816" font-family="Arial" font-size="30" fill="#cbd5e1">→</text><rect x="1160" y="750" width="265" height="115" rx="8" fill="#f8fafc"/><text x="1190" y="785" font-family="Arial" font-size="16" font-weight="900" fill="#111827">Workflow Opportunity Report</text><text x="1190" y="817" font-family="Arial" font-size="12" fill="#111827">Save time • Improve quality</text><rect x="1450" y="770" width="80" height="62" rx="8" fill="#0b1220" stroke="#2563eb"/><text x="1490" y="797" text-anchor="middle" font-family="Arial" font-size="13" fill="#bfdbfe">Rick</text><text x="1490" y="815" text-anchor="middle" font-family="Arial" font-size="13" fill="#bfdbfe">Review</text></g><rect x="300" y="930" width="1000" height="42" rx="14" fill="#071426" stroke="#1e3a8a"/><text x="800" y="958" text-anchor="middle" font-family="Arial" font-size="17" font-weight="900" fill="#bfdbfe">Built-in approval gates protect quality. Rick reviews. Owner approves. Then build.</text></svg>