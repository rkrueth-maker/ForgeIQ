<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">Shop CNC concept snapshot preview</title>
  <desc id="desc">A stylized Highway 38 shop and CNC concept packet showing bottlenecks, fixtures, robot tending, vendor questions, and ROI assumptions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#164e63"/>
    </linearGradient>
  </defs>
  <rect width="900" height="560" rx="32" fill="url(#bg)"/>
  <rect x="44" y="44" width="812" height="472" rx="26" fill="#f8fafc" opacity="0.97"/>
  <text x="76" y="96" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#0f172a">Shop / CNC Concept Snapshot</text>
  <text x="76" y="128" font-family="Arial, sans-serif" font-size="16" fill="#475569">Bottleneck notes → concept brief + vendor quote path</text>
  <rect x="76" y="168" width="748" height="76" rx="18" fill="#e0f2fe"/>
  <text x="104" y="214" font-family="Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a">Machine idle reasons + setup friction</text>
  <rect x="76" y="272" width="225" height="132" rx="18" fill="#ecfeff"/>
  <text x="102" y="318" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#0f172a">Fixture idea</text>
  <text x="102" y="350" font-family="Arial, sans-serif" font-size="15" fill="#334155">What to hold, locate,</text>
  <text x="102" y="374" font-family="Arial, sans-serif" font-size="15" fill="#334155">and repeat safely</text>
  <rect x="337" y="272" width="225" height="132" rx="18" fill="#fef9c3"/>
  <text x="363" y="318" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#0f172a">ROI questions</text>
  <text x="363" y="350" font-family="Arial, sans-serif" font-size="15" fill="#334155">Cycle time, labor,</text>
  <text x="363" y="374" font-family="Arial, sans-serif" font-size="15" fill="#334155">scrap, uptime</text>
  <rect x="599" y="272" width="225" height="132" rx="18" fill="#dcfce7"/>
  <text x="625" y="318" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#0f172a">Vendor packet</text>
  <text x="625" y="350" font-family="Arial, sans-serif" font-size="15" fill="#334155">Questions before</text>
  <text x="625" y="374" font-family="Arial, sans-serif" font-size="15" fill="#334155">buying equipment</text>
  <text x="76" y="472" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#0369a1">Planning only. Final safety validation stays with qualified vendors.</text>
</svg>
