<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Custom Work Build scoped proof visual</title>
  <desc id="desc">A sample proof card showing a custom request becoming a scoped build plan with deliverables and approval gate.</desc>
  <rect width="1200" height="760" fill="#111827"/>
  <rect x="58" y="58" width="1084" height="644" rx="34" fill="#fffaf4"/>
  <text x="95" y="125" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#111827">Custom Build Scope / Custom Work Build</text>
  <text x="95" y="165" font-family="Arial, sans-serif" font-size="20" fill="#475569">Sample visual — hypothetical demo output</text>
  <g font-family="Arial, sans-serif">
    <rect x="95" y="220" width="295" height="290" rx="24" fill="#fee2e2" stroke="#ef4444"/>
    <text x="125" y="270" font-size="25" font-weight="700" fill="#111827">Messy request</text>
    <text x="125" y="325" font-size="18" fill="#334155">• unclear scope</text>
    <text x="125" y="360" font-size="18" fill="#334155">• scattered files/photos</text>
    <text x="125" y="395" font-size="18" fill="#334155">• unknown budget path</text>

    <path d="M420 365 H500" stroke="#64748b" stroke-width="12" stroke-linecap="round"/>
    <path d="M500 365 l-28 -22 v44 z" fill="#64748b"/>

    <rect x="530" y="200" width="295" height="330" rx="24" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="560" y="250" font-size="25" font-weight="700" fill="#111827">Scoped build plan</text>
    <text x="560" y="305" font-size="18" fill="#334155">• included deliverables</text>
    <text x="560" y="340" font-size="18" fill="#334155">• excluded items</text>
    <text x="560" y="375" font-size="18" fill="#334155">• review questions</text>
    <text x="560" y="410" font-size="18" fill="#334155">• quote path</text>

    <path d="M855 365 H925" stroke="#64748b" stroke-width="12" stroke-linecap="round"/>
    <path d="M925 365 l-28 -22 v44 z" fill="#64748b"/>

    <rect x="945" y="220" width="160" height="290" rx="24" fill="#dcfce7" stroke="#16a34a"/>
    <text x="975" y="275" font-size="24" font-weight="700" fill="#14532d">Review</text>
    <text x="982" y="335" font-size="17" fill="#14532d">Rick</text>
    <text x="982" y="365" font-size="17" fill="#14532d">approval</text>
    <text x="982" y="395" font-size="17" fill="#14532d">required</text>
  </g>
  <rect x="95" y="585" width="1010" height="74" rx="18" fill="#ecfdf5" stroke="#86efac"/>
  <text x="130" y="630" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#14532d">No automatic quote approval. No payment request without Rick approval.</text>
</svg>