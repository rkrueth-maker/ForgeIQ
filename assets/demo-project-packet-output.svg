<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680" role="img" aria-labelledby="t d"><title id="t">Project Packet Lite finished output</title><desc id="d">A finished packet report preview with scope, materials, and steps.</desc><defs><filter id="s"><feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#111827" flood-opacity=".16"/></filter></defs><rect width="1100" height="680" rx="28" fill="#f8fafc"/><rect x="34" y="26" width="1032" height="76" rx="18" fill="#0f172a"/><text x="64" y="72" font-family="Arial" font-size="28" font-weight="900" fill="#fff">Project Packet Lite — Finished Report Preview</text><text x="824" y="72" font-family="Arial" font-size="14" font-weight="800" fill="#fed7aa">Hypothetical example</text><g filter="url(#s)"><rect x="68" y="126" width="964" height="454" rx="24" fill="#fff"/><rect x="104" y="158" width="892" height="58" rx="14" fill="#dbeafe"/><text x="130" y="195" font-family="Arial" font-size="24" font-weight="900" fill="#1e3a8a">Sample Garage Bay — Scope / Materials / Steps</text><rect x="104" y="246" width="270" height="260" rx="18" fill="#fff7ed" stroke="#fed7aa"/><text x="130" y="286" font-family="Arial" font-size="20" font-weight="900" fill="#7c2d12">Scope</text><text x="130" y="326" font-family="Arial" font-size="16" fill="#111827">• Clear one vehicle lane</text><text x="130" y="360" font-family="Arial" font-size="16" fill="#111827">• Define tool wall</text><text x="130" y="394" font-family="Arial" font-size="16" fill="#111827">• Stage active projects</text><text x="130" y="428" font-family="Arial" font-size="16" fill="#111827">• Choose storage option</text><rect x="414" y="246" width="270" height="260" rx="18" fill="#f0fdf4" stroke="#86efac"/><text x="440" y="286" font-family="Arial" font-size="20" font-weight="900" fill="#14532d">Materials</text><text x="440" y="326" font-family="Arial" font-size="16" fill="#111827">• Temporary tape labels</text><text x="440" y="360" font-family="Arial" font-size="16" fill="#111827">• Sort bins</text><text x="440" y="394" font-family="Arial" font-size="16" fill="#111827">• Wall shelf option A</text><text x="440" y="428" font-family="Arial" font-size="16" fill="#111827">• Tool wall option B</text><rect x="724" y="246" width="272" height="260" rx="18" fill="#eef2ff" stroke="#c7d2fe"/><text x="750" y="286" font-family="Arial" font-size="20" font-weight="900" fill="#3730a3">Steps</text><text x="750" y="326" font-family="Arial" font-size="16" fill="#111827">1. Measure constraints</text><text x="750" y="360" font-family="Arial" font-size="16" fill="#111827">2. Clear lane</text><text x="750" y="394" font-family="Arial" font-size="16" fill="#111827">3. Sort parts/tools</text><text x="750" y="428" font-family="Arial" font-size="16" fill="#111827">4. Review storage plan</text></g><rect x="68" y="606" width="964" height="50" rx="16" fill="#f0fdf4" stroke="#86efac"/><text x="94" y="638" font-family="Arial" font-size="18" font-weight="900" fill="#14532d">Draft packet only — Rick Review Required / Owner Approval Required</text></svg>