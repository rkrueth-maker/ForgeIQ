<style>
.qba-launch{background:#326a9e!important;color:#fff!important}.qba-dialog{width:min(1180px,calc(100vw - 24px));max-height:92vh;border:0;border-radius:16px;padding:0;box-shadow:0 30px 90px rgba(0,0,0,.38)}.qba-dialog::backdrop{background:rgba(5,18,30,.72)}.qba-shell{display:grid;grid-template-rows:auto auto 1fr auto;max-height:92vh;background:#f3f6f9}.qba-head{display:flex;justify-content:space-between;gap:12px;align-items:center;background:#173a5e;color:#fff;padding:14px 16px}.qba-head h2{margin:0}.qba-tabs{display:flex;gap:6px;overflow:auto;padding:10px;background:#fff;border-bottom:1px solid #d8e1e9}.qba-tabs button{white-space:nowrap;background:#e8eef4;color:#173a5e}.qba-tabs button.active{background:#173a5e;color:#fff}.qba-body{padding:14px;overflow:auto}.qba-foot{display:flex;justify-content:flex-end;gap:8px;padding:10px 14px;background:#fff;border-top:1px solid #d8e1e9}.qba-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.qba-card{background:#fff;border:1px solid #d8e1e9;border-radius:12px;padding:13px}.qba-card h3{margin:0 0 9px;color:#173a5e}.qba-list{display:grid;gap:8px}.qba-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;border:1px solid #d8e1e9;border-radius:10px;padding:10px;background:#f8fafc}.qba-fields{display:grid;grid-template-columns:repeat(3,minmax(110px,1fr));gap:8px}.qba-fields .wide{grid-column:1/-1}.qba-metrics{display:grid;grid-template-columns:repeat(3,minmax(130px,1fr));gap:10px}.qba-metric{background:#fff;border:1px solid #d8e1e9;border-radius:12px;padding:14px}.qba-metric strong{display:block;font-size:28px;color:#173a5e}.qba-csv{min-height:130px;font-family:monospace}.qba-photo img{width:140px;height:90px;object-fit:cover;border-radius:8px}.qba-note{padding:10px;border-radius:9px;background:#fff2c7;color:#5c4700;margin-bottom:10px}@media(max-width:760px){.qba-dialog{width:100vw;height:100vh;max-height:none;border-radius:0}.qba-shell{max-height:none;height:100vh}.qba-grid,.qba-fields,.qba-metrics{grid-template-columns:1fr}.qba-fields .wide{grid-column:auto}}
</style>
<script>
(function(){'use strict';
let activeQuote='',state=null,tab='lines';const callDirect=(name,args)=>new Promise((resolve,reject)=>{let runner=google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);runner[name].apply(runner,args||[])});const callApi=(action,args)=>new Promise((resolve,reject)=>google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).boApi({action:action,args:args||{}}));const esc=v=>String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));function toast(m,b){const n=document.getElementById('qbToast');if(!n)return;n.textContent=m;n.style.background=b?'#8f1d1d':'#162331';n.classList.add('show');setTimeout(()=>n.classList.remove('show'),5000)}
function ensure(){if(!document.getElementById('qbaDialog'))document.body.insertAdjacentHTML('beforeend','<dialog id="qbaDialog" class="qba-dialog"><div class="qba-shell"><header class="qba-head"><h2>Commercial Quote Builder</h2><button id="qbaX">Close</button></header><nav id="qbaTabs" class="qba-tabs"></nav><main id="qbaBody" class="qba-body"></main><footer class="qba-foot"><button id="qbaSave" class="primary">Save Changes</button><button id="qbaClose">Close</button></footer></div></dialog>');document.getElementById('qbaX').onclick=close;document.getElementById('qbaClose').onclick=close;document.getElementById('qbaSave').onclick=saveCurrent}
function close(){const d=document.getElementById('qbaDialog');if(d&&d.open)d.close()}
async function open(){if(!activeQuote)return toast('Open a quote first.',true);ensure();state=await callApi('quoteCommercialState',{quoteId:activeQuote});document.getElementById('qbaDialog').showModal();renderTabs();await render()}
function renderTabs(){const names={lines:'Line Types',photos:'Photos & Markup',catalog:'Price Book',templates:'Templates',financial:'Deposit Structure',analytics:'Analytics'};document.getElementById('qbaTabs').innerHTML=Object.keys(names).map(k=>'<button data-tab="'+k+'" class="'+(tab===k?'active':'')+'">'+names[k]+'</button>').join('');document.querySelectorAll('#qbaTabs [data-tab]').forEach(b=>b.onclick=async()=>{tab=b.dataset.tab;renderTabs();await render()})}
async function render(){const body=document.getElementById('qbaBody');body.innerHTML='<div class="qba-card">Loading…</div>';if(tab==='lines')return renderLines(await callDirect('boCommercialQuoteDetails',[activeQuote]));if(tab==='photos')return renderPhotos(await callDirect('boCommercialQuoteDocuments',[activeQuote]));if(tab==='catalog')return renderCatalog(await callDirect('boCommercialCatalog',[{}]));if(tab==='templates')return renderTemplates(await callDirect('boCommercialTemplateList',[]));if(tab==='financial')return renderFinancial();if(tab==='analytics')return renderAnalytics(await callDirect('boCommercialAnalytics',[]))}
function renderLines(details){state.lineSettings=state.lineSettings||{};const types=['Required','Optional','Recommended Optional','Allowance','Alternate','Informational Text','Discount'];document.getElementById('qbaBody').innerHTML='<div class="qba-note">Line types control customer presentation. Pricing and final quantities still require owner review.</div><div class="qba-list">'+(details.lines||[]).map(l=>{const id=l['Quote Line ID'],s=state.lineSettings[id]||{};return'<div class="qba-row" data-line="'+esc(id)+'"><div><strong>'+esc(l.Description)+'</strong><div class="qba-fields"><label>Type<select data-f="type">'+types.map(t=>'<option '+((s.type||'Required')===t?'selected':'')+'>'+t+'</option>').join('')+'</select></label><label>Customer quantity<input data-f="customerQuantity" type="checkbox" '+(s.customerQuantity?'checked':'')+'></label><label>Image ID<input data-f="imageId" value="'+esc(s.imageId||'')+'"></label><label class="wide">Customer note<textarea data-f="customerNote">'+esc(s.customerNote||'')+'</textarea></label></div></div><span>'+esc(l['Line Total']||'')+'</span></div>'}).join('')+'</div>'}
function renderPhotos(docs){state.photoLinks=state.photoLinks||[];const images=(docs||[]).filter(d=>String(d.mimeType||'').indexOf('image/')===0);document.getElementById('qbaBody').innerHTML='<div class="qba-note">Original files stay private. Only checked photos are embedded into the approved proposal. Markup is stored as non-destructive instructions.</div><div class="qba-list">'+images.map(d=>{const p=state.photoLinks.find(x=>x.fileId===d.fileId)||{fileId:d.fileId,fileName:d.fileName,purpose:'Quote overview',customerVisible:false,markup:{shape:'None',label:'',x:50,y:50}};return'<div class="qba-row qba-photo" data-photo="'+esc(d.fileId)+'"><div><img src="https://drive.google.com/thumbnail?id='+encodeURIComponent(d.fileId)+'&sz=w300" alt=""><strong>'+esc(d.fileName)+'</strong><div class="qba-fields"><label>Placement<select data-p="purpose">'+['Quote overview','Scope section','Specific line item','Proposal option','Existing condition','Recommended result','Exclusion','Customer reference','Internal only'].map(x=>'<option '+(p.purpose===x?'selected':'')+'>'+x+'</option>').join('')+'</select></label><label>Markup<select data-p="shape">'+['None','Arrow','Circle','Rectangle','Short label','Blur area','Crop/rotate'].map(x=>'<option '+((p.markup||{}).shape===x?'selected':'')+'>'+x+'</option>').join('')+'</select></label><label>Customer visible<input data-p="customerVisible" type="checkbox" '+(p.customerVisible?'checked':'')+'></label><label class="wide">Label<input data-p="label" value="'+esc(p.label||(p.markup||{}).label||'')+'"></label></div></div></div>'}).join('')+'</div>'}
function renderCatalog(items){document.getElementById('qbaBody').innerHTML='<div class="qba-grid"><section class="qba-card"><h3>Price Book management</h3><div class="qba-fields"><label>Search<input id="qbaCatalogSearch"></label><label>Bulk change %<input id="qbaBulkPercent" type="number" step="0.1"></label><label>Effective date<input id="qbaBulkDate" type="date"></label></div><div style="display:flex;gap:8px;flex-wrap:wrap;margin:10px 0"><button id="qbaSearch">Search</button><button id="qbaBulk">Apply Approved Bulk Price</button><button id="qbaExport">Export CSV</button></div><div id="qbaCatalogList" class="qba-list">'+catalogRows(items)+'</div></section><section class="qba-card"><h3>CSV import</h3><textarea id="qbaCsv" class="qba-csv" placeholder="Paste exported CSV here"></textarea><button id="qbaImport">Import CSV</button><p>Supports categories, subcategories, cost, selling price, markup, margin, tax status, classification, favorites, line defaults, effective date, and active state.</p></section></div>';document.getElementById('qbaSearch').onclick=async()=>renderCatalog(await callDirect('boCommercialCatalog',[{query:document.getElementById('qbaCatalogSearch').value}]));document.getElementById('qbaExport').onclick=exportCsv;document.getElementById('qbaImport').onclick=importCsv;document.getElementById('qbaBulk').onclick=bulkPrice;wireCatalogRows()}
function catalogRows(items){return(items||[]).slice(0,100).map(i=>'<div class="qba-row" data-product="'+esc(i['Product / Service ID'])+'"><div><strong>'+esc(i.Name)+'</strong><div>'+esc(i.Category)+' / '+esc(i.subcategory||'')+' · '+esc(i.classification||'')+' · '+esc(i.Unit||'')+'</div><div>Sell '+esc(i['Standard Selling Price']||i.Price||'')+' · Cost '+esc(i.cost||0)+' · Margin '+esc(i.margin||0)+'%</div></div><label>Favorite <input data-c="favorite" type="checkbox" '+(i.favorite?'checked':'')+'></label></div>').join('')}
function wireCatalogRows(){document.querySelectorAll('[data-product] [data-c="favorite"]').forEach(n=>n.onchange=()=>callDirect('boCommercialCatalogMetadata',[{productId:n.closest('[data-product]').dataset.product,metadata:{favorite:n.checked}}]).then(()=>toast('Price Book favorite updated.')).catch(e=>toast(e.message||String(e),true)))}
async function exportCsv(){const r=await callDirect('boCommercialCatalogExport',[]),blob=new Blob([r.content],{type:r.mimeType}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=r.fileName;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}async function importCsv(){try{const r=await callDirect('boCommercialCatalogImport',[{csv:document.getElementById('qbaCsv').value}]);toast('Imported '+r.total+' Price Book rows.');await render()}catch(e){toast(e.message||String(e),true)}}async function bulkPrice(){try{const r=await callDirect('boCommercialBulkPrice',[{percent:Number(document.getElementById('qbaBulkPercent').value||0),effectiveDate:document.getElementById('qbaBulkDate').value,productIds:[]}]);toast('Updated '+r.changed+' prices.');await render()}catch(e){toast(e.message||String(e),true)}}
function renderTemplates(list){document.getElementById('qbaBody').innerHTML='<div class="qba-grid"><section class="qba-card"><h3>Save current proposal as template</h3><label>Name<input id="qbaTemplateName"></label><label>Expiration days<input id="qbaTemplateDays" type="number" value="30"></label><label>Branding layout<select id="qbaBrandLayout"><option>standard</option><option>photo-led</option><option>compact</option></select></label><button id="qbaTemplateSave">Save New Template Version</button></section><section class="qba-card"><h3>Reusable proposal templates</h3><div class="qba-list">'+(list||[]).map(t=>'<div class="qba-row"><div><strong>'+esc(t.name)+'</strong><div>'+esc(t.layout)+' · '+esc(t.expirationDays)+' days</div></div><button data-apply-template="'+esc(t.templateId)+'">Apply</button></div>').join('')+'</div></section></div>';document.getElementById('qbaTemplateSave').onclick=saveTemplate;document.querySelectorAll('[data-apply-template]').forEach(b=>b.onclick=()=>applyTemplate(b.dataset.applyTemplate))}
async function saveTemplate(){try{const r=await callDirect('boCommercialTemplateSave',[{name:document.getElementById('qbaTemplateName').value,expirationDays:Number(document.getElementById('qbaTemplateDays').value||30),brandingLayout:document.getElementById('qbaBrandLayout').value,state:state}]);toast('Template saved: '+r.name);await render()}catch(e){toast(e.message||String(e),true)}}async function applyTemplate(id){try{const patch=await callDirect('boCommercialTemplateApply',[{templateId:id}]);state=Object.assign({},state,patch);await callApi('quoteCommercialSave',{quoteId:activeQuote,state:state});toast('Template applied without changing historical quotes.')}catch(e){toast(e.message||String(e),true)}}
function renderFinancial(){const d=state.depositRule||{type:'None',amount:0},schedule=state.paymentSchedule||[];document.getElementById('qbaBody').innerHTML='<div class="qba-note">Data structure only. Payment processing and money movement remain disabled.</div><div class="qba-grid"><section class="qba-card"><h3>Deposit rule</h3><label>Type<select id="qbaDepositType"><option>None</option><option>Fixed</option><option>Percentage</option><option>Offline record</option><option>Provider-hosted later</option></select></label><label>Amount / percent<input id="qbaDepositAmount" type="number" step="0.01" value="'+esc(d.amount||0)+'"></label></section><section class="qba-card"><h3>Payment schedule</h3><textarea id="qbaSchedule" class="qba-csv" placeholder="One milestone per line: label | amount | due rule">'+esc(schedule.map(x=>[x.label,x.amount,x.dueRule].join(' | ')).join('\n'))+'</textarea><p>Nothing is charged, requested, or applied automatically.</p></section></div>';document.getElementById('qbaDepositType').value=d.type||'None'}
function renderAnalytics(m){document.getElementById('qbaBody').innerHTML='<div class="qba-metrics">'+[['Commercial quotes',m.total],['Shared',m.shared],['Viewed',m.viewed],['Accepted',m.accepted],['View rate',m.viewRate+'%'],['Conversion rate',m.conversionRate+'%']].map(x=>'<div class="qba-metric"><span>'+x[0]+'</span><strong>'+x[1]+'</strong></div>').join('')+'</div>'}
function collect(){if(tab==='lines'){state.lineSettings=state.lineSettings||{};document.querySelectorAll('[data-line]').forEach(n=>{const id=n.dataset.line,s={};n.querySelectorAll('[data-f]').forEach(f=>s[f.dataset.f]=f.type==='checkbox'?f.checked:f.value);state.lineSettings[id]=s})}if(tab==='photos'){state.photoLinks=[];document.querySelectorAll('[data-photo]').forEach(n=>{const id=n.dataset.photo,p={fileId:id,fileName:n.querySelector('strong').textContent,markup:{}};n.querySelectorAll('[data-p]').forEach(f=>{const v=f.type==='checkbox'?f.checked:f.value;if(f.dataset.p==='shape')p.markup.shape=v;else p[f.dataset.p]=v});p.markup.label=p.label||'';state.photoLinks.push(p)})}if(tab==='financial'){state.depositRule={type:document.getElementById('qbaDepositType').value,amount:Number(document.getElementById('qbaDepositAmount').value||0),processingEnabled:false};state.paymentSchedule=document.getElementById('qbaSchedule').value.split(/\n+/).map(s=>s.trim()).filter(Boolean).map(s=>{const p=s.split('|').map(x=>x.trim());return{label:p[0]||'',amount:Number(p[1]||0),dueRule:p[2]||'',processingEnabled:false}})}}async function saveCurrent(){try{collect();state=await callApi('quoteCommercialSave',{quoteId:activeQuote,state:state});toast('Commercial settings saved.')}catch(e){toast(e.message||String(e),true)}}
function inject(){const panel=document.querySelector('#qbContent .panel');if(!panel||document.getElementById('qbaLaunch'))return;const b=document.createElement('button');b.id='qbaLaunch';b.type='button';b.className='qba-launch';b.textContent='Commercial Tools';b.onclick=open;(panel.querySelector('.actions')||panel).appendChild(b)}function install(){if(typeof window.qbDetails!=='function')return false;const old=window.qbDetails;window.qbDetails=async function(id){activeQuote=id;const r=await old.apply(this,arguments);setTimeout(inject,0);return r};return true}let attempts=0,timer=setInterval(()=>{attempts++;if(install()||attempts>120)clearInterval(timer)},50);
})();
</script>
