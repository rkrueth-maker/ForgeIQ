<style>
.qbc-tabs{display:flex;gap:6px;overflow:auto;margin:0 0 14px;padding-bottom:4px}.qbc-tabs button{background:#e9f0f5;color:var(--navy);white-space:nowrap}.qbc-tabs button.active{background:var(--navy);color:#fff}.qbc-panel{display:grid;gap:14px}.qbc-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.qbc-full{grid-column:1/-1}.qbc-box{border:1px solid var(--border);border-radius:12px;padding:13px;background:#f8fafc}.qbc-box h3{margin:0 0 9px}.qbc-toolbar{display:flex;gap:8px;flex-wrap:wrap}.qbc-toolbar .primary{background:var(--navy);color:#fff}.qbc-toolbar .orange{background:#e85d18;color:#fff}.qbc-list{display:grid;gap:8px}.qbc-item{border:1px solid var(--border);border-radius:10px;padding:10px;background:#fff;display:grid;grid-template-columns:1fr auto;gap:8px}.qbc-item input,.qbc-item textarea,.qbc-item select{margin-top:4px}.qbc-timeline{border-left:3px solid #bdd1df;padding-left:14px;display:grid;gap:12px}.qbc-event{position:relative}.qbc-event:before{content:"";position:absolute;width:11px;height:11px;border-radius:50%;background:#326a9e;left:-21px;top:5px}.qbc-sticky{position:sticky;bottom:10px;background:#fff;border:1px solid var(--border);box-shadow:0 10px 26px rgba(0,0,0,.12);border-radius:12px;padding:10px;display:flex;gap:8px;flex-wrap:wrap;z-index:8}@media(max-width:760px){.qbc-grid{grid-template-columns:1fr}.qbc-full{grid-column:auto}}
</style>
<script>
(function(){'use strict';
const qbcCall=(action,args)=>new Promise((resolve,reject)=>google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).boApi({action:action,args:args||{}}));
const qbcEsc=v=>String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let qbcState=null,qbcQuoteId='',qbcTab='overview';
function qbcToast(message,bad){const n=document.getElementById('qbToast');if(!n)return;n.textContent=message;n.style.background=bad?'#8f1d1d':'#162331';n.classList.add('show');setTimeout(()=>n.classList.remove('show'),5000)}
function qbcId(prefix){return prefix+'-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,8)}
function qbcSelectedQuoteId(){return qbcQuoteId||window.currentQuoteId||''}
async function qbcLoad(quoteId){qbcQuoteId=quoteId||qbcSelectedQuoteId();if(!qbcQuoteId)return;qbcState=await qbcCall('quoteCommercialState',{quoteId:qbcQuoteId});qbcInjectButton();qbcRender()}
function qbcInjectButton(){const panel=document.querySelector('#qbContent .panel');if(!panel||document.getElementById('qbcOpen'))return;const b=document.createElement('button');b.id='qbcOpen';b.type='button';b.className='primary';b.textContent='Proposal Workspace';b.onclick=()=>{qbcTab='overview';qbcRender(true)};const actions=panel.querySelector('.actions');(actions||panel).appendChild(b)}
function qbcRender(force){if(!qbcState)return;let host=document.getElementById('qbcWorkspace');if(!host){host=document.createElement('section');host.id='qbcWorkspace';host.className='panel';document.querySelector('#qbContent').prepend(host)}if(!force&&host.dataset.open!=='1')return;host.dataset.open='1';host.innerHTML='<div class="qbc-tabs">'+['overview','options','photos','terms','preview','lifecycle','followup'].map(t=>'<button data-qbc-tab="'+t+'" class="'+(qbcTab===t?'active':'')+'">'+({overview:'Overview',options:'Options & Add-ons',photos:'Photos',terms:'Terms',preview:'Preview',lifecycle:'Lifecycle',followup:'Follow-up'}[t])+'</button>').join('')+'</div><div class="qbc-panel">'+qbcTabHtml()+'</div><div class="qbc-sticky"><button class="primary" id="qbcSave">Save Proposal</button><button id="qbcPreview">Preview as Customer</button><button id="qbcClose">Close</button></div>';host.querySelectorAll('[data-qbc-tab]').forEach(b=>b.onclick=()=>{qbcTab=b.dataset.qbcTab;qbcRender(true)});document.getElementById('qbcSave').onclick=qbcSave;document.getElementById('qbcPreview').onclick=qbcPreview;document.getElementById('qbcClose').onclick=()=>{host.dataset.open='0';host.remove()};qbcWireTab()}
function qbcTabHtml(){
 if(qbcTab==='overview')return '<div class="qbc-grid"><div class="qbc-box qbc-full"><h3>Customer-facing summary</h3><textarea id="qbcSummary">'+qbcEsc(qbcState.summary||'')+'</textarea></div><div class="qbc-box"><h3>Included work</h3><textarea id="qbcIncluded" placeholder="One item per line">'+qbcEsc((qbcState.includedWork||[]).join('\n'))+'</textarea></div><div class="qbc-box"><h3>Proposal layout</h3><select id="qbcLayout"><option value="simple">Simple</option><option value="side-by-side">Side-by-side</option><option value="stacked">Stacked</option></select><label>Approval rule<select id="qbcApprovalRule"><option value="one_option">One option</option><option value="multiple_options">Multiple options allowed</option></select></label></div><div class="qbc-box qbc-full"><h3>Customer visibility</h3>'+['quantity','unitPrice','lineTotal','tax','photos'].map(k=>'<label style="margin-right:16px"><input type="checkbox" data-qbc-visible="'+k+'" '+((qbcState.visibility||{})[k]?'checked':'')+'> '+({quantity:'Quantities',unitPrice:'Unit prices',lineTotal:'Line totals',tax:'Tax',photos:'Approved photos'}[k])+'</label>').join('')+'</div></div>';
 if(qbcTab==='options')return '<div class="qbc-toolbar"><button id="qbcAddOption">Add proposal option</button><button id="qbcAddAddon">Add add-on</button></div><div class="qbc-grid"><div class="qbc-box"><h3>Good–Better–Best options</h3><div id="qbcOptions" class="qbc-list">'+(qbcState.options||[]).map(qbcOptionHtml).join('')+'</div></div><div class="qbc-box"><h3>Optional and recommended add-ons</h3><div id="qbcAddons" class="qbc-list">'+(qbcState.addOns||[]).map(qbcAddonHtml).join('')+'</div></div></div>';
 if(qbcTab==='photos')return '<div class="qbc-box"><h3>Photo placement and visibility</h3><p>Captured quote pictures remain private until explicitly marked for the customer proposal.</p><div class="qbc-list">'+(qbcState.photoLinks||[]).map((p,i)=>'<div class="qbc-item"><div><strong>'+qbcEsc(p.fileName||p.fileId||'Photo')+'</strong><select data-photo-purpose="'+i+'"><option>Quote overview</option><option>Scope section</option><option>Specific line item</option><option>Proposal option</option><option>Existing condition</option><option>Recommended result</option><option>Exclusion</option><option>Customer reference</option><option>Internal only</option></select></div><label><input type="checkbox" data-photo-visible="'+i+'" '+(p.customerVisible?'checked':'')+'> Customer visible</label></div>').join('')+'</div><button id="qbcRefreshPhotos">Load attached pictures</button></div>';
 if(qbcTab==='terms')return '<div class="qbc-grid"><div class="qbc-box qbc-full"><h3>Terms</h3><textarea id="qbcTerms">'+qbcEsc(qbcState.terms||'')+'</textarea></div><div class="qbc-box"><h3>Assumptions</h3><textarea id="qbcAssumptions">'+qbcEsc(qbcState.assumptions||'')+'</textarea></div><div class="qbc-box"><h3>Exclusions</h3><textarea id="qbcExclusions">'+qbcEsc(qbcState.exclusions||'')+'</textarea></div><div class="qbc-box"><h3>Expiration</h3><input id="qbcExpiration" type="date" value="'+qbcEsc(qbcState.expirationDate||'')+'"></div></div>';
 if(qbcTab==='preview')return '<div class="qbc-box"><h3>Exact customer preview</h3><p>Preview uses the approved branding, visible photos, selected layout, options, add-ons, terms, totals, and customer actions.</p><div class="qbc-toolbar"><button class="primary" id="qbcOpenPreview">Open Preview</button><button id="qbcGeneratePdf">Generate PDF</button></div></div>';
 if(qbcTab==='lifecycle')return '<div class="qbc-grid"><div class="qbc-box"><h3>Lifecycle</h3><div><strong>Current:</strong> '+qbcEsc(qbcState.lifecycleStatus||'Draft')+'</div><select id="qbcNextStatus">'+['Draft','Internal Review','Approved to Share','Shared','Viewed','Changes Requested','Revised','Accepted','Declined','Expired','Converted','Archived'].map(s=>'<option '+(s===qbcState.lifecycleStatus?'selected':'')+'>'+s+'</option>').join('')+'</select><textarea id="qbcTransitionNotes" placeholder="Transition notes"></textarea><button id="qbcTransition">Apply transition</button><button class="orange" id="qbcPrepareShare">Prepare Customer Link</button><div id="qbcShareResult" class="small"></div></div><div class="qbc-box"><h3>Activity timeline</h3><div class="qbc-timeline">'+(qbcState.history||[]).slice().reverse().map(e=>'<div class="qbc-event"><strong>'+qbcEsc(e.from)+' → '+qbcEsc(e.to)+'</strong><div>'+qbcEsc(e.time)+'</div><div>'+qbcEsc(e.notes||'')+'</div><div class="small">Version '+qbcEsc(e.version)+' · '+qbcEsc(e.actor)+'</div></div>').join('')+'</div></div></div>';
 if(qbcTab==='followup')return '<div class="qbc-box"><h3>Owner-approved follow-up</h3><p>This creates a due date and suggested next action. It does not send anything automatically.</p><label>Due date<input id="qbcFollowDate" type="date" value="'+qbcEsc((qbcState.followUp||{}).dueDate||'')+'"></label><label>Suggested next action<textarea id="qbcFollowAction">'+qbcEsc((qbcState.followUp||{}).nextAction||'')+'</textarea></label><button id="qbcFollowSave">Schedule Follow-up</button></div>';
 return '';
}
function qbcOptionHtml(o){return '<div class="qbc-item" data-option-id="'+qbcEsc(o.id)+'"><div><input data-field="label" value="'+qbcEsc(o.label||'OPTION')+'"><input data-field="name" value="'+qbcEsc(o.name||'')+'" placeholder="Option name"><textarea data-field="outcome" placeholder="Customer outcome">'+qbcEsc(o.outcome||'')+'</textarea><input data-field="total" type="number" step="0.01" value="'+qbcEsc(o.total||0)+'" placeholder="Option total"></div><button data-remove-option="'+qbcEsc(o.id)+'">Remove</button></div>'}
function qbcAddonHtml(a){return '<div class="qbc-item" data-addon-id="'+qbcEsc(a.id)+'"><div><input data-field="name" value="'+qbcEsc(a.name||'')+'" placeholder="Add-on name"><input data-field="price" type="number" step="0.01" value="'+qbcEsc(a.price||0)+'"><label><input data-field="recommended" type="checkbox" '+(a.recommended?'checked':'')+'> Recommended</label></div><button data-remove-addon="'+qbcEsc(a.id)+'">Remove</button></div>'}
function qbcWireTab(){if(qbcTab==='overview'){document.getElementById('qbcLayout').value=qbcState.layout||'simple';document.getElementById('qbcApprovalRule').value=qbcState.approvalRule||'one_option'}if(qbcTab==='options'){document.getElementById('qbcAddOption').onclick=()=>{qbcState.options=(qbcState.options||[]).concat({id:qbcId('opt'),label:'OPTION',name:'',outcome:'',total:0,lineItems:[]});qbcRender(true)};document.getElementById('qbcAddAddon').onclick=()=>{qbcState.addOns=(qbcState.addOns||[]).concat({id:qbcId('addon'),name:'',price:0,recommended:false});qbcRender(true)};document.querySelectorAll('[data-remove-option]').forEach(b=>b.onclick=()=>{qbcState.options=qbcState.options.filter(o=>o.id!==b.dataset.removeOption);qbcRender(true)});document.querySelectorAll('[data-remove-addon]').forEach(b=>b.onclick=()=>{qbcState.addOns=qbcState.addOns.filter(a=>a.id!==b.dataset.removeAddon);qbcRender(true)})}if(qbcTab==='photos')document.getElementById('qbcRefreshPhotos').onclick=qbcRefreshPhotos;if(qbcTab==='preview'){document.getElementById('qbcOpenPreview').onclick=qbcPreview;document.getElementById('qbcGeneratePdf').onclick=()=>qbcCall('generatePdf',{documentType:'Quote',recordId:qbcQuoteId}).then(()=>qbcToast('PDF generated for review.')).catch(e=>qbcToast(e.message||String(e),true))}if(qbcTab==='lifecycle'){document.getElementById('qbcTransition').onclick=qbcTransition;document.getElementById('qbcPrepareShare').onclick=qbcPrepareShare}if(qbcTab==='followup')document.getElementById('qbcFollowSave').onclick=qbcFollowup}
function qbcCollect(){if(qbcTab==='overview'){qbcState.summary=document.getElementById('qbcSummary').value;qbcState.includedWork=document.getElementById('qbcIncluded').value.split(/\n+/).map(s=>s.trim()).filter(Boolean);qbcState.layout=document.getElementById('qbcLayout').value;qbcState.approvalRule=document.getElementById('qbcApprovalRule').value;document.querySelectorAll('[data-qbc-visible]').forEach(n=>{qbcState.visibility=qbcState.visibility||{};qbcState.visibility[n.dataset.qbcVisible]=n.checked})}if(qbcTab==='options'){document.querySelectorAll('[data-option-id]').forEach(n=>{const o=qbcState.options.find(x=>x.id===n.dataset.optionId);n.querySelectorAll('[data-field]').forEach(f=>o[f.dataset.field]=f.type==='number'?Number(f.value||0):f.value)});document.querySelectorAll('[data-addon-id]').forEach(n=>{const a=qbcState.addOns.find(x=>x.id===n.dataset.addonId);n.querySelectorAll('[data-field]').forEach(f=>a[f.dataset.field]=f.type==='checkbox'?f.checked:f.type==='number'?Number(f.value||0):f.value)})}if(qbcTab==='terms'){qbcState.terms=document.getElementById('qbcTerms').value;qbcState.assumptions=document.getElementById('qbcAssumptions').value;qbcState.exclusions=document.getElementById('qbcExclusions').value;qbcState.expirationDate=document.getElementById('qbcExpiration').value}}
async function qbcSave(){try{qbcCollect();qbcState=await qbcCall('quoteCommercialSave',{quoteId:qbcQuoteId,state:qbcState});qbcToast('Proposal saved.')}catch(e){qbcToast(e.message||String(e),true)}}
async function qbcPreview(){try{qbcCollect();await qbcSave();const html=await qbcCall('quoteCommercialPreview',{quoteId:qbcQuoteId});const w=window.open('','_blank');w.document.open();w.document.write(html);w.document.close()}catch(e){qbcToast(e.message||String(e),true)}}
async function qbcTransition(){try{qbcCollect();await qbcSave();qbcState=await qbcCall('quoteCommercialTransition',{quoteId:qbcQuoteId,status:document.getElementById('qbcNextStatus').value,notes:document.getElementById('qbcTransitionNotes').value});qbcToast('Lifecycle updated.');qbcRender(true)}catch(e){qbcToast(e.message||String(e),true)}}
async function qbcPrepareShare(){try{qbcCollect();await qbcSave();const result=await qbcCall('quoteCommercialPrepareShare',{quoteId:qbcQuoteId,channel:'Manual Link'});document.getElementById('qbcShareResult').innerHTML='<strong>Prepared—not sent:</strong><br><input value="'+qbcEsc(result.url)+'" readonly>';qbcToast('Customer link prepared. No message was sent.')}catch(e){qbcToast(e.message||String(e),true)}}
async function qbcRefreshPhotos(){try{const docs=await qbcCall('quoteBuilderQuoteDocuments',{quoteId:qbcQuoteId});qbcState.photoLinks=docs.filter(d=>String(d.mimeType||'').indexOf('image/')===0).map(d=>{const old=(qbcState.photoLinks||[]).find(p=>p.fileId===d.fileId)||{};return Object.assign({},old,{fileId:d.fileId,fileName:d.fileName,purpose:old.purpose||'Quote overview',customerVisible:!!old.customerVisible})});qbcRender(true)}catch(e){qbcToast(e.message||String(e),true)}}
async function qbcFollowup(){try{qbcState=await qbcCall('quoteCommercialFollowUp',{quoteId:qbcQuoteId,dueDate:document.getElementById('qbcFollowDate').value,nextAction:document.getElementById('qbcFollowAction').value});qbcToast('Follow-up scheduled. Nothing was sent.')}catch(e){qbcToast(e.message||String(e),true)}}
function qbcInstall(){if(typeof window.qbDetails!=='function')return false;const original=window.qbDetails;window.qbDetails=async function(id){const r=await original.apply(this,arguments);setTimeout(()=>qbcLoad(id).catch(e=>qbcToast(e.message||String(e),true)),0);return r};return true}
let tries=0,timer=setInterval(()=>{tries++;if(qbcInstall()||tries>120)clearInterval(timer)},50);
})();
</script>
