<style>
.bo-control{max-width:1180px;margin:auto;padding-bottom:12px}.bo-hero{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border-radius:18px;padding:22px;margin-bottom:16px}.bo-hero h2{margin:3px 0 7px;font-size:clamp(25px,6vw,38px)}.bo-hero p{margin:0;color:#e8f2fb}.bo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}.bo-action{min-height:82px!important;padding:15px!important;border:2px solid var(--border)!important;border-radius:14px!important;background:#fff!important;color:var(--navy)!important;display:flex!important;align-items:center!important;gap:13px!important;text-align:left!important;font-size:17px!important}.bo-action.primary{background:var(--navy)!important;color:#fff!important}.bo-action i{font-style:normal;font-size:29px}.bo-panel,.bo-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:15px;margin:12px 0}.bo-card{margin:9px 0}.bo-card strong{display:block;font-size:17px}.bo-form{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.bo-form .wide{grid-column:1/-1}.bo-form input,.bo-form select,.bo-form textarea{min-height:54px;font-size:16px}.bo-form textarea{min-height:100px}.bo-toolbar{display:flex;flex-wrap:wrap;gap:9px;margin-top:12px}.bo-toolbar button{min-height:54px}.bo-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.bo-summary button{background:#fff;color:var(--navy);border:1px solid var(--border);text-align:left;padding:12px;border-radius:12px}.bo-summary b{display:block;font-size:27px}.bo-chip{display:inline-block;padding:6px 9px;margin:5px 5px 0 0;border-radius:999px;background:var(--light);font-size:12px;font-weight:800}.bo-hold{background:var(--warn);padding:11px;border-radius:10px;margin:10px 0}.bo-bottom,.bo-control-bottom{display:none}.bo-cost{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.bo-cost div{background:var(--light);padding:10px;border-radius:10px}.bo-cost b{display:block;font-size:19px}@media(max-width:800px){.bo-control{padding-bottom:76px}.bo-grid{grid-template-columns:1fr 1fr}.bo-action{min-height:94px!important;display:block!important;text-align:center!important}.bo-action i{display:block}.bo-form{grid-template-columns:1fr}.bo-form .wide{grid-column:auto}.bo-summary,.bo-cost{grid-template-columns:1fr 1fr}.bo-bottom,.bo-control-bottom{display:grid;grid-template-columns:repeat(4,1fr);position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--border);z-index:40;padding:6px}.bo-bottom button,.bo-control-bottom button{background:#fff;color:var(--navy);min-height:58px;font-size:11px}nav{display:none!important}.layout{display:block!important}main{padding:10px!important}}
</style>
<script>
var BO_CONTROL={data:null};
function boc(action,args){return new Promise(function(resolve,reject){google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).boControlApiLive({action:action,args:args||{}});});}
function boe(v){return String(v==null?'':v).replace(/[&<>'"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c];});}
function boj(v){return String(v||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function bom(v){return '$'+Number(v||0).toLocaleString(undefined,{maximumFractionDigits:2});}
function bobottom(){return '<div class="bo-bottom bo-control-bottom"><button onclick="boroute(\'home\')">⌂<br>Home</button><button onclick="boroute(\'day\')">✓<br>My Day</button><button onclick="boroute(\'photo\')">📷<br>Camera</button><button onclick="boroute(\'more\')">⋯<br>More</button></div>';}
function bohost(h){document.getElementById('content').innerHTML='<div class="bo-control">'+h+'</div>'+bobottom();}
function boback(){return '<button class="secondary" onclick="boroute(\'home\')">← Control Center</button>';}
function boaction(a){return '<button class="bo-action '+(a.primary?'primary':'')+'" onclick="boroute(\''+boj(String(a.route||'').replace(/^control:/,''))+'\')"><i>'+boe(a.icon)+'</i><span>'+boe(a.label)+'</span></button>';}
async function boload(){BO_CONTROL.data=await boc('bootstrap');return BO_CONTROL.data;}
function boopts(rows,id,name,label){return '<option value="">'+boe(label)+'</option>'+(rows||[]).map(function(r){return '<option value="'+boe(r[id])+'">'+boe(r[name]||r[id])+'</option>';}).join('');}
function botask(t,buttons){return '<article class="bo-card"><strong>'+boe(t['Task Title']||t['Task ID'])+'</strong><div>'+boe([t['Due Date'],t['Due Time']].filter(Boolean).join(' ')||'Unscheduled')+' · '+boe(t['Customer Name']||t['Customer ID']||'')+'</div><div>'+boe(t['Job Name']||t['Job ID']||'')+'</div><div>'+boe(t.Instructions||'')+'</div><span class="bo-chip">'+boe(t.Priority||'Normal')+'</span><span class="bo-chip">'+boe(t.Status||'Open')+'</span>'+(buttons||'')+'</article>';}
async function bohome(){var d=await boload(),u=d.user||{},a=d.attention||{};state.module='control';renderNav();bohost('<section class="bo-hero"><small>BUSINESS OFFICE CONTROL</small><h2>Good day, '+boe(u.displayName||u.role||'User')+'</h2><p>People, schedule, proof, costs, approvals, and customer records in one operating flow.</p></section><div class="bo-grid">'+(d.actions||[]).map(boaction).join('')+'</div><section class="bo-panel"><h3>Needs attention</h3><div class="bo-summary"><button onclick="boroute(\'dispatch\')"><b>'+Number(a.unassigned||0)+'</b>Unassigned</button><button onclick="openModule(\'approvals\')"><b>'+Number(a.approvals||0)+'</b>Approvals</button><button onclick="boroute(\'proof\')"><b>'+Number(a.proof||0)+'</b>Photos</button><button onclick="openModule(\'receipts\')"><b>'+Number(a.receipts||0)+'</b>Receipts</button><button onclick="openModule(\'requests\')"><b>'+Number(a.requests||0)+'</b>Requests</button><button onclick="openModule(\'invoices\')"><b>'+Number(a.overdueInvoices||0)+'</b>Overdue</button><button onclick="boroute(\'equipment\')"><b>'+Number(a.equipmentIssues||0)+'</b>Equipment</button><button onclick="openModule(\'errors\')"><b>'+Number(a.errors||0)+'</b>Errors</button></div></section>');}
async function boday(){var d=await boload(),s=d.currentSession,t=(d.tasks||[]).slice().sort(function(a,b){return String(a['Due Date']||'9999').localeCompare(String(b['Due Date']||'9999'));}),h=boback()+'<section class="bo-hero"><small>FIELD OPERATIONS</small><h2>'+(s?'Current work and what is next':'My Day')+'</h2><p>Chronological assignments with customer, job, instructions, time, and required proof.</p></section>';if(s)h+='<section class="bo-panel"><h3>Current work</h3><span class="bo-chip">'+boe(s.Status)+'</span><span class="bo-chip">Started '+boe(s['Started Time'])+'</span><div class="bo-toolbar">'+(s.Status==='WORKING'?'<button class="secondary" onclick="bofield(\'PAUSE\')">Pause</button>':'<button class="secondary" onclick="bofield(\'RESUME\')">Resume</button>')+'<button class="primary" onclick="bocloseform()">Complete & clock out</button></div></section>';h+='<section class="bo-panel"><h3>Today and next</h3>'+(t.length?t.map(function(x){return botask(x,!s?'<div class="bo-toolbar"><button class="primary" onclick="boclock(\''+boj(x['Task ID'])+'\')">Start work</button></div>':'');}).join(''):'<div class="empty">No assignments.</div>')+'</section>';bohost(h);}
async function boassign(){var d=await boload(),r=d.references||{};bohost(boback()+'<section class="bo-panel"><h2>Assign Work</h2><p>Choose names and work records. Internal IDs stay hidden.</p><div class="bo-form"><label>Work type<select id="at"><option>Entire job</option><option>Job visit</option><option selected>Individual task</option><option>Non-job assignment</option></select></label><label>Employee<select id="au">'+boopts(r.users,'id','name','Choose employee')+'</select></label><label>Crew or role<select id="ar">'+boopts(r.roles,'name','name','Choose crew or role')+'</select></label><label>Foreman<select id="af">'+boopts(r.foremen,'id','name','Choose foreman')+'</select></label><label>Customer<select id="ac">'+boopts(r.customers,'id','name','Choose customer')+'</select></label><label>Property<select id="ap">'+boopts(r.properties,'id','name','Choose property')+'</select></label><label>Job<select id="aj">'+boopts(r.jobs,'id','name','Choose job')+'</select></label><label>Work order<select id="aw">'+boopts(r.workOrders,'id','name','Choose work order')+'</select></label><label class="wide">Assignment title<input id="an"></label><label>Date<input id="ad" type="date"></label><label>Start time<input id="ati" type="time"></label><label>Arrival window<input id="awin" placeholder="8:00–10:00 AM"></label><label>Estimated duration<input id="adur" placeholder="3 hours"></label><label>Priority<select id="apri"><option>Normal</option><option>High</option><option>Urgent</option><option>Low</option></select></label><label>Equipment needed<input id="aeq"></label><label class="wide">Instructions<textarea id="ains"></textarea></label><fieldset class="wide"><legend>Required closeout</legend><label><input id="ab" type="checkbox"> Before photo</label><label><input id="apr" type="checkbox"> Progress photo</label><label><input id="aco" type="checkbox" checked> Completion photo</label><label><input id="ach" type="checkbox"> Checklist</label><label><input id="ano" type="checkbox" checked> Final notes</label></fieldset></div><div class="bo-hold">Assignment is internal. Customer and employee notifications remain separate drafts.</div><div class="bo-toolbar"><button class="primary" onclick="bosaveassign()">Assign work</button></div></section>');}
async function bosaveassign(){try{var p=[];if(ab.checked)p.push('Before Photo');if(apr.checked)p.push('Progress Photo');if(aco.checked)p.push('Completion Photo');if(ach.checked)p.push('Checklist');if(ano.checked)p.push('Notes');await boc('assignTask',{values:{'Task Title':an.value,'Task Type':at.value,'Assigned User ID':au.value,'Assigned Role':ar.value,'Foreman User ID':af.value,Priority:apri.value,'Due Date':ad.value,'Due Time':ati.value,'Arrival Window':awin.value,'Estimated Duration':adur.value,'Customer ID':ac.value,'Property ID':ap.value,'Job ID':aj.value,'Work Order ID':aw.value,'Linked Record Type':aj.value?'Job':aw.value?'Work Order':'','Linked Record ID':aj.value||aw.value,Instructions:ains.value,'Equipment Needed':aeq.value,'Required Proof':p.join(',')||'Completion Photo,Notes'}});showToast('Work assigned. Nothing was sent automatically.');boroute('dispatch');}catch(e){showToast(e.message||String(e),true);}}
async function bodispatch(){var d=await boload(),g={Unassigned:[],Today:[],Upcoming:[]},today=new Date().toISOString().slice(0,10);(d.tasks||[]).forEach(function(t){if(!t['Assigned User ID']&&!t['Assigned Role'])g.Unassigned.push(t);else if(t['Due Date']===today)g.Today.push(t);else g.Upcoming.push(t);});bohost(boback()+'<section class="bo-hero"><small>SCHEDULE & DISPATCH</small><h2>Put the right work with the right people</h2><p>Unassigned work, today, and upcoming assignments.</p></section><div class="bo-toolbar"><button class="primary" onclick="boroute(\'assign\')">Assign work</button></div>'+Object.keys(g).map(function(k){return '<section class="bo-panel"><h3>'+k+' ('+g[k].length+')</h3>'+(g[k].length?g[k].map(function(t){return botask(t,'');}).join(''):'<div class="empty">Nothing here.</div>')+'</section>';}).join(''));}
async function bojobcost(){var d=await boload();bohost(boback()+'<section class="bo-hero"><small>JOB COST SNAPSHOT</small><h2>Estimated versus actual</h2><p>Current operational snapshot of invoiced revenue, labor, materials, equipment, receipts, and margin. Review accounting records before relying on final profitability.</p></section>'+((d.jobCosts||[]).map(function(x){return '<section class="bo-panel"><h3>'+boe(x.name||x.id)+'</h3><div class="bo-cost"><div><b>'+bom(x.revenue)+'</b>Invoiced revenue</div><div><b>'+bom(x.labor)+'</b>Labor cost</div><div><b>'+bom(x.materials+x.equipment)+'</b>Materials & equipment</div><div><b>'+bom(x.margin)+'</b>Current margin</div></div><span class="bo-chip">'+Number(x.pendingReceipts||0)+' pending receipts</span></section>';}).join('')||'<section class="bo-panel">No active job-cost records.</section>'));}
async function boequipment(){var d=await boload(),a=d.equipment&&d.equipment.assets||[];bohost(boback()+'<section class="bo-hero"><small>EQUIPMENT & ASSETS</small><h2>Ready, assigned, due, or unsafe</h2><p>Condition, field assignment, inspections, and maintenance locks.</p></section><section class="bo-panel">'+(a.length?a.map(function(x){return '<article class="bo-card"><strong>'+boe(x.Name||x['Asset Name']||x['Asset ID'])+'</strong><span class="bo-chip">'+boe(x.Status||x['Availability Status']||'Unknown')+'</span></article>';}).join(''):'No equipment records.')+'</section>');}
async function boproof(){var d=await boload(),r=d.proofQueue||[];bohost(boback()+'<section class="bo-hero"><small>FIELD PROOF REVIEW</small><h2>Choose what the customer may see</h2><p>Social use remains a separate approval.</p></section><section class="bo-panel">'+(r.length?r.map(function(x){var id=boj(x['Task Proof ID']);return '<article class="bo-card"><strong>'+boe(x['Photo Type'])+' · '+boe(x['Task ID'])+'</strong><div>'+boe(x.Caption||'No caption')+'</div><div class="bo-toolbar"><button class="primary" onclick="boapprove(\''+id+'\',true)">Approve & share</button><button class="secondary" onclick="boapprove(\''+id+'\',false)">Internal only</button></div></article>';}).join(''):'No photos await review.')+'</section>');}
async function boapprove(id,v){await boc('approveProof',{proofId:id,customerVisible:v});showToast('Photo reviewed.');boproof();}
async function boclock(id){await boc('clockIn',{payload:{taskId:id}});showToast('Clocked in.');boday();}
async function bofield(ev){await boc('fieldTransition',{sessionId:BO_CONTROL.data.currentSession['Field Session ID'],event:ev,payload:{}});showToast('Time status updated.');boday();}
function bocloseform(){bohost(boback()+'<section class="bo-panel"><h2>Complete task and clock out</h2><div class="bo-form"><label class="wide">Final notes<textarea id="cn"></textarea></label><label><input id="cc" type="checkbox"> Checklist complete</label></div><div class="bo-toolbar"><button class="primary" onclick="boclose()">Complete task & clock out</button></div></section>');}
async function boclose(){await boc('closeout',{payload:{sessionId:BO_CONTROL.data.currentSession['Field Session ID'],notes:cn.value.trim(),checklistComplete:cc.checked,ownerReviewRequired:true}});showToast('Clocked out. Ready for review.');bohome();}
function bomore(){bohost(boback()+'<section class="bo-panel"><h2>Apps and records</h2><div class="bo-grid"><button class="bo-action" onclick="openModule(\'customers\')"><i>👤</i>Customers</button><button class="bo-action" onclick="openModule(\'jobs\')"><i>🛠</i>Jobs</button><button class="bo-action" onclick="openModule(\'documents\')"><i>📁</i>Documents</button><button class="bo-action" onclick="openModule(\'reports\')"><i>▥</i>Reports</button><button class="bo-action" onclick="openModule(\'messages\')"><i>✉</i>Communications</button><button class="bo-action" onclick="openModule(\'quotes\')"><i>🧾</i>Quotes</button><button class="bo-action" onclick="boroute(\'receipt\')"><i>🧾</i>Submit receipt</button><button class="bo-action" onclick="boroute(\'photo\')"><i>📷</i>Save photo privately</button></div></section>');}
async function boroute(r){if(!r||r==='home'||r==='control')return bohome();if(r==='day'||r==='field')return boday();if(r==='assign')return boassign();if(r==='dispatch')return bodispatch();if(r==='job-cost')return bojobcost();if(r==='equipment')return boequipment();if(r==='proof')return boproof();if(r==='more')return bomore();if(r==='communications')return openModule('messages');if(r==='photo')return openModule('documents');if(r==='receipt')return openModule('receipts');if(r==='social')return openModule('social');if(r==='quote-builder')return openModule('quotes');if(r.indexOf('bo:')===0)return openModule(r.slice(3));}
(function(){var old=window.renderNav;window.renderNav=function(){old();var n=document.getElementById('nav');if(n&&!document.getElementById('boControlNav'))n.insertAdjacentHTML('afterbegin','<button id="boControlNav" class="'+(state.module==='control'?'active':'')+'" onclick="bohome()">Control Center</button>');};var start0=window.start;window.start=async function(){await start0();var role=state.bootstrap.context.user.role;if(role==='Owner'||role==='Administrator')await bohome();else await boday();};})();
</script>
