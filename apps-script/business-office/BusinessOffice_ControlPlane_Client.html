<style>
.bo-control-shell{max-width:1180px;margin:0 auto}.bo-control-hero{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border-radius:18px;padding:22px;margin-bottom:16px}.bo-control-hero h2{margin:0 0 6px;font-size:clamp(24px,6vw,38px)}.bo-control-hero p{margin:0;color:#e6f1fb}.bo-action-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}.bo-action{min-height:82px!important;padding:16px!important;border-radius:14px!important;background:#fff!important;color:var(--navy)!important;border:2px solid var(--border)!important;text-align:left!important;display:flex!important;align-items:center!important;gap:13px!important;font-size:17px!important;box-shadow:0 4px 14px rgba(23,58,94,.08)}.bo-action.primary{background:var(--navy)!important;color:#fff!important;border-color:var(--navy)!important}.bo-action .icon{font-size:28px;min-width:34px;text-align:center}.bo-control-section{background:#fff;border:1px solid var(--border);border-radius:16px;padding:16px;margin:14px 0}.bo-control-section h3{margin:0 0 12px}.bo-task-card,.bo-social-card{border:1px solid var(--border);border-radius:13px;padding:14px;margin:10px 0;background:#fff}.bo-task-card strong,.bo-social-card strong{display:block;font-size:17px;margin-bottom:5px}.bo-mobile-form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.bo-mobile-form label{font-size:13px}.bo-mobile-form .wide{grid-column:1/-1}.bo-mobile-form input,.bo-mobile-form select,.bo-mobile-form textarea{min-height:54px;font-size:16px}.bo-mobile-form textarea{min-height:100px}.bo-control-toolbar{display:flex;flex-wrap:wrap;gap:9px;margin-top:12px}.bo-control-toolbar button{min-height:54px}.bo-control-bottom{display:none}.bo-control-status{display:flex;gap:8px;flex-wrap:wrap;margin:9px 0}.bo-control-chip{padding:6px 9px;border-radius:999px;background:var(--light);font-size:12px;font-weight:800}.bo-camera-preview{max-width:100%;max-height:260px;border-radius:12px;margin-top:8px}.bo-hold{background:var(--warn);border-radius:10px;padding:10px;line-height:1.4}.bo-control-back{margin-bottom:10px}
@media(max-width:800px){.bo-control-shell{padding-bottom:76px}.bo-action-grid{grid-template-columns:1fr 1fr}.bo-action{min-height:92px!important;flex-direction:column!important;justify-content:center!important;text-align:center!important;padding:12px!important}.bo-action .icon{font-size:31px}.bo-mobile-form{grid-template-columns:1fr}.bo-mobile-form .wide{grid-column:auto}.bo-control-bottom{display:grid;grid-template-columns:repeat(4,1fr);position:fixed;left:0;right:0;bottom:0;z-index:40;background:#fff;border-top:1px solid var(--border);padding:6px}.bo-control-bottom button{background:#fff;color:var(--navy);padding:6px 2px;min-height:58px;border-radius:8px;font-size:11px}.bo-control-bottom span{display:block;font-size:21px;margin-bottom:2px}nav{display:none!important}.layout{display:block!important}main{padding:10px!important}.notice{font-size:12px}.bo-control-hero{border-radius:14px;padding:17px}.bo-control-section{padding:13px}}
</style>
<script>
var BO_CONTROL={data:null,view:'home'};
function boControlCall(action,args){return new Promise(function(resolve,reject){google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).boControlApi({action:action,args:args||{}});});}
function boControlEscape(value){return String(value==null?'':value).replace(/[&<>'"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c];});}
function boControlJs(value){return String(value||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function boControlButton(action){return '<button class="bo-action '+(action.primary?'primary':'')+'" type="button" onclick="boControlRoute(\''+boControlJs(action.route)+'\')"><span class="icon">'+boControlEscape(action.icon)+'</span><span>'+boControlEscape(action.label)+'</span></button>';}
function boControlBottom(){return '<div class="bo-control-bottom"><button onclick="boControlRoute(\'control:home\')"><span>⌂</span>Home</button><button onclick="boControlRoute(\'control:field\')"><span>✓</span>Work</button><button onclick="boControlRoute(\'control:photo\')"><span>📷</span>Camera</button><button onclick="boControlRoute(\'control:more\')"><span>⋯</span>More</button></div>';}
function boControlHost(html){document.getElementById('content').innerHTML='<div class="bo-control-shell">'+html+'</div>'+boControlBottom();}
async function boControlRefresh(){try{BO_CONTROL.data=await boControlCall('bootstrap');return BO_CONTROL.data;}catch(error){showToast(error.message||String(error),true);throw error;}}
async function boControlOpenHome(){var data=await boControlRefresh(),user=data.user||{};state.module='control';boControlHost('<section class="bo-control-hero"><p>BUSINESS OFFICE CONTROL</p><h2>Good day, '+boControlEscape(user.displayName||user.role||'User')+'</h2><p>Choose the work. Business Office routes the correct records, permissions, approvals, and proof.</p></section>'+(data.status!=='PASS'?'<div class="bo-hold"><b>Setup required.</b> '+boControlEscape(data.schema&&data.schema.message||'Owner initialization is required.')+'</div>':'')+'<div class="bo-action-grid">'+(data.actions||[]).map(boControlButton).join('')+'</div>'+boControlOverview(data));}
function boControlOverview(data){var tasks=(data.tasks||[]).slice(0,4),social=(data.socialQueue||[]).slice(0,3);return '<section class="bo-control-section"><h3>Needs attention</h3><div class="cards"><div class="card"><div class="count">'+tasks.length+'</div><div class="label">Assigned work</div></div><div class="card"><div class="count">'+social.length+'</div><div class="label">Social drafts / review</div></div><div class="card"><div class="count">'+(data.currentSession?'1':'0')+'</div><div class="label">Active field session</div></div></div></section>';}
async function boControlRoute(route){
  if(route==='control:home')return boControlOpenHome();
  if(route==='control:field')return boControlOpenField();
  if(route==='control:assign')return boControlOpenAssign();
  if(route==='control:photo')return boControlOpenPhoto();
  if(route==='control:receipt')return boControlOpenReceipt();
  if(route==='control:social')return boControlOpenSocial();
  if(route==='control:more')return boControlOpenMore();
  if(route==='app:quote-builder'){var url=new URL(location.href);url.searchParams.set('quoteBuilder','1');location.href=url.toString();return;}
  if(route.indexOf('bo:')===0)return openModule(route.slice(3));
}
function boControlBack(){return '<button class="secondary bo-control-back" onclick="boControlOpenHome()">← Control Center</button>';}
function boControlTaskCard(task,button){return '<article class="bo-task-card"><strong>'+boControlEscape(task['Task Title']||task['Task ID'])+'</strong><div>'+boControlEscape(task.Priority||'Normal')+' · '+boControlEscape(task['Due Date']||'No due date')+'</div><div class="boundary">'+boControlEscape(task.Instructions||task.Notes||'')+'</div>'+(button||'')+'</article>';}
async function boControlOpenField(){var data=await boControlRefresh(),session=data.currentSession,tasks=data.tasks||[],html=boControlBack()+'<section class="bo-control-hero"><p>FIELD OPERATIONS</p><h2>'+(session?'Work in progress':'My assigned work')+'</h2><p>Time, tasks, photos, notes, and closeout stay connected to the customer and job.</p></section>';
  if(session){html+='<section class="bo-control-section"><h3>Current task</h3><div class="bo-control-status"><span class="bo-control-chip">'+boControlEscape(session.Status)+'</span><span class="bo-control-chip">Task '+boControlEscape(session['Task ID'])+'</span><span class="bo-control-chip">Started '+boControlEscape(session['Started Time'])+'</span></div><div class="bo-control-toolbar">'+(session.Status==='WORKING'?'<button class="secondary" onclick="boControlFieldTransition(\'PAUSE\')">Pause</button>':'<button class="secondary" onclick="boControlFieldTransition(\'RESUME\')">Resume</button>')+'<button class="primary" onclick="boControlOpenPhoto(\'Completion\')">Add completion photo</button><button class="primary" onclick="boControlOpenCloseout()">Complete & clock out</button></div></section>';}
  html+='<section class="bo-control-section"><h3>Assigned tasks</h3>'+(tasks.length?tasks.map(function(task){return boControlTaskCard(task,!session?'<div class="bo-control-toolbar"><button class="primary" onclick="boControlClockIn(\''+boControlJs(task['Task ID'])+'\')">Start work</button></div>':'');}).join(''):'<div class="empty">No open assigned tasks.</div>')+'</section>';boControlHost(html);}
async function boControlClockIn(taskId){try{await boControlCall('clockIn',{payload:{taskId:taskId}});showToast('Clocked in. Task and time entry started.');boControlOpenField();}catch(error){showToast(error.message||String(error),true);}}
async function boControlFieldTransition(event){try{var session=BO_CONTROL.data.currentSession,payload={};if(event==='RESUME')payload.breakMinutes=Number(prompt('Break minutes to add:','0')||0);await boControlCall('fieldTransition',{sessionId:session['Field Session ID'],event:event,payload:payload});showToast('Field session updated.');boControlOpenField();}catch(error){showToast(error.message||String(error),true);}}
function boControlOpenCloseout(){var session=BO_CONTROL.data&&BO_CONTROL.data.currentSession;if(!session)return boControlOpenField();boControlHost(boControlBack()+'<section class="bo-control-section"><h2>Complete task and clock out</h2><div class="bo-hold">A completion photo and notes are required. Customer visibility remains locked until owner review.</div><div class="bo-mobile-form"><label class="wide">Final notes<textarea id="boCloseNotes" placeholder="What was completed? What remains?"></textarea></label><label><span><input id="boCloseChecklist" type="checkbox"> Checklist complete</span></label></div><div class="bo-control-toolbar"><button class="primary" onclick="boControlCloseout()">Complete task & clock out</button></div></section>');}
async function boControlCloseout(){try{var session=BO_CONTROL.data.currentSession,notes=document.getElementById('boCloseNotes').value.trim(),check=document.getElementById('boCloseChecklist').checked;await boControlCall('closeout',{payload:{sessionId:session['Field Session ID'],notes:notes,checklistComplete:check,ownerReviewRequired:true}});showToast('Clocked out. Time and proof are ready for owner review.');boControlOpenHome();}catch(error){showToast(error.message||String(error),true);}}
async function boControlOpenAssign(){var data=await boControlRefresh(),tasks=data.tasks||[];boControlHost(boControlBack()+'<section class="bo-control-section"><h2>Assign field task</h2><div class="bo-mobile-form"><label class="wide">Task title<input id="boAssignTitle" placeholder="Example: Install retaining wall base"></label><label>Assigned user ID<input id="boAssignUser" placeholder="USER-..."></label><label>Assigned role<select id="boAssignRole"><option value="">Select role</option><option>Foreman</option><option>Field Staff</option><option>Staff</option></select></label><label>Priority<select id="boAssignPriority"><option>Normal</option><option>High</option><option>Urgent</option><option>Low</option></select></label><label>Due date<input id="boAssignDue" type="date"></label><label>Customer ID<input id="boAssignCustomer"></label><label>Job ID<input id="boAssignJob"></label><label>Work Order ID<input id="boAssignWorkOrder"></label><label class="wide">Instructions<textarea id="boAssignInstructions"></textarea></label></div><div class="bo-control-toolbar"><button class="primary" onclick="boControlAssignTask()">Assign task</button></div></section><section class="bo-control-section"><h3>Current open work</h3>'+tasks.slice(0,6).map(function(task){return boControlTaskCard(task,'');}).join('')+'</section>');}
async function boControlAssignTask(){try{var values={'Task Title':document.getElementById('boAssignTitle').value,'Assigned User ID':document.getElementById('boAssignUser').value,'Assigned Role':document.getElementById('boAssignRole').value,Priority:document.getElementById('boAssignPriority').value,'Due Date':document.getElementById('boAssignDue').value,'Customer ID':document.getElementById('boAssignCustomer').value,'Job ID':document.getElementById('boAssignJob').value,'Work Order ID':document.getElementById('boAssignWorkOrder').value,Instructions:document.getElementById('boAssignInstructions').value,Status:'Open','Linked Record Type':document.getElementById('boAssignJob').value?'Job':'','Linked Record ID':document.getElementById('boAssignJob').value};await boControlCall('assignTask',{values:values});showToast('Task assigned.');boControlOpenField();}catch(error){showToast(error.message||String(error),true);}}
function boControlFilePreview(inputId,hostId){var file=document.getElementById(inputId).files[0],host=document.getElementById(hostId);host.innerHTML='';if(file&&file.type.indexOf('image/')===0){var image=document.createElement('img');image.src=URL.createObjectURL(file);image.className='bo-camera-preview';host.appendChild(image);}}
async function boControlOpenPhoto(type){var data=await boControlRefresh(),tasks=data.tasks||[],session=data.currentSession,selected=session&&session['Task ID']||'';boControlHost(boControlBack()+'<section class="bo-control-section"><h2>Add job photo</h2><div class="bo-mobile-form"><label>Task<select id="boPhotoTask">'+tasks.map(function(task){return '<option value="'+boControlEscape(task['Task ID'])+'" '+(task['Task ID']===selected?'selected':'')+'>'+boControlEscape(task['Task Title'])+'</option>';}).join('')+'</select></label><label>Photo type<select id="boPhotoType"><option '+(type==='Before'?'selected':'')+'>Before</option><option '+(!type||type==='Progress'?'selected':'')+'>Progress</option><option '+(type==='Completion'?'selected':'')+'>Completion</option><option>Issue</option></select></label><label class="wide">Take picture / choose photo<input id="boPhotoFile" type="file" accept="image/jpeg,image/png,image/heic,image/heif" capture="environment" onchange="boControlFilePreview(\'boPhotoFile\',\'boPhotoPreview\')"></label><div class="wide" id="boPhotoPreview"></div><label class="wide">Caption / progress note<textarea id="boPhotoCaption"></textarea></label></div><div class="bo-hold">The photo is filed with the task, job, and customer. It stays private until owner approval.</div><div class="bo-control-toolbar"><button class="primary" onclick="boControlSavePhoto()">Save photo privately</button></div></section>');}
async function boControlSavePhoto(){try{var file=document.getElementById('boPhotoFile').files[0];if(!file)throw new Error('Take or choose a photo first.');var data=await toBase64(file);await boControlCall('saveProof',{payload:{taskId:document.getElementById('boPhotoTask').value,photoType:document.getElementById('boPhotoType').value,fileName:file.name,mimeType:file.type||mimeFromName(file.name),base64Data:data,caption:document.getElementById('boPhotoCaption').value}});showToast('Photo filed privately with the customer job.');boControlOpenField();}catch(error){showToast(error.message||String(error),true);}}
async function boControlOpenReceipt(){var data=await boControlRefresh(),tasks=data.tasks||[];boControlHost(boControlBack()+'<section class="bo-control-section"><h2>Scan receipt</h2><div class="bo-mobile-form"><label class="wide">Take picture / choose PDF<input id="boReceiptFile" type="file" accept="application/pdf,image/jpeg,image/png,image/heic,image/heif" capture="environment" onchange="boControlFilePreview(\'boReceiptFile\',\'boReceiptPreview\')"></label><div class="wide" id="boReceiptPreview"></div><label>Job<select id="boReceiptJob"><option value="">Choose job</option>'+tasks.filter(function(task){return task['Job ID'];}).map(function(task){return '<option value="'+boControlEscape(task['Job ID'])+'" data-customer="'+boControlEscape(task['Customer ID'])+'">'+boControlEscape(task['Task Title'])+'</option>';}).join('')+'</select></label><label>Customer ID<input id="boReceiptCustomer"></label><label>Vendor ID<input id="boReceiptVendor"></label><label>Date<input id="boReceiptDate" type="date"></label><label>Total<input id="boReceiptTotal" type="number" step="0.01"></label><label>Tax<input id="boReceiptTax" type="number" step="0.01"></label><label>Category<select id="boReceiptCategory"><option>Materials</option><option>Fuel</option><option>Equipment</option><option>Subcontractor</option><option>Other</option></select></label><label>Payment method<select id="boReceiptPayment"><option>Company Card</option><option>Cash</option><option>Personal Reimbursement</option><option>Vendor Account</option></select></label></div><div class="bo-hold">This creates a private receipt and review item. It does not post accounting or move money.</div><div class="bo-control-toolbar"><button class="primary" onclick="boControlSaveReceipt()">Submit receipt</button></div></section>');}
async function boControlSaveReceipt(){try{var file=document.getElementById('boReceiptFile').files[0];if(!file)throw new Error('Take or choose a receipt first.');var select=document.getElementById('boReceiptJob'),option=select.options[select.selectedIndex],customer=document.getElementById('boReceiptCustomer').value||option&&option.dataset.customer||'',total=Number(document.getElementById('boReceiptTotal').value||0),tax=Number(document.getElementById('boReceiptTax').value||0),data=await toBase64(file);await boControlCall('captureReceipt',{payload:{fileName:file.name,mimeType:file.type||mimeFromName(file.name),base64Data:data,jobId:select.value,customerId:customer,vendorId:document.getElementById('boReceiptVendor').value,date:document.getElementById('boReceiptDate').value,total:total,tax:tax,subtotal:Math.max(0,total-tax),expenseCategory:document.getElementById('boReceiptCategory').value,paymentMethod:document.getElementById('boReceiptPayment').value}});showToast('Receipt logged and sent for owner review.');boControlOpenHome();}catch(error){showToast(error.message||String(error),true);}}
async function boControlOpenSocial(){var data=await boControlRefresh(),rows=await boControlCall('socialList'),caps=data.capabilities||{};boControlHost(boControlBack()+'<section class="bo-control-hero"><p>SOCIAL CONTROL</p><h2>Prepare. Review. Approve.</h2><p>Use customer-approved project proof without allowing automatic publishing.</p></section>'+(caps.prepareSocial?'<section class="bo-control-section"><h3>Create social draft</h3><div class="bo-mobile-form"><label>Platform<select id="boSocialPlatform"><option>Facebook</option><option>Instagram</option><option>Google Business Profile</option><option>LinkedIn</option></select></label><label>Content type<select id="boSocialType"><option>Project Update</option><option>Before and After</option><option>Service Tip</option><option>Customer Story</option><option>Promotion</option></select></label><label>Job ID<input id="boSocialJob"></label><label>Source document ID<input id="boSocialDocument"></label><label class="wide">Caption<textarea id="boSocialCaption"></textarea></label><label class="wide">Hashtags<input id="boSocialHashtags" placeholder="#Highway38Solutions"></label></div><div class="bo-control-toolbar"><button class="primary" onclick="boControlSaveSocial()">Save draft</button></div></section>':'')+'<section class="bo-control-section"><h3>Content queue</h3>'+rows.map(function(row){var id=boControlJs(row['Social Content ID']),buttons='<button class="secondary" onclick="boControlSocialAction(\''+id+'\',\'SUBMIT_REVIEW\')">Submit review</button>';if(caps.approveSocial)buttons+='<button class="primary" onclick="boControlSocialAction(\''+id+'\',\'APPROVE\')">Approve</button><button class="secondary" onclick="boControlSocialAction(\''+id+'\',\'REVISE\')">Revise</button><button class="secondary" onclick="boControlSocialAction(\''+id+'\',\'PUBLISH\')">Publish selected</button>';if(caps.markSocialPosted)buttons+='<button class="secondary" onclick="boControlSocialAction(\''+id+'\',\'MARK_POSTED\')">Mark posted</button>';return '<article class="bo-social-card"><strong>'+boControlEscape(row.Platform)+' · '+boControlEscape(row['Content Type'])+'</strong><div>'+boControlEscape(row.Caption)+'</div><div class="bo-control-status"><span class="bo-control-chip">'+boControlEscape(row.Status)+'</span><span class="bo-control-chip">'+boControlEscape(row['Approval Status'])+'</span></div><div class="bo-control-toolbar">'+buttons+'</div></article>';}).join('')+'</section>');}
async function boControlSaveSocial(){try{await boControlCall('socialSave',{values:{Platform:document.getElementById('boSocialPlatform').value,'Content Type':document.getElementById('boSocialType').value,'Job ID':document.getElementById('boSocialJob').value,'Source Document ID':document.getElementById('boSocialDocument').value,Caption:document.getElementById('boSocialCaption').value,Hashtags:document.getElementById('boSocialHashtags').value}});showToast('Social draft saved. Nothing was published.');boControlOpenSocial();}catch(error){showToast(error.message||String(error),true);}}
async function boControlSocialAction(recordId,action){try{var notes=action==='APPROVE'||action==='REVISE'?prompt('Decision notes:','')||'':'';var result=await boControlCall('socialAction',{recordId:recordId,action:action,notes:notes});if(result&&result.status==='HOLD')showToast(result.reason,true);else showToast('Social control updated. No automatic post occurred.');boControlOpenSocial();}catch(error){showToast(error.message||String(error),true);}}
function boControlOpenMore(){var actions=BO_CONTROL.data&&BO_CONTROL.data.actions||[];boControlHost(boControlBack()+'<section class="bo-control-section"><h2>Apps and modules</h2><div class="bo-action-grid">'+actions.filter(function(action){return !action.primary;}).map(boControlButton).join('')+'<button class="bo-action" onclick="openModule(\'customers\')"><span class="icon">👤</span><span>Customers</span></button><button class="bo-action" onclick="openModule(\'jobs\')"><span class="icon">🛠</span><span>Jobs</span></button><button class="bo-action" onclick="openModule(\'documents\')"><span class="icon">📁</span><span>Documents</span></button><button class="bo-action" onclick="openModule(\'reports\')"><span class="icon">▥</span><span>Reports</span></button></div></section>');}
function boControlInstallNav(){var original=window.renderNav;if(!original||original.__boControl)return;window.renderNav=function(){original();var nav=document.getElementById('nav');if(nav&&!document.getElementById('boControlNav'))nav.insertAdjacentHTML('afterbegin','<button id="boControlNav" class="'+(state.module==='control'?'active':'')+'" onclick="boControlOpenHome()">Control Center</button>');};window.renderNav.__boControl=true;renderNav();}
window.addEventListener('load',function(){boControlInstallNav();setTimeout(function(){boControlOpenHome().catch(function(error){showToast(error.message||String(error),true);});},50);});
</script>
