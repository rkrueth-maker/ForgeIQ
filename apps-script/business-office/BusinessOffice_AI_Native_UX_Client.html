<style>
:root{--h38-ai-accent:#2563eb;--h38-ai-ink:#17212b;--h38-ai-soft:#eef5ff;--h38-ai-line:#d8e3f0}
#h38-ai-launch{display:inline-flex!important;align-items:center;gap:8px;border-radius:12px!important;padding:10px 14px!important;background:linear-gradient(135deg,#1d4ed8,#2563eb)!important;box-shadow:0 8px 22px rgba(37,99,235,.23)!important}
#h38-ai-launch:before{content:'✦';font-size:15px}
#h38-ai-panel{width:min(500px,100vw)!important;background:#f7f9fc!important;border-left:1px solid var(--h38-ai-line)}
.h38-ai-head{padding:18px 20px!important;background:linear-gradient(135deg,#172b4d,#24456c)!important}
.h38-ai-tools{grid-template-columns:repeat(2,minmax(0,1fr))!important;padding:12px 14px!important;background:#fff;gap:9px!important}
.h38-ai-tools button{min-height:42px;text-align:left;font-weight:800;background:#fff!important;border-color:var(--h38-ai-line)!important}
.h38-ai-log{padding:18px!important;background:#f7f9fc!important}
.h38-ai-msg{border-radius:14px!important;line-height:1.5}.h38-ai-bot{box-shadow:0 4px 14px rgba(23,43,77,.06)}
.h38-ai-compose{background:#fff;padding:14px!important}.h38-ai-compose textarea{border-radius:12px!important;border-color:#b8c8db!important;min-height:92px!important}
.h38-native-ai-strip{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(280px,.6fr);gap:14px;margin:0 0 18px}
.h38-ai-brief,.h38-ai-context{background:#fff;border:1px solid var(--h38-ai-line);border-radius:16px;padding:16px;box-shadow:0 8px 24px rgba(23,43,77,.06)}
.h38-ai-brief{background:linear-gradient(135deg,#f8fbff,#eef5ff)}
.h38-ai-label{display:flex;align-items:center;gap:8px;color:#1d4ed8;font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
.h38-ai-label:before{content:'✦';font-size:15px}.h38-ai-brief h2,.h38-ai-context h2{margin:7px 0 5px;font-size:18px}.h38-ai-brief p,.h38-ai-context p{margin:0;color:#526274}
.h38-ai-prompt-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:13px}.h38-ai-prompt{border:1px solid #bfd0e5;border-radius:999px;background:#fff;color:#24456c;padding:8px 11px;font-weight:800;cursor:pointer}.h38-ai-prompt:hover{background:#eef5ff;border-color:#7ea5d6}
.h38-ai-brief-actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}.h38-ai-primary{border:0;border-radius:10px;background:#1d4ed8;color:#fff;padding:10px 13px;font-weight:900;cursor:pointer}.h38-ai-secondary{border:1px solid #b8c8db;border-radius:10px;background:#fff;color:#24456c;padding:10px 13px;font-weight:800;cursor:pointer}
body.h38-ai-panel-open main,body.h38-ai-panel-open .app-shell{transition:margin-right .22s ease}
.ux-metrics{gap:10px!important}.ux-metric{border-radius:14px!important;box-shadow:none!important;border:1px solid #dde6ef!important}.ux-section{border-radius:16px!important;border-color:#dfe7ef!important;box-shadow:0 5px 18px rgba(23,43,77,.045)!important}.ux-page-head h1{letter-spacing:-.025em}.nav-group-toggle{font-size:12px!important;letter-spacing:.04em;text-transform:uppercase}.nav-group-items button{border-radius:9px!important}
@media(max-width:980px){.h38-native-ai-strip{grid-template-columns:1fr}.h38-ai-context{display:none}}
@media(max-width:800px){#h38-ai-panel{width:100vw!important}.h38-native-ai-strip{margin:0 0 12px}.h38-ai-brief{padding:14px}.h38-ai-prompt-row{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}.h38-ai-prompt{white-space:nowrap}.ux-metrics{grid-template-columns:repeat(2,minmax(0,1fr))!important}}
</style>
<script>
(function(){
 'use strict';
 var originalOpen=null,wrappedDashboard=false;
 function aiOpen(prompt){
   var launch=document.getElementById('h38-ai-launch');
   if(launch)launch.click();
   setTimeout(function(){var input=document.getElementById('h38-ai-input');if(input&&prompt){input.value=prompt;input.focus();}},40);
 }
 window.h38AiOpenPrompt=aiOpen;
 function routeLabel(){
   var value=String(typeof CURRENT!=='undefined'?CURRENT:'today').replace(/^bo:/,'');
   var labels={today:'Today',tasks:'Tasks',decisions:'Approvals',customers:'Customers',requests:'Requests',quotes:'Quotes',jobs:'Jobs',invoices:'Invoices',payments:'Payments',expenses:'Expenses',documents:'Documents',reports:'Reports',growth:'Growth',systemHealth:'System health'};
   return labels[value]||value.replace(/([A-Z])/g,' $1').replace(/^./,function(c){return c.toUpperCase();});
 }
 function prompts(){
   var route=String(typeof CURRENT!=='undefined'?CURRENT:'today').replace(/^bo:/,'');
   var map={
     today:['Give me my morning business brief','What needs my attention first?','Find stalled work and missing next actions'],
     customers:['Summarize this customer and open work','Who needs a follow-up?','Find customers without a next action'],
     requests:['Triage new requests by urgency and value','Draft the missing intake questions','Which request should become a quote first?'],
     quotes:['Review quotes for missing scope or risk','Show quotes waiting too long','Draft a clear customer follow-up'],
     jobs:['Summarize job health and blockers','Find jobs at risk of delay','Build today’s field priorities'],
     invoices:['Show cash expected and overdue risk','Which invoices need follow-up?','Draft a professional payment reminder'],
     expenses:['Find missing receipts or coding','Summarize this month’s spending','Flag unusual expenses'],
     documents:['Summarize selected documents','Find documents needing review','Extract action items from this file'],
     reports:['Explain the numbers in plain English','What changed since last period?','Find the strongest business improvement'],
     decisions:['Summarize approvals and risk','What should I approve first?','Explain what happens after approval']
   };
   return map[route]||['Summarize this workspace','What needs attention here?','Teach me the next best step'];
 }
 function strip(){
   var route=routeLabel(),items=prompts();
   return '<div class="h38-native-ai-strip" data-h38-ai-native="1"><section class="h38-ai-brief"><div class="h38-ai-label">H38 AI daily copilot</div><h2>Ask from the work you are viewing</h2><p>H38 AI uses the current '+esc(route)+' context and keeps every external action owner-confirmed.</p><div class="h38-ai-prompt-row">'+items.map(function(p){return '<button class="h38-ai-prompt" onclick="h38AiOpenPrompt(\''+attr(p)+'\')">'+esc(p)+'</button>';}).join('')+'</div><div class="h38-ai-brief-actions"><button class="h38-ai-primary" onclick="h38AiOpenPrompt(\'Give me a concise business brief with priorities, cash, risk, and next actions.\')">Generate business brief</button><button class="h38-ai-secondary" onclick="h38AiOpenPrompt(\'Show me the strongest workflow improvements based on current records.\')">Find improvements</button></div></section><aside class="h38-ai-context"><div class="h38-ai-label">Current context</div><h2>'+esc(route)+'</h2><p>Ask questions, summarize records, prepare drafts, or create an approval-ready action without leaving this screen.</p></aside></div>';
 }
 function inject(){
   var view=document.getElementById('view');
   if(!view||view.querySelector('[data-h38-ai-native]'))return;
   var loading=view.querySelector('[data-h38-workspace-state="loading"]');if(loading)return;
   view.insertAdjacentHTML('afterbegin',strip());
 }
 function wrapDashboard(){
   if(wrappedDashboard||typeof window.renderDashboard!=='function')return;
   wrappedDashboard=true;var base=window.renderDashboard;
   window.renderDashboard=function(){var result=base.apply(this,arguments);setTimeout(inject,0);return result;};
 }
 function observe(){
   var view=document.getElementById('view');if(!view)return;
   new MutationObserver(function(){clearTimeout(window.__h38AiNativeTimer);window.__h38AiNativeTimer=setTimeout(inject,25);}).observe(view,{childList:true,subtree:false});
 }
 function panelState(){
   var panel=document.getElementById('h38-ai-panel');if(!panel)return;
   new MutationObserver(function(){document.body.classList.toggle('h38-ai-panel-open',panel.classList.contains('open'));}).observe(panel,{attributes:true,attributeFilter:['class']});
 }
 function boot(){wrapDashboard();observe();panelState();setTimeout(inject,100);}
 if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot,{once:true});else boot();
})();
</script>
