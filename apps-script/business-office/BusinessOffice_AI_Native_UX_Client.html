<style>
:root{--h38-ai-accent:#2563eb;--h38-ai-ink:#17212b;--h38-ai-soft:#eef5ff;--h38-ai-line:#d8e3f0;--h38-surface:#fff;--h38-bg:#f4f7fb;--h38-shadow:0 8px 24px rgba(23,43,77,.07)}
body{background:var(--h38-bg)!important}
#h38-ai-launch{display:inline-flex!important;align-items:center;gap:8px;border-radius:11px!important;padding:10px 14px!important;background:linear-gradient(135deg,#1d4ed8,#2563eb)!important;box-shadow:0 6px 18px rgba(37,99,235,.22)!important}
#h38-ai-launch:before{content:'✦';font-size:15px}
#h38-ai-launch:not(.h38-ai-inline){display:none!important}
#h38-ai-panel{width:min(500px,100vw)!important;background:#f7f9fc!important;border-left:1px solid var(--h38-ai-line)}
.h38-ai-head{padding:18px 20px!important;background:linear-gradient(135deg,#172b4d,#24456c)!important}
.h38-ai-tools{grid-template-columns:repeat(2,minmax(0,1fr))!important;padding:12px 14px!important;background:#fff;gap:9px!important}
.h38-ai-tools button{min-height:42px;text-align:left;font-weight:800;background:#fff!important;border-color:var(--h38-ai-line)!important}
.h38-ai-log{padding:18px!important;background:#f7f9fc!important}.h38-ai-msg{border-radius:14px!important;line-height:1.5}.h38-ai-bot{box-shadow:0 4px 14px rgba(23,43,77,.06)}
.h38-ai-compose{background:#fff;padding:14px!important}.h38-ai-compose textarea{border-radius:12px!important;border-color:#b8c8db!important;min-height:92px!important}
.h38-native-ai-strip{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(250px,.6fr);gap:14px;margin:0 0 16px}
.h38-ai-brief,.h38-ai-context{background:#fff;border:1px solid var(--h38-ai-line);border-radius:16px;padding:16px;box-shadow:var(--h38-shadow)}
.h38-ai-brief{background:linear-gradient(135deg,#fbfdff,#eef5ff)}
.h38-ai-label{display:flex;align-items:center;gap:8px;color:#1d4ed8;font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.h38-ai-label:before{content:'✦';font-size:14px}
.h38-ai-brief h2,.h38-ai-context h2{margin:7px 0 5px;font-size:18px}.h38-ai-brief p,.h38-ai-context p{margin:0;color:#526274}
.h38-ai-prompt-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:13px}.h38-ai-prompt{border:1px solid #bfd0e5;border-radius:999px;background:#fff;color:#24456c;padding:8px 11px;font-weight:800;cursor:pointer}.h38-ai-prompt:hover{background:#eef5ff;border-color:#7ea5d6}
.h38-ai-brief-actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}.h38-ai-primary{border:0;border-radius:10px;background:#1d4ed8;color:#fff;padding:10px 13px;font-weight:900;cursor:pointer}.h38-ai-secondary{border:1px solid #b8c8db;border-radius:10px;background:#fff;color:#24456c;padding:10px 13px;font-weight:800;cursor:pointer}
#view{max-width:1500px;margin:0 auto;padding-bottom:32px}.ux-metrics{gap:10px!important}.ux-metric{border-radius:14px!important;box-shadow:none!important;border:1px solid #dde6ef!important;background:#fff!important}.ux-section,.card{border-radius:15px!important;border-color:#dfe7ef!important;box-shadow:0 4px 16px rgba(23,43,77,.045)!important}.ux-page-head{padding:2px 0 8px}.ux-page-head h1{letter-spacing:-.025em;margin-bottom:4px}.nav-group-toggle{font-size:11px!important;letter-spacing:.05em;text-transform:uppercase}.nav-group-items button{border-radius:8px!important;min-height:38px}.nav-group-items button.active{font-weight:900!important}
#notice.notice.ok{display:none!important}#notice.notice.hold,#notice.notice.bad{border-radius:10px!important;padding:9px 12px!important;font-size:12px!important;margin-bottom:10px!important}
.h38-control-chip{display:inline-flex;align-items:center;gap:7px;padding:7px 10px;border:1px solid #d7b45b;background:#fff8df;color:#6f5313;border-radius:999px;font-size:12px;font-weight:800;white-space:nowrap}.h38-control-chip:before{content:'🔒';font-size:12px}
.h38-loading-shell{display:grid;gap:14px}.h38-loading-hero,.h38-loading-card{border-radius:15px;background:linear-gradient(90deg,#edf1f6 25%,#f8fafc 40%,#edf1f6 60%);background-size:300% 100%;animation:h38Shimmer 1.35s infinite}.h38-loading-hero{height:110px}.h38-loading-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.h38-loading-card{height:120px}@keyframes h38Shimmer{0%{background-position:100% 0}100%{background-position:0 0}}
body.h38-ai-panel-open:before{content:'';position:fixed;inset:0;background:rgba(13,26,45,.22);z-index:9997;pointer-events:none}
@media(max-width:1100px){.h38-native-ai-strip{grid-template-columns:1fr}.h38-ai-context{display:none}.h38-loading-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:800px){#h38-ai-panel{width:100vw!important}.h38-native-ai-strip{margin:0 0 12px}.h38-ai-brief{padding:14px}.h38-ai-prompt-row{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}.h38-ai-prompt{white-space:nowrap}.ux-metrics{grid-template-columns:repeat(2,minmax(0,1fr))!important}.h38-loading-grid{grid-template-columns:1fr}}
</style>
<script>
(function(){
 'use strict';
 var wrappedDashboard=false,observer=null;
 function aiOpen(prompt){var launch=document.getElementById('h38-ai-launch');if(launch)launch.click();setTimeout(function(){var input=document.getElementById('h38-ai-input');if(input&&prompt){input.value=prompt;input.focus();}},40);}
 window.h38AiOpenPrompt=aiOpen;
 function currentRoute(){return String(typeof CURRENT!=='undefined'?CURRENT:'today').replace(/^bo:/,'');}
 function routeLabel(){var value=currentRoute();var labels={today:'Today',dashboard:'Today',tasks:'Tasks',decisions:'Approvals',approvalsCenter:'Approvals',customers:'Customers',requests:'Requests',quotes:'Quotes',workOrders:'Work Orders',jobs:'Jobs',invoices:'Invoices',payments:'Payments',expenses:'Expenses',documents:'Documents',reports:'Reports',growth:'Growth',systemHealth:'System health'};return labels[value]||value.replace(/([A-Z])/g,' $1').replace(/^./,function(c){return c.toUpperCase();});}
 function prompts(){var route=currentRoute();var map={today:['Give me today’s business brief','What needs my attention first?','Find stalled work and missing next actions'],customers:['Summarize this customer and open work','Who needs a follow-up?','Find customers without a next action'],requests:['Triage new requests by urgency and value','Draft missing intake questions','Which request should become a quote first?'],quotes:['Review quotes for missing scope or risk','Show quotes waiting too long','Draft a clear customer follow-up'],workOrders:['Summarize work ready to schedule','Find work orders missing information','What should move next?'],jobs:['Summarize job health and blockers','Find jobs at risk of delay','Build today’s field priorities'],invoices:['Show cash expected and overdue risk','Which invoices need follow-up?','Draft a professional payment reminder'],expenses:['Find missing receipts or coding','Summarize this month’s spending','Flag unusual expenses'],documents:['Summarize selected documents','Find documents needing review','Extract action items from this file'],reports:['Explain the numbers in plain English','What changed since last period?','Find the strongest business improvement'],decisions:['Summarize approvals and risk','What should I approve first?','Explain what happens after approval'],approvalsCenter:['Summarize approvals and risk','What should I approve first?','Explain what happens after approval']};return map[route]||['Summarize this workspace','What needs attention here?','Teach me the next best step'];}
 function strip(){var route=routeLabel(),items=prompts();return '<div class="h38-native-ai-strip" data-h38-ai-native="1"><section class="h38-ai-brief"><div class="h38-ai-label">H38 AI copilot</div><h2>'+esc(currentRoute()==='today'?'Your business, prioritized':'Ask from the work you are viewing')+'</h2><p>H38 AI uses the current '+esc(route)+' context. Drafts and external actions remain owner-confirmed.</p><div class="h38-ai-prompt-row">'+items.map(function(p){return '<button class="h38-ai-prompt" onclick="h38AiOpenPrompt(\''+attr(p)+'\')">'+esc(p)+'</button>';}).join('')+'</div><div class="h38-ai-brief-actions"><button class="h38-ai-primary" onclick="h38AiOpenPrompt(\'Give me a concise business brief with priorities, cash, risk, and next actions.\')">Generate business brief</button><button class="h38-ai-secondary" onclick="h38AiOpenPrompt(\'Show me the strongest workflow improvements based on current records.\')">Find improvements</button></div></section><aside class="h38-ai-context"><div class="h38-ai-label">Current workspace</div><h2>'+esc(route)+'</h2><p>Summarize records, prepare drafts, identify risk, or build an approval-ready action without leaving this screen.</p></aside></div>';}
 function renameHome(){document.querySelectorAll('#nav button,.mobile-bottom-nav button').forEach(function(button){var text=(button.textContent||'').trim();if(text==='Home')button.innerHTML=button.innerHTML.replace('Home','Today');});}
 function collapseNav(){var active=document.querySelector('.nav-group-items button.active');document.querySelectorAll('.nav-group').forEach(function(group){var contains=active&&group.contains(active);group.classList.toggle('open',!!contains);var toggle=group.querySelector('.nav-group-toggle');if(toggle)toggle.setAttribute('aria-expanded',contains?'true':'false');});}
 function compactControlNotice(){var notice=document.getElementById('notice');if(!notice)return;var text=(notice.textContent||'').replace(/\s+/g,' ').trim();if(!text)return;if(/external actions remain locked|controlled business system|customer sending/i.test(text)){notice.className='';notice.innerHTML='<span class="h38-control-chip" title="Customer sends, financial posting, payroll export, tax finalization, publishing, advertising spend, and SMS remain approval-gated.">Owner-controlled actions</span>';}}
 function loadingSkeleton(){var view=document.getElementById('view');if(!view)return;var loading=view.querySelector('[data-h38-workspace-state="loading"]');if(loading&&!loading.querySelector('.h38-loading-shell'))loading.innerHTML='<div class="h38-loading-shell" aria-label="Loading workspace"><div class="h38-loading-hero"></div><div class="h38-loading-grid"><div class="h38-loading-card"></div><div class="h38-loading-card"></div><div class="h38-loading-card"></div></div></div>';}
 function inject(){renameHome();collapseNav();compactControlNotice();loadingSkeleton();var view=document.getElementById('view');if(!view||view.querySelector('[data-h38-ai-native]')||view.querySelector('[data-h38-workspace-state="loading"]'))return;view.insertAdjacentHTML('afterbegin',strip());}
 function wrapDashboard(){if(wrappedDashboard||typeof window.renderDashboard!=='function')return;wrappedDashboard=true;var base=window.renderDashboard;window.renderDashboard=function(){var result=base.apply(this,arguments);setTimeout(inject,0);return result;};}
 function observe(){var view=document.getElementById('view');if(!view||observer)return;observer=new MutationObserver(function(){clearTimeout(window.__h38PolishTimer);window.__h38PolishTimer=setTimeout(inject,20);});observer.observe(document.body,{childList:true,subtree:true});}
 function panelState(){var panel=document.getElementById('h38-ai-panel');if(!panel)return;new MutationObserver(function(){document.body.classList.toggle('h38-ai-panel-open',panel.classList.contains('open'));}).observe(panel,{attributes:true,attributeFilter:['class']});}
 function boot(){wrapDashboard();observe();panelState();setTimeout(inject,100);}
 if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot,{once:true});else boot();
})();
</script>
