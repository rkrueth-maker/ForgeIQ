<script>
(function(){
'use strict';
const optimized={priceBook:[],aiDraft:null};
const $=id=>document.getElementById(id);
const esc=value=>String(value==null?'':value).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money=value=>{const number=Number(String(value==null?'':value).replace(/[$,]/g,''))||0;return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(number)};
function toast(message,bad){const node=$('qbToast');if(!node)return;node.textContent=message;node.style.background=bad?'#8f1d1d':'#162331';node.classList.add('show');setTimeout(()=>node.classList.remove('show'),4200)}
function busy(on){const node=$('qbOverlay');if(node)node.classList.toggle('show',!!on)}
function call(action,args){return new Promise((resolve,reject)=>{google.script.run.withSuccessHandler(resolve).withFailureHandler(error=>{toast(error.message||String(error),true);reject(error)}).boApi({action:action,args:args||{}})})}
function dataUrl(file){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=()=>resolve(reader.result);reader.onerror=reject;reader.readAsDataURL(file)})}
function mime(file){if(file.type)return file.type;const ext=String(file.name||'').split('.').pop().toLowerCase();return {pdf:'application/pdf',jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',webp:'image/webp',heic:'image/heic',heif:'image/heif'}[ext]||'application/octet-stream'}
function renderOptimizedPriceBook(items){
  optimized.priceBook=items||[];
  const host=document.querySelector('#qbContent .catalog');
  if(!host)return;
  host.innerHTML=optimized.priceBook.length?optimized.priceBook.map((item,index)=>'<article class="catalog-card"><small>'+esc(item.Category||'Price Book')+'</small><h3>'+esc(item.Name||item['Product / Service ID']||'Item')+'</h3><p>'+esc(item['Customer Description']||item.Description||'')+'</p><div class="price">'+money(item['Standard Selling Price']||item.Price||0)+' / '+esc(item.Unit||'each')+'</div><div class="toolbar"><button class="primary" onclick="qbOptimizedCatalog('+index+')">Add to Quote</button></div></article>').join(''):'<div class="empty">No matching Price Book items.</div>';
}
window.qbOptimizedCatalog=function(index){const item=optimized.priceBook[index];if(item&&typeof window.qbAddLine==='function')window.qbAddLine(item)};
window.qbOptimizedAiLine=function(index){const details=optimized.aiDraft&&optimized.aiDraft._parsed||{},line=Array.isArray(details.suggestedLines)?details.suggestedLines[index]:null;if(line&&typeof window.qbAddLine==='function')window.qbAddLine(line)};
function install(){
  if(typeof window.qbOpen!=='function'||typeof window.qbAddLine!=='function')return false;
  window.qbPriceSearch=async function(){
    const input=$('priceSearch');
    const query=input?input.value.trim():'';
    const host=document.querySelector('#qbContent .catalog');
    const started=performance.now();
    if(host)host.innerHTML='<div class="empty">Searching Price Book…</div>';
    try{
      const rows=await call('quoteBuilderPriceBook',{options:{query:query}});
      renderOptimizedPriceBook(rows);
      const perf=$('qbPerf');if(perf)perf.textContent='price search rendered in '+Math.round(performance.now()-started)+' ms';
      console.log('H38_QB_CLIENT_TIMING',{stage:'price_search',durationMs:Math.round(performance.now()-started),query:query,rows:rows.length});
    }catch(error){if(host)host.innerHTML='<div class="notice bad">Price Book search stopped safely.</div>'}
  };
  window.qbPriceClear=function(){window.qbOpen('priceBook')};
  window.qbPrepareAi=async function(event){
    event.preventDefault();
    const customer=$('aiCustomer'),title=$('aiTitle'),notes=$('aiNotes'),fileInput=$('aiFiles'),resultHost=$('aiResult');
    if(!customer||!customer.value||!notes||!notes.value.trim())return toast('Choose a customer and enter field notes.',true);
    const files=Array.from(fileInput&&fileInput.files||[]);
    files.forEach(file=>{if(file.size>20*1024*1024)throw new Error(file.name+' exceeds 20 MB.')});
    busy(true);
    const started=performance.now();
    try{
      const refs=await Promise.all(files.map(async file=>{
        const doc=await call('uploadDocument',{payload:{fileName:file.name,mimeType:mime(file),base64Data:await dataUrl(file),documentType:'Quote Field Photo',sourceType:'Quote Builder',sourceId:customer.value,accessClassification:'Private Customer'}});
        return (doc['Document ID']||'Document')+' | '+(doc['File Name']||file.name);
      }));
      const result=await call('prepareAiQuoteDraft',{payload:{customerId:customer.value,projectTitle:title?title.value:'',notes:notes.value,photos:refs}});
      let details={};try{details=JSON.parse(result.Details||'{}')}catch(error){details={raw:result.Details||''}}
      result._parsed=details;optimized.aiDraft=result;
      if(resultHost)resultHost.innerHTML='<div class="notice good"><strong>Review draft prepared.</strong> No quote was approved or sent.</div><div class="catalog">'+((details.suggestedLines||[]).map((line,index)=>'<article class="catalog-card"><h3>'+esc(line.description||line.catalogId||'Suggested line')+'</h3><div class="price">'+(line.rate!==''?money(line.rate):'Manual price required')+'</div><button class="primary" onclick="qbOptimizedAiLine('+index+')">Add to Quote</button></article>').join('')||'<div class="empty">No Price Book match found.</div>')+'</div>';
      toast(files.length+' file'+(files.length===1?'':'s')+' processed; AI review draft staged. Nothing was sent.');
      console.log('H38_QB_CLIENT_TIMING',{stage:'parallel_photo_ai',durationMs:Math.round(performance.now()-started),files:files.length,suggestions:(details.suggestedLines||[]).length});
    }catch(error){if(resultHost)resultHost.innerHTML='<div class="notice bad"><strong>Photo / AI draft stopped safely.</strong><br>'+esc(error.message||String(error))+'</div>';toast(error.message||String(error),true)}finally{busy(false)}
  };
  return true;
}
let attempts=0;const timer=setInterval(()=>{attempts+=1;if(install()||attempts>120)clearInterval(timer)},50);
})();
</script>
