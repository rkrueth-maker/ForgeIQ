<!doctype html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root{--bg:#07101d;--panel:#0d1929;--card:#13243a;--card2:#172b45;--line:#2b4567;--text:#edf4ff;--muted:#9db0ca;--accent:#4f8cff;--ok:#22c55e;--hold:#f59e0b;--bad:#ef4444;--info:#38bdf8}
    *{box-sizing:border-box}body{margin:0;font:14px/1.45 Arial,sans-serif;background:var(--bg);color:var(--text)}button,input,select,textarea{font:inherit}.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}.side{background:#06101c;border-right:1px solid var(--line);padding:14px;position:sticky;top:0;height:100vh;overflow:auto}.brand{padding:10px;font-size:18px;font-weight:800}.brand small{display:block;color:var(--muted);font-size:11px;margin-top:3px}.nav button{width:100%;border:0;background:transparent;color:var(--muted);padding:10px;text-align:left;border-radius:9px;text-transform:capitalize;cursor:pointer}.nav button:hover,.nav button.active{background:var(--card);color:var(--text)}.top{position:sticky;top:0;z-index:5;background:rgba(7,16,29,.96);border-bottom:1px solid var(--line);padding:12px;display:flex;gap:8px}.top input{flex:1}.top input,.field input,.field textarea,.field select,.toolbar input,.toolbar select,.form-grid input,.form-grid select,.form-grid textarea{background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:9px}.content{padding:18px;max-width:1550px;margin:auto}.notice,.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px}.notice{margin-bottom:14px}.notice.ok{border-color:var(--ok)}.notice.hold{border-color:var(--hold)}.notice.bad{border-color:var(--bad)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.metric b{display:block;color:var(--muted);font-size:11px}.metric strong{font-size:25px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0;align-items:center}.toolbar .grow{flex:1;min-width:220px}.btn{border:0;border-radius:8px;padding:9px 11px;font-weight:700;cursor:pointer;background:#29405f;color:var(--text)}.btn:hover{filter:brightness(1.12)}.btn.primary{background:var(--accent)}.btn.ok{background:var(--ok);color:#052e16}.btn.hold{background:var(--hold);color:#2b1800}.btn.bad{background:var(--bad)}.btn.info{background:var(--info);color:#03202c}.btn:disabled{opacity:.45;cursor:not-allowed}.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:12px}table{width:100%;border-collapse:collapse;min-width:850px}th,td{padding:8px;border-bottom:1px solid #203552;text-align:left;vertical-align:top}th{background:#101e31;position:sticky;top:0}tbody tr.clickable{cursor:pointer}tbody tr.clickable:hover{background:#10233a}.muted{color:var(--muted)}.small{font-size:11px}.pill{display:inline-block;padding:3px 8px;border-radius:999px;background:#29405f;font-size:11px}.pill.ok{background:#14532d}.pill.hold{background:#78350f}.pill.bad{background:#7f1d1d}.drawer,.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.68);z-index:20}.drawer.open,.modal.open{display:block}.drawer-panel{margin-left:auto;width:min(1050px,100%);height:100%;overflow:auto;background:var(--bg);padding:18px}.modal-panel{width:min(850px,96%);max-height:92vh;overflow:auto;background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:18px;margin:4vh auto}.record{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px}.field{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:9px;overflow-wrap:anywhere}.field b{display:block;color:var(--muted);font-size:11px}.workspace-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}.tabs{display:flex;gap:6px;overflow:auto;padding:8px 0;margin:8px 0;border-bottom:1px solid var(--line)}.tab{white-space:nowrap;border:1px solid var(--line);background:var(--panel);color:var(--muted);border-radius:999px;padding:7px 10px;cursor:pointer}.tab.active{background:var(--accent);color:white}.section{margin:14px 0}.section h3{margin:0 0 8px}.empty{padding:18px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:10px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.form-grid label{display:flex;flex-direction:column;gap:5px;color:var(--muted);font-size:12px}.form-grid textarea{min-height:90px;resize:vertical}.form-grid .wide{grid-column:1/-1}.danger-strip{border-left:4px solid var(--hold);padding-left:10px}.mobile{display:none}pre{white-space:pre-wrap;overflow-wrap:anywhere}.right{text-align:right}
    @media(max-width:800px){.app{grid-template-columns:1fr}.side{position:fixed;z-index:30;width:245px;transform:translateX(-100%);transition:.2s}.side.open{transform:none}.mobile{display:inline-block}.content{padding:10px}.grid{grid-template-columns:repeat(2,1fr)}.drawer-panel{padding:12px}.form-grid{grid-template-columns:1fr}.form-grid .wide{grid-column:auto}}
    @media(max-width:480px){.grid,.record{grid-template-columns:1fr}.top{flex-wrap:wrap}.top input{min-width:100%}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side" id="side"><div class="brand">Highway 38<small id="release">Business Operating System</small></div><nav class="nav" id="nav"></nav></aside>
  <main>
    <div class="top"><button class="btn mobile" onclick="toggleMenu()">☰</button><input id="search" placeholder="Search all business records" onkeydown="if(event.key==='Enter')globalSearch()"><button class="btn" onclick="globalSearch()">Search</button><button class="btn" onclick="refresh()">Refresh</button></div>
    <div class="content"><div id="notice" class="notice hold">Loading secure owner session…</div><div id="view"></div></div>
  </main>
</div>
<div class="drawer" id="drawer" onclick="if(event.target===this)closeDrawer()"><div class="drawer-panel"><div class="toolbar"><button class="btn" onclick="closeDrawer()">Close</button><button class="btn" id="editFocusBtn" style="display:none" onclick="editFocusedRecord()">Edit focused record</button></div><div id="drawerBody"></div></div></div>
<div class="modal" id="formModal" onclick="if(event.target===this)closeForm()"><div class="modal-panel"><div class="workspace-head"><div><h2 id="formTitle">Record</h2><div class="muted" id="formHelp"></div></div><button class="btn" onclick="closeForm()">Close</button></div><form id="recordForm" onsubmit="submitRecord(event)"><div class="form-grid" id="formFields"></div><div class="toolbar"><button class="btn primary" type="submit">Save internal record</button><button class="btn" type="button" onclick="closeForm()">Cancel</button></div></form></div></div>
<script>
let BOOT=null,SCHEMA=null,CURRENT='dashboard',ALL_TASKS=[],ALL_ROWS=[],SEARCH_RESULTS=[],ACTIVE_WORKSPACE=null,ACTIVE_TAB='summary',FORM_STATE=null;
const TITLES={dashboard:'Dashboard',tasks:'Tasks',leads:'Leads',customers:'Customers',jobs:'Jobs',quotes:'Quotes',invoices:'Invoices',payments:'Payments',expenses:'Expenses',communications:'Communications',social:'Social',advertising:'Advertising',website:'Website',calendar:'Calendar',products:'Products',reports:'Reports',proof:'Proof Log',errors:'Error Log',settings:'Settings'};
const LIST_COLUMNS={
  leads:['Lead ID','Name','Business','Status','Product / Bundle ID','Next Action','Follow-Up Date'],customers:['Customer ID','Name','Business','Customer Status','Active Jobs','Outstanding Balance'],
  jobs:['Job ID','Customer Name','Product / Bundle ID','Job Stage','Payment Status','Due Date','Approval Status'],quotes:['Quote ID','Job ID','Product / Bundle ID','Quoted Amount','Status','Approval Status','Expiration Date'],
  invoices:['Invoice ID','Job ID','Invoice Type','Total','Amount Paid','Balance','Status','Due Date'],payments:['Payment ID','Invoice ID','Job ID','Payment Date','Amount','Payment Method','Status'],
  expenses:['Expense ID','Date','Vendor','Description','Category','Amount','Accounting Status'],communications:['Communication ID','Job ID','Channel','Direction','Recipient','Subject','Status','Approval Status'],
  social:['Social ID','Platform','Content Type','Caption','Status','Scheduled Time','Published Time'],advertising:['Campaign ID','Platform','Product / Bundle ID','Budget','Status','Spend','Leads','Revenue'],
  website:['Change ID','Page','Change Type','Requested Change','Status','Approval Status','Commit SHA'],calendar:['Event ID','Title','Event Type','Start Time','Status','Conflict Warning'],
  catalog:['Catalog ID','Record Type','Name','Family','Price','Payment Classification','Sync Status']
};
function call(name,args=[]){return new Promise((resolve,reject)=>google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[name](...args));}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function attr(v){return esc(v).replace(/`/g,'&#96;');}
function money(v){let n=Number(String(v||0).replace(/[$,]/g,''));return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(isNaN(n)?0:n);}
function notice(text,kind='hold'){let n=document.getElementById('notice');n.className='notice '+kind;n.innerHTML=text;}
function array(v){return Array.isArray(v)?v:[];}
function terminal(status){return /^(Complete|Completed|Cancelled|Archived|Rejected)$/i.test(String(status||''));}
function toggleMenu(){document.getElementById('side').classList.toggle('open');}
function renderNav(){document.getElementById('nav').innerHTML=array(BOOT&&BOOT.modules).map(m=>`<button class="${m===CURRENT?'active':''}" onclick="show('${m}')">${esc(TITLES[m]||m)}</button>`).join('');}
async function refresh(){
  try{
    [BOOT,SCHEMA]=await Promise.all([call('h38PortalBootstrap'),call('h38PortalClientSchema')]);
    document.getElementById('release').textContent=BOOT.release;
    renderNav();
    notice(`<b>Owner verified.</b> Environment: ${esc(BOOT.installed&&BOOT.installed.installed?'INSTALLED':'HOLD')} · Live external actions: <b>${BOOT.safety.liveExternalActions?'ON':'OFF'}</b> · Catalog: ${esc(BOOT.catalog.status)}`,'ok');
    await show(CURRENT);
  }catch(e){notice('HOLD / ERROR — '+esc(e.message||e),'bad');}
}
async function show(module){
  CURRENT=module;renderNav();document.getElementById('side').classList.remove('open');let v=document.getElementById('view');v.innerHTML='<div class="card">Loading…</div>';
  try{
    if(module==='dashboard')return renderDashboard(BOOT.dashboard);
    if(module==='tasks')return renderTasks(await call('h38PortalTasks',[{}]));
    if(module==='reports')return renderReports(await call('h38PortalReports'));
    if(module==='settings')return renderSettings();
    if(module==='proof')return renderRecords('Proof Log',await call('h38PortalProofLog',['']),null);
    if(module==='errors')return renderRecords('Error Log',await call('h38PortalErrorLog',['']),null);
    let entity=module==='products'?'catalog':module;
    return renderRecords(TITLES[module]||module,await call('h38PortalList',[entity,{}]),entity);
  }catch(e){notice(esc(e.message||e),'bad');v.innerHTML='<div class="card">Module is on HOLD. Review Error Log and configuration.</div>';}
}
function renderDashboard(d){
  d=d||{cards:[],recentTasks:[]};
  document.getElementById('view').innerHTML=`<h1>Business Dashboard</h1><div class="grid">${array(d.cards).map(c=>`<div class="card metric"><b>${esc(c.label)}</b><strong>${c.format==='currency'?money(c.value):esc(c.value)}</strong><div class="muted">${esc(c.detail)}</div></div>`).join('')}</div><h2>Recent operating tasks</h2>${taskTable(array(d.recentTasks))}`;
}
function taskTable(rows){
  if(!rows.length)return '<div class="empty">No tasks match the current filters.</div>';
  return `<div class="tablewrap"><table><thead><tr><th>Priority</th><th>Task</th><th>Customer / Job</th><th>Status</th><th>Due</th><th>Next action</th><th>Source</th></tr></thead><tbody>${rows.map(r=>`<tr class="clickable" onclick="openTask('${attr(r.taskId)}')"><td><span class="pill ${r.priority==='High'||r.priority==='Urgent'?'hold':''}">${esc(r.priority)}</span></td><td><b>${esc(r.title)}</b><div class="muted small">${esc(r.taskId)} · ${esc(r.type)}</div></td><td>${esc(r.customer||r.customerId)}<div class="muted small">${esc(r.jobId)}</div></td><td>${statusPill(r.status)}<div class="muted small">${esc(r.approvalStatus)}</div></td><td>${esc(r.dueDate)}</td><td>${esc(r.nextAction)}</td><td>${esc(r.sourceSystem||r.sourceSheet)}</td></tr>`).join('')}</tbody></table></div>`;
}
function statusPill(status){let s=String(status||'');let cls=/approved|paid|complete|published|active/i.test(s)?'ok':/hold|blocked|overdue|revision|needs review/i.test(s)?'hold':/reject|cancel|failed|error/i.test(s)?'bad':'';return `<span class="pill ${cls}">${esc(s||'—')}</span>`;}
function renderTasks(rows){
  ALL_TASKS=array(rows);
  document.getElementById('view').innerHTML=`<div class="workspace-head"><div><h1>Unified Tasks</h1><div class="muted">Every operating workflow connects through this selected-record queue.</div></div><button class="btn primary" onclick="openCreate('tasks')">Add internal task</button></div><div class="toolbar"><input class="grow" id="taskFilter" placeholder="Filter task, customer, job, action, source" oninput="filterTasks()"><select id="taskStatus" onchange="filterTasks()"><option value="">All statuses</option>${array(SCHEMA.statuses.task).map(s=>`<option>${esc(s)}</option>`).join('')}</select><select id="taskPriority" onchange="filterTasks()"><option value="">All priorities</option><option>Urgent</option><option>High</option><option>Normal</option><option>Low</option></select><select id="taskSort" onchange="filterTasks()"><option value="default">Priority / due</option><option value="updated">Newest update</option><option value="due">Due date</option></select></div><div id="taskRows"></div>`;
  filterTasks();
}
function filterTasks(){
  let q=(document.getElementById('taskFilter')?.value||'').toLowerCase(),status=document.getElementById('taskStatus')?.value||'',priority=document.getElementById('taskPriority')?.value||'',sort=document.getElementById('taskSort')?.value||'default';
  let rows=ALL_TASKS.filter(r=>(!q||JSON.stringify(r).toLowerCase().includes(q))&&(!status||r.status===status)&&(!priority||r.priority===priority));
  if(sort==='updated')rows.sort((a,b)=>String(b.lastUpdate||'').localeCompare(String(a.lastUpdate||'')));if(sort==='due')rows.sort((a,b)=>String(a.dueDate||'9999').localeCompare(String(b.dueDate||'9999')));
  document.getElementById('taskRows').innerHTML=taskTable(rows);
}
function renderRecords(title,rows,entity){
  ALL_ROWS=array(rows);
  let canCreate=entity&&array(SCHEMA.creatable).includes(entity),columns=entity?(LIST_COLUMNS[entity]||SCHEMA.tables[entity]?.headers?.slice(0,8)):[];
  let toolbar=`<div class="workspace-head"><div><h1>${esc(title)}</h1><div class="muted">${ALL_ROWS.length} record${ALL_ROWS.length===1?'':'s'}</div></div>${canCreate?`<button class="btn primary" onclick="openCreate('${entity}')">Add internal ${esc(entityLabel(entity))}</button>`:''}</div><div class="toolbar"><input class="grow" id="recordFilter" placeholder="Filter records" oninput="filterRecordRows('${entity||''}')"></div><div id="recordRows"></div>`;
  document.getElementById('view').innerHTML=toolbar;filterRecordRows(entity||'');
}
function filterRecordRows(entity){
  let q=(document.getElementById('recordFilter')?.value||'').toLowerCase(),rows=ALL_ROWS.filter(r=>!q||JSON.stringify(r).toLowerCase().includes(q));
  let target=document.getElementById('recordRows');if(!rows.length){target.innerHTML='<div class="empty">No records.</div>';return;}
  if(!entity){let keys=Object.keys(rows[0]||{}).filter(k=>!k.startsWith('_')).slice(0,9);target.innerHTML=plainTable(rows,keys,null);return;}
  let spec=SCHEMA.tables[entity],keys=(LIST_COLUMNS[entity]||spec.headers.slice(0,8)).filter(k=>spec.headers.includes(k));
  target.innerHTML=`<div class="tablewrap"><table><thead><tr>${keys.map(k=>`<th>${esc(k)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr class="clickable" onclick="openEntity('${entity}','${attr(r[spec.id])}')">${keys.map(k=>`<td>${formatCell(k,r[k])}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
}
function plainTable(rows,keys,onClick){return `<div class="tablewrap"><table><thead><tr>${keys.map(k=>`<th>${esc(k)}</th>`).join('')}</tr></thead><tbody>${rows.map((r,i)=>`<tr ${onClick?`class="clickable" onclick="${onClick}(${i})"`:''}>${keys.map(k=>`<td>${formatCell(k,r[k])}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;}
function formatCell(key,value){if(/Amount|Price|Total|Balance|Revenue|Spend|Budget|Profit|Tax|Fees|Discount/i.test(key)&&value!==''&&value!=null)return money(value);if(/Status/i.test(key))return statusPill(value);let s=String(value??'');return esc(s.length>180?s.slice(0,177)+'…':s);}
function entityLabel(entity){return ({communications:'communication',advertising:'campaign',website:'website change',calendar:'calendar event'}[entity]||entity.replace(/s$/,''));}
async function openTask(id){try{ACTIVE_WORKSPACE=await call('h38PortalWorkspace',[id]);ACTIVE_TAB='summary';renderWorkspace();}catch(e){notice(esc(e.message||e),'bad');}}
async function openJob(id){try{ACTIVE_WORKSPACE=await call('h38PortalJobWorkspace',[id]);ACTIVE_TAB='summary';renderWorkspace();}catch(e){notice(esc(e.message||e),'bad');}}
async function openEntity(entity,id){try{ACTIVE_WORKSPACE=await call('h38PortalRecordWorkspace',[entity,id]);ACTIVE_TAB='summary';renderWorkspace();}catch(e){notice(esc(e.message||e),'bad');}}
function renderWorkspace(){
  let w=ACTIVE_WORKSPACE||{},t=w.task||{},focus=w.focus||null;let editableFocus=(focus&&array(SCHEMA.editable).includes(focus.entity))||(t._entity==='tasks'&&w.sourceRecord);document.getElementById('editFocusBtn').style.display=editableFocus?'inline-block':'none';
  let title=t.title||focus?.id||'Workspace',sub=[t.taskId,t.jobId,t.customerId,t.catalogId].filter(Boolean).join(' · ');
  let actions=array(w.availableActions).map(a=>`<button class="btn ${a.external?'hold':'ok'}" ${a.enabled===false?'disabled':''} onclick="taskAction('${attr(t.taskId)}','${a.action}')">${esc(a.action.replaceAll('_',' '))}${a.testOnly?' · TEST ONLY':''}</button>`).join('');
  let quick=`<button class="btn" onclick="openCreate('quotes',workspaceContext())">New quote</button><button class="btn" onclick="openCreate('invoices',workspaceContext())">New invoice</button><button class="btn" onclick="openCreate('payments',workspaceContext())">Record payment</button><button class="btn" onclick="openCreate('expenses',workspaceContext())">Add expense</button><button class="btn" onclick="openCreate('communications',workspaceContext())">Email draft record</button><button class="btn" onclick="openCreate('social',workspaceContext())">Social post</button><button class="btn" onclick="openCreate('advertising',workspaceContext())">Ad plan</button><button class="btn" onclick="openCreate('website',workspaceContext())">Website change</button>`;
  let tabs=['summary','task','customer','leads','job','quotes','invoices','payments','expenses','communications','social','advertising','website','calendar','proof','errors'];
  document.getElementById('drawerBody').innerHTML=`<div class="workspace-head"><div><h2>${esc(title)}</h2><div class="muted">${esc(sub)}</div><div class="toolbar">${statusPill(t.status)} ${statusPill(t.approvalStatus)}</div></div><div class="right"><div class="pill hold">External actions locked</div></div></div><div class="toolbar">${actions||'<span class="muted">No pending task actions.</span>'}</div><div class="toolbar">${quick}</div><div class="tabs">${tabs.map(x=>`<button class="tab ${ACTIVE_TAB===x?'active':''}" onclick="setWorkspaceTab('${x}')">${esc(TITLES[x]||capitalize(x))}${sectionCount(x,w)}</button>`).join('')}</div><div id="workspaceSection"></div>`;
  document.getElementById('drawer').classList.add('open');renderWorkspaceSection();
}
function sectionCount(name,w){let v=w[name];return Array.isArray(v)?` (${v.length})`:'';}
function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function setWorkspaceTab(tab){ACTIVE_TAB=tab;renderWorkspace();}
function workspaceContext(){let w=ACTIVE_WORKSPACE||{},t=w.task||{},j=w.job||{};return {taskId:t.taskId||'',jobId:t.jobId||j['Job ID']||'',customerId:t.customerId||j['Customer ID']||'',catalogId:t.catalogId||j['Product / Bundle ID']||''};}
function renderWorkspaceSection(){
  let w=ACTIVE_WORKSPACE||{},name=ACTIVE_TAB,target=document.getElementById('workspaceSection');if(!target)return;
  if(name==='summary'){
    let s=w.summary||{};target.innerHTML=`<div class="grid">${Object.entries(s).map(([k,v])=>`<div class="card metric"><b>${esc(humanize(k))}</b><strong>${/balance|payments|expenses/i.test(k)?money(v):esc(v)}</strong></div>`).join('')}</div><div class="section"><h3>Current next action</h3><div class="card danger-strip">${esc(w.task?.nextAction||'No pending next action.')}</div></div><div class="section"><h3>Focused record</h3>${recordFields(w.focus?.record||w.sourceRecord||w.task)}</div>`;return;
  }
  let value=w[name];
  if(Array.isArray(value)){target.innerHTML=`<div class="section"><h3>${esc(TITLES[name]||capitalize(name))}</h3>${workspaceRecords(name,value)}</div>`;return;}
  target.innerHTML=`<div class="section"><h3>${esc(TITLES[name]||capitalize(name))}</h3>${recordFields(value)}</div>`;
}
function workspaceRecords(entity,rows){
  rows=array(rows);if(!rows.length)return '<div class="empty">No linked records.</div>';
  let keys=Object.keys(rows[0]||{}).filter(k=>!k.startsWith('_')).slice(0,8);let realEntity=entity==='proof'||entity==='errors'?null:entity;
  return `<div class="tablewrap"><table><thead><tr>${keys.map(k=>`<th>${esc(k)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr ${realEntity&&SCHEMA.tables[realEntity]?`class="clickable" onclick="openEntity('${realEntity}','${attr(r[SCHEMA.tables[realEntity].id])}')"`:''}>${keys.map(k=>`<td>${formatCell(k,r[k])}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
}
function recordFields(obj){if(!obj)return '<div class="empty">No linked record.</div>';return `<div class="record">${Object.entries(obj).filter(([k])=>!k.startsWith('_')).map(([k,v])=>`<div class="field"><b>${esc(k)}</b>${formatCell(k,Array.isArray(v)?v.join(', '):v)}</div>`).join('')}</div>`;}
function humanize(s){return String(s).replace(/([a-z])([A-Z])/g,'$1 $2').replace(/_/g,' ').replace(/^./,m=>m.toUpperCase());}
async function taskAction(id,action){
  let input={};
  if(/HOLD|REVISE|REJECT/.test(action)){input.reason=prompt('Reason / required correction')||'';input.nextAction=input.reason;}
  if(action==='SCHEDULE_SOCIAL')input.scheduledTime=prompt('Scheduled time (ISO or readable date/time)')||'';
  if(!confirm(`Selected task only: ${action}\n${id}\nExternal functions remain locked; external buttons perform gate verification only.`))return;
  try{let r=await call('h38PortalTaskAction',[id,action,input]);notice(esc(r.message),/PASS/.test(r.status)?'ok':'hold');ACTIVE_WORKSPACE=await call('h38PortalWorkspace',[id]);renderWorkspace();if(CURRENT==='tasks')renderTasks(await call('h38PortalTasks',[{}]));}
  catch(e){notice(esc(e.message||e),'bad');}
}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');ACTIVE_WORKSPACE=null;}
function editFocusedRecord(){let w=ACTIVE_WORKSPACE||{},f=w.focus;if(f)return openCreate(f.entity,{},f.record);if(w.task&&w.task._entity==='tasks'&&w.sourceRecord)return openCreate('tasks',{},w.sourceRecord);}
function openCreate(entity,context={},record=null){
  if(!SCHEMA.tables[entity]){notice('Form unavailable for '+esc(entity),'hold');return;}
  FORM_STATE={entity,context:context||{},record:record||null};let spec=SCHEMA.tables[entity],isEdit=!!record;
  document.getElementById('formTitle').textContent=(isEdit?'Edit ':'Add internal ')+entityLabel(entity);
  document.getElementById('formHelp').textContent='Internal record only. Customer sends, payments, publishing, ad spend, delivery, triggers, and deployment remain locked.';
  let exclude=['Created Time','Updated Time','Proof Log ID','Sent Time','Published Time','Deployment Time','Source Row','Last Update'];
  let fields=spec.headers.filter(h=>!exclude.includes(h));
  document.getElementById('formFields').innerHTML=fields.map(h=>formField(entity,h,record?record[h]:prefill(h,context))).join('');
  document.getElementById('formModal').classList.add('open');
}
function prefill(header,c){let map={'Task ID':'taskId','Job ID':'jobId','Customer ID':'customerId','Related Customer ID':'customerId','Product / Bundle ID':'catalogId'};return c[map[header]]||'';}
function formField(entity,h,value){
  let id='f_'+btoa(unescape(encodeURIComponent(h))).replace(/=/g,''),wide=/Notes|Scope|Caption|Copy|Requested Change|Before State|Proposed State|Deliverables|Missing Information|Test Results|Rollback|Description|Address|Exclusions|Optional Extras/i.test(h),type=/Date$| Date$/.test(h)?'date':/Time$/.test(h)?'datetime-local':/Amount|Price|Total|Balance|Revenue|Spend|Budget|Tax|Fees|Discount|Revisions Used|Allowance/i.test(h)?'number':'text';
  let statusKey=entity==='tasks'?'task':entity==='jobs'?'job':entity==='communications'?'communication':entity==='expenses'?'expense':entity.replace(/s$/,'');
  let options=null;
  if(h==='Status'&&SCHEMA.statuses[statusKey])options=SCHEMA.statuses[statusKey];if(h==='Job Stage')options=SCHEMA.statuses.job;if(h==='Customer Status')options=SCHEMA.statuses.customer;if(h==='Accounting Status')options=SCHEMA.statuses.expense;
  if(h==='Priority')options=['Urgent','High','Normal','Low'];if(h==='Category'&&entity==='expenses')options=SCHEMA.expenseCategories;if(h==='Product / Bundle ID')options=array(SCHEMA.catalog).map(x=>({value:x.id,label:`${x.id} — ${x.name} — ${money(x.price)}`}));if(h==='Quote ID'&&ACTIVE_WORKSPACE)options=array(ACTIVE_WORKSPACE.quotes).map(x=>({value:x['Quote ID'],label:`${x['Quote ID']} — ${money(x['Quoted Amount'])} — ${x.Status}`}));if(h==='Invoice ID'&&ACTIVE_WORKSPACE)options=array(ACTIVE_WORKSPACE.invoices).map(x=>({value:x['Invoice ID'],label:`${x['Invoice ID']} — ${money(x.Balance)} balance — ${x.Status}`}));
  let control;
  if(options){control=`<select id="${id}" data-header="${attr(h)}"><option value="">—</option>${options.map(o=>{let val=typeof o==='string'?o:o.value,lab=typeof o==='string'?o:o.label;return `<option value="${attr(val)}" ${String(value||'')===String(val)?'selected':''}>${esc(lab)}</option>`;}).join('')}</select>`;}
  else if(wide)control=`<textarea id="${id}" data-header="${attr(h)}">${esc(value||'')}</textarea>`;
  else control=`<input id="${id}" data-header="${attr(h)}" type="${type}" ${type==='number'?'step="0.01"':''} value="${attr(value||'')}">`;
  return `<label class="${wide?'wide':''}"><span>${esc(h)}</span>${control}</label>`;
}
function closeForm(){document.getElementById('formModal').classList.remove('open');FORM_STATE=null;}
async function submitRecord(event){
  event.preventDefault();let state=FORM_STATE;if(!state)return;let data={};document.querySelectorAll('#formFields [data-header]').forEach(el=>{data[el.dataset.header]=el.value;});
  if(state.record){let id=SCHEMA.tables[state.entity].id;data[id]=state.record[id];}
  try{
    let result;
    if(!state.record&&state.entity==='quotes')result=await call('h38PortalCreateQuoteFromCatalog',[data]);
    else if(!state.record&&state.entity==='invoices')result=await call('h38PortalCreateInvoiceFromQuote',[data]);
    else if(!state.record&&state.entity==='payments')result=await call('h38PortalRecordPayment',[data]);
    else if(!state.record&&state.entity==='expenses')result=await call('h38PortalRecordExpense',[data]);
    else if(!state.record&&state.entity==='communications')result=await call('h38PortalCreateCommunicationDraft',[data]);
    else result=await call('h38PortalSaveBusinessRecord',[state.entity,data,{createTask:!state.record}]);
    notice('Internal record saved. No external action occurred.','ok');closeForm();
    if(ACTIVE_WORKSPACE){let ctx=workspaceContext();ACTIVE_WORKSPACE=ctx.jobId?await call('h38PortalJobWorkspace',[ctx.jobId]):await call('h38PortalWorkspace',[ctx.taskId]);renderWorkspace();}
    else await show(CURRENT);
  }catch(e){notice(esc(e.message||e),'bad');}
}
function renderReports(r){let s=r.summary||{};document.getElementById('view').innerHTML=`<h1>Reporting & Accounting Readiness</h1><div class="notice">Actual values, estimates, and missing data are separated. Generated ${esc(r.generated)}</div><div class="grid">${Object.entries(s).filter(([k])=>k!=='actual').map(([k,v])=>`<div class="card metric"><b>${esc(humanize(k))}</b><strong>${/payments|expenses|cash|profit|spend/i.test(k)?money(v):k==='quoteConversionRate'?esc(v)+'%':esc(v)}</strong></div>`).join('')}</div><div class="toolbar"><button class="btn" onclick="accountingCsv()">Download accounting CSV</button></div><div class="card"><b>Missing-data rule</b><p>${esc(r.labels.missing)}</p></div>`;}
function renderSettings(){let rows=array(BOOT.integrations).map(a=>`<tr><td>${esc(a.name)}</td><td>${esc(a.mode)}</td><td>${statusPill(a.status)}</td><td>${esc(a.notes)}</td><td><button class="btn" onclick="testAdapter('${a.id}')">Test contract</button></td></tr>`).join('');document.getElementById('view').innerHTML=`<h1>System Settings & Safety</h1><div class="grid"><div class="card"><b>Install</b><pre>${esc(JSON.stringify(BOOT.installed,null,2))}</pre></div><div class="card"><b>Catalog</b><pre>${esc(JSON.stringify(BOOT.catalog,null,2))}</pre></div><div class="card"><b>Safety</b><pre>${esc(JSON.stringify(BOOT.safety,null,2))}</pre></div></div><div class="toolbar"><button class="btn" id="selfTestButton" onclick="selfTest()">Run non-destructive self-test</button><button class="btn" onclick="accountingCsv()">Accounting CSV</button></div><div id="selfTestResult" class="card muted">Self-test has not been run.</div><div class="tablewrap"><table><thead><tr><th>Adapter</th><th>Mode</th><th>Status</th><th>Notes</th><th>Test</th></tr></thead><tbody>${rows}</tbody></table></div>`;}
async function selfTest(){
  const button=document.getElementById('selfTestButton');
  const output=document.getElementById('selfTestResult');

  if(button){
    button.disabled=true;
    button.textContent='Running self-test…';
  }

  if(output){
    output.className='notice hold';
    output.innerHTML='<b>Running non-destructive self-test…</b>';
  }

  try{
    const result=await call('h38PortalSelfTest');
    const passed=result&&result.status==='PASS';
    const status=esc(result&&result.status?result.status:'UNKNOWN');

    if(output){
      output.className='notice '+(passed?'ok':'hold');
      output.innerHTML='<b>Self-test '+status+'</b><pre>'+esc(JSON.stringify(result,null,2))+'</pre>';
      output.scrollIntoView({behavior:'smooth',block:'nearest'});
    }

    notice('Self-test '+status,passed?'ok':'hold');
  }catch(error){
    const message=esc(error&&error.message?error.message:error);

    if(output){
      output.className='notice bad';
      output.innerHTML='<b>Self-test failed</b><pre>'+message+'</pre>';
      output.scrollIntoView({behavior:'smooth',block:'nearest'});
    }

    notice('Self-test failed — '+message,'bad');
  }finally{
    if(button){
      button.disabled=false;
      button.textContent='Run non-destructive self-test';
    }
  }
}
async function testAdapter(id){try{let r=await call('h38PortalAdapterTest',[id]);notice(esc(r.message),'ok');}catch(e){notice(esc(e.message||e),'bad');}}
async function accountingCsv(){let csv=await call('h38PortalAccountingCsv'),blob=new Blob([csv],{type:'text/csv'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='highway-38-accounting-export.csv';a.click();URL.revokeObjectURL(url);}
async function globalSearch(){let q=document.getElementById('search').value.trim();if(!q)return;try{SEARCH_RESULTS=await call('h38PortalGlobalSearch',[q]);CURRENT='search';renderNav();document.getElementById('view').innerHTML=`<h1>Search results</h1><div class="muted">${SEARCH_RESULTS.length} matching records</div>${SEARCH_RESULTS.length?plainTable(SEARCH_RESULTS,['entity','id','title'],'openSearchResult'):'<div class="empty">No matches.</div>'}`;}catch(e){notice(esc(e.message||e),'bad');}}
function openSearchResult(index){let r=SEARCH_RESULTS[index];if(r)openEntity(r.entity,r.id);}
refresh();
</script>
