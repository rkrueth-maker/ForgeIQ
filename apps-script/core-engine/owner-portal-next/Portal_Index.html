<section class="auth-shell" id="authShell">
  <form class="auth-card" id="loginForm">
    <div class="brand">Highway 38<small>Secure Owner Portal</small></div>
    <h1>Authorized users only</h1>
    <p class="muted">Accounts are created only after an Owner invitation.</p>
    <label>Email<input id="loginEmail" type="email" autocomplete="username" required></label>
    <label>Password<input id="loginPassword" type="password" autocomplete="current-password" required></label>

    <div class="content"><div id="notice" class="notice hold">Loading secure owner session…</div><div id="view"></div></div>
  </main>
</div>
<div class="drawer" id="drawer" onclick="if(event.target===this)closeDrawer()"><div class="drawer-panel"><div class="toolbar"><button class="btn" onclick="closeDrawer()">Close</button><button class="btn" id="editFocusBtn" style="display:none" onclick="editFocusedRecord()">Edit focused record</button></div><div id="drawerBody"></div></div></div>
<div class="modal" id="formModal" onclick="if(event.target===this)closeForm()"><div class="modal-panel"><div class="workspace-head"><div><h2 id="formTitle">Record</h2><div class="muted" id="formHelp"></div></div><button class="btn" onclick="closeForm()">Close</button></div><form id="recordForm" onsubmit="submitRecord(event)"><div class="form-grid" id="formFields"></div><div class="toolbar"><button class="btn primary" type="submit">Save internal record</button><button class="btn" type="button" onclick="closeForm()">Cancel</button></div></form></div></div>
