<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Highway 38 Product Proof Generator</title>
  <style>
    :root{--ink:#17242a;--muted:#5e6b71;--paper:#fffdf9;--line:#d9d1c5;--orange:#c85f28;--orange-soft:#fff0e5;--green:#386044;--green-soft:#e8f1ea;--blue:#274b5f;--blue-soft:#e8f0f4;--dark:#14232b}*{box-sizing:border-box}html,body{margin:0;width:1200px;height:675px;overflow:hidden;font-family:Arial,Helvetica,sans-serif;background:#e9e2d8;color:var(--ink)}body{padding:28px}.sheet{height:619px;background:var(--paper);border:1px solid #cfc5b8;border-radius:24px;box-shadow:0 20px 55px rgba(22,34,40,.16);overflow:hidden;display:grid;grid-template-rows:auto 1fr}.top{background:linear-gradient(115deg,#172830,#244b5d);color:#fff;padding:22px 28px;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center}.eyebrow{font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:800;color:#f1b38f}.top h1{font-size:32px;line-height:1;margin:5px 0 7px}.top p{margin:0;color:#d9e5e9;font-size:15px}.id{border:1px solid rgba(255,255,255,.28);border-radius:999px;padding:9px 13px;font-weight:800;font-size:13px}.body{padding:22px 28px;display:grid;gap:16px}.grid-3{grid-template-columns:1.15fr 1fr .95fr}.grid-2{grid-template-columns:1.15fr .85fr}.card{border:1px solid var(--line);border-radius:16px;padding:15px;background:#fff}.card h2,.card h3{margin:0 0 10px;line-height:1.05}.card h2{font-size:19px}.card h3{font-size:15px}.small{font-size:12px;color:var(--muted)}.pill{display:inline-block;border-radius:999px;padding:5px 8px;background:var(--orange-soft);color:#8a3a18;font-size:11px;font-weight:800;margin:0 4px 4px 0}.metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.metric{border-radius:13px;padding:12px;background:var(--blue-soft);border:1px solid #cbdde5}.metric strong{display:block;font-size:24px;color:var(--blue)}.metric span{font-size:11px;color:var(--muted)}table{width:100%;border-collapse:collapse;font-size:12px}th{text-align:left;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--line);padding:7px 6px}td{padding:8px 6px;border-bottom:1px solid #eee7dd;vertical-align:top}.status{font-weight:800;color:var(--green)}.flow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.step{background:var(--blue);color:#fff;border-radius:12px;padding:11px 12px;font-size:12px;font-weight:700;min-width:112px;text-align:center}.arrow{color:var(--orange);font-size:20px;font-weight:900}.file-tree{font-family:Consolas,monospace;font-size:12px;line-height:1.55;background:#f7f3ed;border-radius:12px;padding:12px}.folder{color:var(--blue);font-weight:800}.warning{background:#fff4e8;border:1px solid #efc7a8;border-radius:12px;padding:10px;color:#7f3a18;font-size:12px}.good{background:var(--green-soft);border:1px solid #bdd3c2;border-radius:12px;padding:10px;color:#285333;font-size:12px}.diagram{position:relative;height:240px;border:1px solid var(--line);border-radius:14px;background:linear-gradient(#f9f7f3 1px,transparent 1px),linear-gradient(90deg,#f9f7f3 1px,transparent 1px);background-size:24px 24px;overflow:hidden}.machine,.fixture,.camera,.robot,.part,.conveyor{position:absolute;border-radius:12px;border:2px solid var(--blue);background:#dfeaf0;color:var(--blue);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;text-align:center}.machine{left:38px;top:55px;width:185px;height:125px}.fixture{left:275px;top:82px;width:175px;height:72px;background:#f7e3d5;border-color:var(--orange);color:#8a3a18}.camera{left:505px;top:28px;width:130px;height:66px;background:#e8f1ea;border-color:var(--green);color:var(--green)}.robot{right:40px;top:48px;width:155px;height:145px;background:#ede8f5;border-color:#62548a;color:#51457a}.part{left:510px;bottom:26px;width:120px;height:54px}.conveyor{right:238px;bottom:24px;width:170px;height:52px}.line{position:absolute;height:4px;background:var(--orange);transform-origin:left center}.checklist{display:grid;grid-template-columns:1fr 1fr;gap:7px;font-size:12px}.check{border:1px solid var(--line);border-radius:10px;padding:8px 9px;background:#fff}.check::before{content:'✓';color:var(--green);font-weight:900;margin-right:6px}.footer-note{font-size:11px;color:var(--muted);align-self:end}.bar{height:12px;border-radius:999px;background:#ece5db;overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--orange),#e89a6f)}.compare{display:grid;grid-template-columns:1fr 1fr;gap:10px}.sample-box{border-radius:12px;padding:12px;border:1px solid var(--line)}.sample-box.good-sample{background:#ebf4ed;border-color:#bcd5c2}.sample-box.bad-sample{background:#fff0e8;border-color:#e8bda6}.sequence{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.sequence .step{min-width:0;padding:14px 7px}.rfq{display:grid;grid-template-columns:1fr 1fr;gap:8px}.rfq div{border:1px solid var(--line);border-radius:10px;padding:9px;background:#faf8f4;font-size:12px}.rfq strong{display:block;color:var(--blue);margin-bottom:3px}
  </style>
</head>
<body>
<div class="sheet" id="sheet"></div>
<script>
const products={
'H38-P008':{name:'Digital Workflow Build',sub:'Working intake → tracker → owner review workflow',body:`<div class="body grid-2"><section class="card"><h2>Owner-controlled workflow</h2><div class="flow"><span class="step">Request form</span><span class="arrow">→</span><span class="step">Lead tracker</span><span class="arrow">→</span><span class="step">Draft queue</span><span class="arrow">→</span><span class="step">Owner review</span></div><h3 style="margin-top:16px">Test records</h3><table><tr><th>Job</th><th>Status</th><th>Next action</th><th>Gate</th></tr><tr><td>H38-DEMO-021</td><td class="status">Need Info</td><td>Request two measurements</td><td>Draft only</td></tr><tr><td>H38-DEMO-022</td><td class="status">Ready Review</td><td>Review quote packet</td><td>Rick approval</td></tr><tr><td>H38-DEMO-023</td><td>Complete</td><td>Archive proof</td><td>Logged</td></tr></table></section><aside class="card"><h2>Dashboard</h2><div class="metric-row"><div class="metric"><strong>3</strong><span>open requests</span></div><div class="metric"><strong>1</strong><span>needs review</span></div><div class="metric"><strong>0</strong><span>auto-sends</span></div></div><h3 style="margin-top:16px">Included handoff</h3><div class="checklist"><div class="check">Field map</div><div class="check">Test records</div><div class="check">Operating SOP</div><div class="check">Recovery steps</div><div class="check">Owner controls</div><div class="check">Rollback notes</div></div><p class="footer-note">Hypothetical demonstration — no customer data.</p></aside></div>`},
'H38-P009':{name:'Cleanup Implementation',sub:'Controlled inventory, folder rebuild, and maintenance handoff',body:`<div class="body grid-3"><section class="card"><h2>Completed folder structure</h2><div class="file-tree"><span class="folder">01 Intake and Source Files/</span><br>├─ Original uploads<br>├─ Customer notes<br><span class="folder">02 Photos and Proof/</span><br>├─ 2026-07-11 - Garage - East wall.jpg<br><span class="folder">03 Working Documents/</span><br>├─ Scope draft<br><span class="folder">04 Final Deliverables/</span><br><span class="folder">99 Hold for Review/</span></div></section><section class="card"><h2>Cleanup index</h2><table><tr><th>Type</th><th>Count</th><th>Action</th></tr><tr><td>Renamed</td><td>42</td><td class="status">Complete</td></tr><tr><td>Duplicates</td><td>11</td><td>Held, not deleted</td></tr><tr><td>Unknown</td><td>7</td><td>Owner review</td></tr><tr><td>Final files</td><td>9</td><td class="status">Indexed</td></tr></table><div class="warning" style="margin-top:12px">No permanent deletion without a reviewed rule and explicit approval.</div></section><aside class="card"><h2>Maintenance rules</h2><span class="pill">YYYY-MM-DD</span><span class="pill">Category</span><span class="pill">Description</span><div class="checklist" style="grid-template-columns:1fr;margin-top:12px"><div class="check">Weekly inbox sort</div><div class="check">Monthly duplicate review</div><div class="check">Unknowns stay in Hold</div><div class="check">Final index updated</div></div></aside></div>`},
'H38-P010':{name:'Automation Opportunity Snapshot',sub:'One process evaluated for automation value and first-test readiness',body:`<div class="body grid-2"><section class="card"><h2>Current process</h2><div class="diagram"><div class="machine">Manual machine load</div><div class="part">Finished part bin</div><div class="line" style="left:220px;top:116px;width:285px"></div><div class="line" style="left:500px;top:116px;width:4px;height:130px"></div></div></section><aside class="card"><h2>Decision snapshot</h2><div class="metric-row"><div class="metric"><strong>68s</strong><span>observed cycle</span></div><div class="metric"><strong>21s</strong><span>operator wait</span></div><div class="metric"><strong>31%</strong><span>automation window</span></div></div><h3 style="margin-top:14px">Recommended first test</h3><div class="good">Time 30 consecutive cycles and separate machine run, load/unload, walk, inspection, and wait time.</div><h3 style="margin-top:12px">Do not assume</h3><div class="warning">Part presentation, guarding, gripper reliability, and machine interface remain unverified.</div></aside></div>`},
'H38-P011':{name:'Shop Bottleneck and ROI Audit',sub:'Cycle evidence, loss categories, and investment decision range',body:`<div class="body grid-2"><section class="card"><h2>Observed time distribution</h2><table><tr><th>Category</th><th>Sec/cycle</th><th>Share</th></tr><tr><td>Machine running</td><td>47</td><td><div class="bar"><span style="width:69%"></span></div></td></tr><tr><td>Load / unload</td><td>12</td><td><div class="bar"><span style="width:18%"></span></div></td></tr><tr><td>Walk / retrieve</td><td>6</td><td><div class="bar"><span style="width:9%"></span></div></td></tr><tr><td>Delay / search</td><td>3</td><td><div class="bar"><span style="width:4%"></span></div></td></tr></table><h3 style="margin-top:14px">Primary bottleneck</h3><div class="warning">Operator services two stations, but raw and finished part locations force a crossed travel path.</div></section><aside class="card"><h2>ROI range</h2><div class="metric-row"><div class="metric"><strong>$42k</strong><span>low concept</span></div><div class="metric"><strong>$78k</strong><span>high concept</span></div><div class="metric"><strong>18–31</strong><span>months payback</span></div></div><h3 style="margin-top:14px">Decision</h3><div class="good">Collect two weeks of cycle and idle-reason data before requesting vendor concepts.</div><p class="small">Planning estimate only. Vendor pricing, uptime, labor rate, and production volume must be validated.</p></aside></div>`},
'H38-P012':{name:'Automation Vendor Quote Pack',sub:'Comparable vendor scope, questions, exclusions, and acceptance test',body:`<div class="body grid-2"><section class="card"><h2>RFQ scope</h2><div class="rfq"><div><strong>Part family</strong>Three machined housings</div><div><strong>Machine</strong>Existing vertical CNC</div><div><strong>Load target</strong>One part every 68 sec</div><div><strong>Presentation</strong>Tray or drawer concept</div><div><strong>Inspection</strong>Presence + orientation</div><div><strong>Owner gate</strong>No production change without approval</div></div><h3 style="margin-top:14px">Vendor response table</h3><table><tr><th>Vendor</th><th>Price</th><th>Lead</th><th>Exceptions</th></tr><tr><td>A</td><td>$84,500</td><td>18 wk</td><td>Tray supplied by owner</td></tr><tr><td>B</td><td>$97,200</td><td>22 wk</td><td>Vision optional</td></tr></table></section><aside class="card"><h2>Acceptance tests</h2><div class="checklist" style="grid-template-columns:1fr"><div class="check">50-cycle unattended demonstration</div><div class="check">Recovery after missing part</div><div class="check">Wrong-orientation rejection</div><div class="check">Manual-mode access review</div><div class="check">Cycle target documented</div></div><div class="warning" style="margin-top:12px">Final guarding and risk assessment require qualified professional validation.</div></aside></div>`},
'H38-P013':{name:'Fixture/Jig Concept Review',sub:'Locating, clamping, loading, tolerance, and operator-access concept',body:`<div class="body grid-2"><section class="card"><h2>Concept layout</h2><div class="diagram"><div class="machine">Machine table</div><div class="fixture">3-2-1 locating fixture<br>two swing clamps</div><div class="part">Part datum A</div><div class="line" style="left:222px;top:116px;width:53px"></div><div class="line" style="left:448px;top:116px;width:62px"></div></div></section><aside class="card"><h2>Concept notes</h2><table><tr><th>Feature</th><th>Recommendation</th></tr><tr><td>Primary location</td><td>Rest on machined datum A</td></tr><tr><td>Secondary</td><td>Round pin at datum B</td></tr><tr><td>Tertiary</td><td>Diamond pin at datum C</td></tr><tr><td>Clamp</td><td>Down and toward fixed stops</td></tr><tr><td>Load check</td><td>Clear top access, one-hand placement</td></tr></table><div class="warning" style="margin-top:12px">Concept only; force, deflection, tolerance stack, and machine-clearance validation remain required.</div></aside></div>`},
'H38-P014':{name:'Vision/Inspection Concept Review',sub:'Good/bad sample plan, lighting concept, and measurable acceptance criteria',body:`<div class="body grid-2"><section class="card"><h2>Sample strategy</h2><div class="compare"><div class="sample-box good-sample"><h3>GOOD</h3><p><strong>Feature:</strong> clip fully seated</p><p><strong>Contrast:</strong> continuous bright edge</p><p><strong>Result:</strong> accept</p></div><div class="sample-box bad-sample"><h3>BAD</h3><p><strong>Feature:</strong> clip raised 1.5 mm</p><p><strong>Contrast:</strong> edge break visible</p><p><strong>Result:</strong> reject</p></div></div><h3 style="margin-top:14px">Lighting trial</h3><div class="flow"><span class="step">Diffuse dome</span><span class="arrow">→</span><span class="step">Fixed exposure</span><span class="arrow">→</span><span class="step">Edge measurement</span></div></section><aside class="card"><h2>Acceptance criteria</h2><div class="checklist" style="grid-template-columns:1fr"><div class="check">50 known-good samples pass</div><div class="check">All seeded defects rejected</div><div class="check">Part-position variation tested</div><div class="check">Lens and lighting locked</div><div class="check">False reject rate recorded</div></div><div class="warning" style="margin-top:12px">Final capability depends on real samples, optics, lighting, resolution, and production variation.</div></aside></div>`},
'H38-P015':{name:'Robot Tending Concept Pack',sub:'Sequence, cell blocks, interfaces, recovery, and unresolved safety boundaries',body:`<div class="body grid-2"><section class="card"><h2>Cell block layout</h2><div class="diagram"><div class="machine">CNC machine</div><div class="robot">6-axis robot<br>dual gripper</div><div class="conveyor">Raw / finished trays</div><div class="line" style="left:223px;top:116px;width:415px"></div><div class="line" style="left:760px;top:190px;width:4px;height:68px;transform:rotate(90deg)"></div></div></section><aside class="card"><h2>Proposed sequence</h2><div class="sequence"><span class="step">1<br>Pick raw</span><span class="step">2<br>Open door</span><span class="step">3<br>Exchange part</span><span class="step">4<br>Place finished</span></div><h3 style="margin-top:14px">Recovery points</h3><div class="checklist"><div class="check">Missing raw part</div><div class="check">Grip failure</div><div class="check">Machine alarm</div><div class="check">Door not open</div></div><div class="warning" style="margin-top:12px">Concept does not approve guarding, safe distance, controls, payload, reach, or risk assessment.</div></aside></div>`}
};
const id=new URLSearchParams(location.search).get('id')||'H38-P008';const p=products[id]||products['H38-P008'];document.title=`${id} ${p.name}`;document.getElementById('sheet').innerHTML=`<header class="top"><div><span class="eyebrow">Highway 38 Solutions · Hypothetical deliverable preview</span><h1>${p.name}</h1><p>${p.sub}</p></div><span class="id">${id}</span></header>${p.body}`;
</script>
</body>
</html>
