<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Highway 38 Business Office — Review Demo</title>
  <style>
    :root{--navy:#173a5e;--blue:#326a9e;--light:#eef5fb;--border:#d7e0e8;--text:#17212b;--muted:#5e6a75;--warn:#fff0bf;--good:#dff4e7;--bad:#ffe0e0}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--text);background:#f6f8fa}button,input,select{font:inherit}button{min-height:44px;border:0;border-radius:8px;padding:10px 15px;cursor:pointer;font-weight:700}button.primary{background:var(--navy);color:#fff}button.secondary{background:#e7eef5;color:var(--navy)}
    header{background:var(--navy);color:#fff;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;position:sticky;top:0;z-index:5}header h1{font-size:20px;margin:0;display:flex;align-items:center;gap:10px}.brand-logo{width:42px;height:42px;object-fit:contain;border-radius:6px;background:#fff}.review-badge{display:inline-block;background:#fff0bf;color:#6b4b00;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:700}.user{font-size:13px;text-align:right}.layout{display:grid;grid-template-columns:250px minmax(0,1fr);min-height:calc(100vh - 66px)}nav{background:#fff;border-right:1px solid var(--border);padding:12px;overflow:auto}nav button{display:block;width:100%;text-align:left;margin:3px 0;background:transparent;color:var(--text)}nav button.active{background:var(--light);color:var(--navy)}main{padding:18px;overflow:auto}.notice{background:var(--warn);padding:12px;border-radius:8px;margin-bottom:14px;line-height:1.4}.panel{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 1px 2px rgba(0,0,0,.04)}.panel h2{margin-top:0}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}.card{border:1px solid var(--border);border-radius:10px;padding:14px;background:#fff}.card .count{font-size:28px;font-weight:800;color:var(--navy)}.card .label{font-weight:700;margin-bottom:6px}.card .detail{font-size:13px;color:var(--muted);line-height:1.35}.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:12px 0}.toolbar input,.toolbar select{min-height:44px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:#fff}.toolbar input{min-width:240px;flex:1}.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:8px}table{border-collapse:collapse;width:100%;min-width:820px;background:#fff}th,td{border-bottom:1px solid var(--border);padding:9px 10px;text-align:left;vertical-align:top;white-space:nowrap}th{background:var(--navy);color:#fff;position:sticky;top:0}.status{display:inline-block;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:700;background:#e8edf2}.status.active,.status.approved,.status.complete{background:var(--good);color:#15552e}.status.pending,.status.review{background:var(--warn);color:#6b4b00}.status.overdue{background:var(--bad);color:#7a1515}.empty{padding:28px;text-align:center;color:var(--muted)}.toast{position:fixed;right:18px;bottom:18px;max-width:420px;background:#17212b;color:#fff;padding:12px 15px;border-radius:9px;display:none;z-index:30}.toast.show{display:block}.loading{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(255,255,255,.72);z-index:20;font-size:18px;font-weight:700}.loading.show{display:flex}.calendar{display:grid;grid-template-columns:repeat(7,minmax(110px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:auto}.day{background:#fff;min-height:120px;padding:8px}.day strong{display:block;margin-bottom:8px}.event{background:var(--light);border-left:4px solid var(--blue);padding:6px;border-radius:5px;margin:5px 0;font-size:12px}.review-note{font-size:13px;color:var(--muted)}
    @media(max-width:800px){header{align-items:flex-start}.layout{grid-template-columns:1fr}nav{display:flex;overflow:auto;border-right:0;border-bottom:1px solid var(--border);padding:8px;position:sticky;top:66px;z-index:4}nav button{min-width:max-content;width:auto;margin-right:4px}main{padding:12px}.toolbar input{min-width:100%}.calendar{grid-template-columns:repeat(7,150px)}button{min-height:48px}}
  </style>
</head>
<body>
<header>
  <h1><img class="brand-logo" src="assets/highway38-logo.png?v=20260713-logo2" alt="Highway 38 Solutions logo"><span>Highway 38 Business Office</span></h1>
  <div><span class="review-badge">SAFE REVIEW DEMO</span><div class="user"><strong>Owner Review</strong><br>Read-only sample workspace</div></div>
</header>
<div class="layout">
  <nav id="nav"></nav>
  <main>
    <div class="notice"><strong>Review mode:</strong> this public workspace mirrors the owner experience with sample records. Sending, uploads, financial posting, payroll, tax actions, customer contact, and permanent saves are disabled.</div>
    <section id="content"></section>
  </main>
</div>
<div id="loading" class="loading">Loading workspace…</div><div id="toast" class="toast"></div>
<script>
const modules=[['dashboard','Dashboard'],['calendar','Calendar'],['requests','New Requests'],['customers','Customers'],['quotes','Quotes & Proposals'],['workOrders','Work Orders'],['jobs','Jobs'],['equipment','Equipment & Assets'],['purchaseOrders','Purchase Orders'],['receipts','Receipts'],['expenses','Expenses'],['invoices','Invoices'],['payments','Payments'],['documents','Documents / OCR'],['approvals','Approval Queue'],['reports','Reports'],['setup','Setup / Controls']];
const sample={
 requests:[['REQ-1042','Web form','Review','Miller Garage','Layout and organization plan'],['REQ-1041','Phone','Pending','Northwoods Repair','Shop flow review']],
 customers:[['C-1008','Miller Garage','Commercial','Active','miller@example.com','218-555-0198'],['C-1007','Northwoods Repair','Commercial','Active','office@example.com','218-555-0142'],['C-1006','Lakeview Storage','Commercial','Review','contact@example.com','218-555-0181']],
 quotes:[['Q-2026-018','Miller Garage','Garage Layout Package','$1,850','Draft','Review'],['Q-2026-017','Northwoods Repair','Shop Flow Review','$2,400','Approved','Approved'],['Q-2026-016','Lakeview Storage','Workflow Snapshot','$875','Sent','Pending']],
 workOrders:[['WO-118','Northwoods Repair','Shop assessment','Jul 24','In progress'],['WO-117','Lakeview Storage','Inventory map','Jul 22','Scheduled']],
 jobs:[['JOB-081','Northwoods Repair','Implementation','Jul 24','$2,400','Active'],['JOB-080','Lakeview Storage','Discovery','Jul 22','$875','Active']],
 equipment:[['EQ-014','Laser Measure','Measurement','Available','Shop'],['EQ-012','Tablet Kit','Field technology','Assigned','JOB-081']],
 purchaseOrders:[['PO-044','Office Supply Co.','JOB-081','$328.16','Pending'],['PO-043','Print Works','JOB-080','$142.50','Approved']],
 receipts:[['R-139','Fuel Stop','$74.12','Review'],['R-138','Office Supply Co.','$328.16','Approved']],
 expenses:[['EXP-091','Travel / mileage','$86.40','Pending'],['EXP-090','Printing','$142.50','Approved']],
 invoices:[['INV-2026-031','Northwoods Repair','$1,200','$1,200','Draft'],['INV-2026-030','Lakeview Storage','$875','$375','Partial']],
 payments:[['PAY-071','INV-2026-030','$500','ACH','Recorded'],['PAY-070','INV-2026-029','$1,150','Check','Recorded']],
 documents:[['DOC-211','miller-garage-photos.zip','Customer Request','Review'],['DOC-210','office-supply-receipt.pdf','Receipt','Approved']],
 approvals:[['APR-052','Quote','Q-2026-017','Approved'],['APR-051','Expense','EXP-091','Pending']],
 setup:[['Branding','Approved logo','Complete'],['Users','Owner access','Complete'],['External actions','Locked','Complete'],['Backup','Nightly backup','Complete']]
};
let current='dashboard';
function wait(ms=180){document.getElementById('loading').classList.add('show');return new Promise(r=>setTimeout(()=>{document.getElementById('loading').classList.remove('show');r()},ms))}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function renderNav(){document.getElementById('nav').innerHTML=modules.map(([k,l])=>`<button type="button" data-module="${k}" class="${current===k?'active':''}">${l}</button>`).join('');document.querySelectorAll('[data-module]').forEach(b=>b.addEventListener('click',()=>openModule(b.dataset.module)))}
async function openModule(key){current=key;renderNav();await wait();if(key==='dashboard')renderDashboard();else if(key==='calendar')renderCalendar();else if(key==='reports')renderReports();else renderTable(key)}
function renderDashboard(){document.getElementById('content').innerHTML=`<div class="panel"><h2>Owner Dashboard</h2><p class="review-note">Use this review copy exactly as you would use the owner workspace. Navigation and controls are active; permanent actions are blocked.</p><div class="cards"><div class="card"><div class="label">New requests</div><div class="count">2</div><div class="detail">Both need owner review</div></div><div class="card"><div class="label">Open quotes</div><div class="count">3</div><div class="detail">$5,125 active value</div></div><div class="card"><div class="label">Active jobs</div><div class="count">2</div><div class="detail">One due this week</div></div><div class="card"><div class="label">Outstanding invoices</div><div class="count">$1,575</div><div class="detail">One partial payment</div></div></div></div><div class="panel"><h2>Needs attention</h2><div class="table-wrap"><table><thead><tr><th>Priority</th><th>Item</th><th>Customer</th><th>Next action</th></tr></thead><tbody><tr><td><span class="status pending">Today</span></td><td>REQ-1042</td><td>Miller Garage</td><td>Review request and start quote</td></tr><tr><td><span class="status overdue">Overdue</span></td><td>INV-2026-030</td><td>Lakeview Storage</td><td>Review remaining balance</td></tr><tr><td><span class="status review">Review</span></td><td>EXP-091</td><td>Internal</td><td>Approve mileage expense</td></tr></tbody></table></div></div>`}
function renderCalendar(){const days=['Mon 20','Tue 21','Wed 22','Thu 23','Fri 24','Sat 25','Sun 26'];document.getElementById('content').innerHTML=`<div class="panel"><div class="toolbar"><button class="secondary" type="button" id="prevWeek">Previous</button><strong>July 20–26, 2026</strong><button class="secondary" type="button" id="nextWeek">Next</button><button class="primary" type="button" id="newEvent">New schedule item</button></div><div class="calendar">${days.map((d,i)=>`<div class="day"><strong>${d}</strong>${i===2?'<div class="event">9:00 AM · Lakeview Storage</div><div class="event">2:30 PM · Quote follow-up</div>':''}${i===4?'<div class="event">8:00 AM · Northwoods Repair</div>':''}</div>`).join('')}</div></div>`;['prevWeek','nextWeek','newEvent'].forEach(id=>document.getElementById(id).addEventListener('click',()=>toast('Review demo: scheduling changes are disabled.')))}
function renderReports(){document.getElementById('content').innerHTML=`<div class="panel"><h2>Reports</h2><div class="cards"><div class="card"><div class="label">Quoted value</div><div class="count">$5,125</div><div class="detail">3 open quotes</div></div><div class="card"><div class="label">Booked revenue</div><div class="count">$3,275</div><div class="detail">Current active jobs</div></div><div class="card"><div class="label">Collected</div><div class="count">$500</div><div class="detail">This review period</div></div></div></div>`}
function renderTable(key){const rows=sample[key]||[];const labels=modules.find(x=>x[0]===key)?.[1]||key;const widths=Math.max(...rows.map(r=>r.length),4);const headers=Array.from({length:widths},(_,i)=>['ID / Record','Name / Source','Detail','Status / Amount','Contact','Other'][i]||`Field ${i+1}`);document.getElementById('content').innerHTML=`<div class="panel"><h2>${labels}</h2><div class="toolbar"><input id="search" placeholder="Search ${labels.toLowerCase()}"><select id="filter"><option>All records</option><option>Needs attention</option><option>Approved</option></select><button class="primary" id="newRecord" type="button">New record</button></div><div class="table-wrap"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody id="rows">${rows.map(r=>`<tr>${headers.map((_,i)=>`<td>${r[i]??''}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div>`;document.getElementById('newRecord').addEventListener('click',()=>toast('Review demo: permanent saves are disabled.'));document.getElementById('filter').addEventListener('change',()=>toast('Filter applied in review mode.'));document.getElementById('search').addEventListener('input',e=>{const q=e.target.value.toLowerCase();document.querySelectorAll('#rows tr').forEach(tr=>tr.style.display=tr.textContent.toLowerCase().includes(q)?'':'none')});document.querySelectorAll('#rows tr').forEach(tr=>tr.addEventListener('click',()=>toast('Record preview selected. Editing is disabled.')))}
renderNav();renderDashboard();
</script>
</body>
</html>
