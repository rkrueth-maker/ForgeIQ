name: Owner Portal Next Verify

on:
  push:
    branches: [main]
    paths:
      - 'apps-script/core-engine/owner-portal-next/**'
      - 'scripts/verify-owner-portal-next.js'
      - '.github/workflows/owner-portal-next-verify.yml'
  pull_request:
    paths:
      - 'apps-script/core-engine/owner-portal-next/**'
      - 'scripts/verify-owner-portal-next.js'
      - '.github/workflows/owner-portal-next-verify.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run integrated verifier
        id: verifier
        shell: bash
        run: |
          set +e
          node scripts/verify-owner-portal-next.js | tee owner-portal-verify-result.json
          status=${PIPESTATUS[0]}
          echo "exit_code=${status}" >> "${GITHUB_OUTPUT}"
          exit 0
      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owner-portal-verify-result
          path: owner-portal-verify-result.json
          if-no-files-found: error
      - name: Enforce verification result
        shell: bash
        run: |
          test "${{ steps.verifier.outputs.exit_code }}" -eq 0
