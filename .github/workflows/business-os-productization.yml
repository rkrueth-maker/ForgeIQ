name: Business OS Productization Verify

on:
  pull_request:
    branches:
      - main
    paths:
      - 'core-engine/product/**'
      - 'business-packs/**'
      - 'scripts/verify-business-os-productization.js'
      - '.github/workflows/business-os-productization.yml'
  push:
    branches:
      - main
    paths:
      - 'core-engine/product/**'
      - 'business-packs/**'
      - 'scripts/verify-business-os-productization.js'
      - '.github/workflows/business-os-productization.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Verify installer, tenant isolation, licensing, backup, restore, migration, and provider controls
        run: node scripts/verify-business-os-productization.js
      - name: Upload productization evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: business-os-productization-${{ github.run_id }}
          path: |
            launch-control/evidence/business-os-productization.json
            launch-control/evidence/business-os-sample-package.json
          if-no-files-found: error
          retention-days: 90
