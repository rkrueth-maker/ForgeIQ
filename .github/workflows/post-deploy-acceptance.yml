name: Post-Deploy Ecosystem Acceptance

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/post-deploy-acceptance.yml'
      - 'ecosystem-status.html'
      - 'customer-portal.html'
      - 'business-concept-builder.html'
      - 'tool-center.html'
      - 'proof-center.html'
      - 'index.html'
      - 'launch-control/**'
      - 'scripts/verify-complete-ecosystem-launch.js'
      - 'scripts/verify-public-ecosystem-tools.js'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/post-deploy-acceptance.yml'
      - 'ecosystem-status.html'
      - 'customer-portal.html'
      - 'business-concept-builder.html'
      - 'tool-center.html'
      - 'proof-center.html'
      - 'index.html'
      - 'launch-control/**'
      - 'scripts/verify-complete-ecosystem-launch.js'
      - 'scripts/verify-public-ecosystem-tools.js'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: post-deploy-ecosystem-acceptance
  cancel-in-progress: false

jobs:
  repository-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Verify hard-rule launch controls
        run: node scripts/verify-complete-ecosystem-launch.js
      - name: Verify public ecosystem tools
        run: node scripts/verify-public-ecosystem-tools.js
      - name: Upload repository verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecosystem-repository-verification-${{ github.run_id }}
          path: |
            launch-control/evidence/complete-ecosystem-verification.json
            launch-control/evidence/public-ecosystem-tools.json
          if-no-files-found: error
          retention-days: 90

  live-acceptance:
    if: github.event_name != 'pull_request'
    needs: repository-verification
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      BASE_URL: https://rkrueth-maker.github.io/highway-38-solutions
    steps:
      - name: Check out deployed source
        uses: actions/checkout@v4
      - name: Verify live pages with deployment retry window
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p launch-control/evidence
          : > /tmp/h38-live-results.tsv

          check_page() {
            local page="$1"
            local marker="$2"
            local url="${BASE_URL}/${page}"
            local attempt body code
            for attempt in $(seq 1 24); do
              code="$(curl --location --silent --show-error --output /tmp/h38-live-page.html --write-out '%{http_code}' "$url" || true)"
              body="$(cat /tmp/h38-live-page.html 2>/dev/null || true)"
              if [[ "$code" == "200" ]] && grep -Fq "$marker" <<<"$body"; then
                printf '%s\t%s\t%s\n' "$url" "$code" "PASS" >> /tmp/h38-live-results.tsv
                return 0
              fi
              sleep 10
            done
            printf '%s\t%s\t%s\n' "$url" "${code:-000}" "FAIL" >> /tmp/h38-live-results.tsv
            echo "Live verification failed for $url; expected marker: $marker" >&2
            return 1
          }

          check_page 'index.html' 'Practical systems that actually work.'
          check_page 'ecosystem-status.html' 'Highway 38 Solutions · Ecosystem'
          check_page 'customer-portal.html' 'No customer records, files, quotes, invoices, payments, deliverables, or communications are exposed'
          check_page 'business-concept-builder.html' 'Turn a rough idea into a structured launch package.'
          check_page 'tool-center.html' 'data-tool="project"'
          check_page 'proof-center.html' 'public-proof-manifest'

          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          rows = []
          for line in Path('/tmp/h38-live-results.tsv').read_text(encoding='utf-8').splitlines():
              url, http_status, status = line.split('\t')
              rows.append({'url': url, 'httpStatus': int(http_status), 'status': status})

          passed = all(row['status'] == 'PASS' for row in rows)
          evidence = {
              'release': 'complete-ecosystem-live-launch-2026-07-11',
              'acceptanceRun': os.environ.get('GITHUB_RUN_ID', ''),
              'sourceCommit': os.environ.get('GITHUB_SHA', ''),
              'verifiedAt': datetime.now(timezone.utc).isoformat(),
              'environment': 'GitHub Pages production',
              'result': 'PASS' if passed else 'HOLD',
              'liveUrls': rows,
              'rollback': {
                  'preLaunchCommit': '3bd325f',
                  'method': 'Revert the ecosystem release merge and verify the restored GitHub Pages URLs.'
              },
              'externalActions': {
                  'customerEmail': 'LOCKED',
                  'paymentRequests': 'LOCKED',
                  'paymentProcessing': 'LOCKED',
                  'socialPublishing': 'LOCKED',
                  'advertisingSpend': 'LOCKED',
                  'finalDelivery': 'LOCKED'
              },
              'privacyControls': {
                  'privatePst': 'NOT_PUBLIC',
                  'clowCsc': 'NOT_PUBLIC',
                  'customerVendorEmployeeData': 'NOT_PUBLIC',
                  'privateAddressesFamilyData': 'NOT_PUBLIC',
                  'unapprovedPhotos': 'NOT_PUBLIC'
              }
          }
          output = Path('launch-control/evidence/post-deploy-acceptance.json')
          output.write_text(json.dumps(evidence, indent=2) + '\n', encoding='utf-8')
          if not passed:
              raise SystemExit(1)
          PY
      - name: Upload live deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecosystem-live-acceptance-${{ github.run_id }}
          path: launch-control/evidence/post-deploy-acceptance.json
          if-no-files-found: error
          retention-days: 90
      - name: Synchronize master and integration issues
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          artifact_url="https://github.com/${REPO}/actions/runs/${GITHUB_RUN_ID}"

          cat > /tmp/h38-master-comment.md <<EOF
          <!-- h38-post-deploy-acceptance -->
          ## Post-deployment acceptance PASS

          The verified ecosystem portion is live and has passed repository and production URL checks.

          - Source commit: \`${GITHUB_SHA}\`
          - Acceptance run: ${artifact_url}
          - Rollback baseline: \`3bd325f\`
          - Live pages verified: homepage, ecosystem hub, customer portal status, Business Concept Builder, Planning Tool Center, and Proof Center
          - External email, payment requests/processing, social publishing, advertising spend, and final delivery: **LOCKED**
          - Private PST, Clow/CSC, customer, vendor, employee, address, family, and unapproved-photo data: **NOT PUBLIC**

          The complete six-workstream ecosystem remains **IN PROGRESS**. Credential-dependent and remaining productization work stays in scope and is not represented as complete.
          EOF

          cat > /tmp/h38-integration-comment.md <<EOF
          <!-- h38-post-deploy-acceptance-issue-37 -->
          ## Production integration acceptance PASS

          - Repository hard-rule verifier: PASS
          - Public-tool functional verifier: PASS
          - Six production URL marker checks: PASS
          - Evidence artifact: ${artifact_url}
          - Source commit: \`${GITHUB_SHA}\`
          - Rollback baseline: \`3bd325f\`
          - External actions remain locked

          Issue #37 remains open for the unresolved cross-workstream acceptance items and exact blockers recorded under Issue #31.
          EOF

          upsert_comment() {
            local issue="$1"
            local marker="$2"
            local file="$3"
            local existing
            existing="$(gh api "repos/${REPO}/issues/${issue}/comments" --paginate --jq ".[] | select(.body | contains(\"${marker}\")) | .id" | tail -n 1)"
            if [[ -n "$existing" ]]; then
              gh api --method PATCH "repos/${REPO}/issues/comments/${existing}" -f body="$(cat "$file")" >/dev/null
            else
              gh issue comment "$issue" --repo "$REPO" --body-file "$file" >/dev/null
            fi
          }

          upsert_comment 31 '<!-- h38-post-deploy-acceptance -->' /tmp/h38-master-comment.md
          upsert_comment 37 '<!-- h38-post-deploy-acceptance-issue-37 -->' /tmp/h38-integration-comment.md
