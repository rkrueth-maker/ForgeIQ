name: Inspect final hardening production

on:
  push:
    branches: [agent/task-messaging-hardening]
    paths:
      - '.github/workflows/inspect-final-hardening-production.yml'

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/task-messaging-hardening
          fetch-depth: 0
      - name: Read production run and retained artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: 4754f34230e4305a13cfc602e12cc9d1c8f93179
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .h38-evidence
          RUN='null'
          for attempt in $(seq 1 30); do
            RUNS=$(curl -sSfL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-owner-portal-hard-rule-production.yml/runs?event=push&head_sha=${TARGET_SHA}&per_page=10")
            RUN=$(printf '%s' "$RUNS" | jq -c '.workflow_runs | sort_by(.run_number) | last')
            if [ "$RUN" != "null" ] && [ "$(printf '%s' "$RUN" | jq -r '.status')" = "completed" ]; then break; fi
            sleep 10
          done
          test "$RUN" != "null"
          test "$(printf '%s' "$RUN" | jq -r '.status')" = "completed"
          RUN_ID=$(printf '%s' "$RUN" | jq -r '.id')
          ARTIFACTS=$(curl -sSfL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts?per_page=100")
          printf '%s\n' "$RUN" | jq --argjson artifacts "$ARTIFACTS" '{id,run_number,status,conclusion,event,head_sha,created_at,updated_at,html_url,artifacts:($artifacts.artifacts|map({id,name,size_in_bytes,expired,created_at,expires_at}))}' > .h38-evidence/production-4754f342.json
          cat .h38-evidence/production-4754f342.json
          test "$(jq -r '.conclusion' .h38-evidence/production-4754f342.json)" = "success"
          test "$(jq -r '.artifacts | length' .h38-evidence/production-4754f342.json)" -ge 1
      - name: Commit inspection record to non-production branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .h38-evidence/production-4754f342.json
          git commit -m 'Record final task messaging production evidence'
          git push origin HEAD:agent/task-messaging-hardening
