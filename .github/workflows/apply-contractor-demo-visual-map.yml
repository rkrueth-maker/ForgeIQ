name: Apply Contractor Demo Visual Map
on:
  push:
    branches:
      - fix/contractor-demo-correct-project-visuals
permissions:
  contents: write
jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/contractor-demo-correct-project-visuals
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: node scripts/apply-contractor-demo-visual-map.js
      - name: Commit repaired mapping
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add assets/js/h38-contractor-demo-data.js
          git commit -m "Map contractor demos to correct project visuals"
          git push
