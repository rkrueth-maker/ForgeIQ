name: Business Office Equipment Render Acceptance

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/business-office-control-plane/**'
      - 'packages/shared-ui/BusinessOffice_Equipment.html'
      - 'packages/shared-ui/BusinessOffice_ControlPlane*.html'
      - 'apps/business-office/**'
      - 'business-packs/template-business/**'
      - 'scripts/build-business-office-installation.js'
      - 'scripts/render-business-office-equipment.js'
      - '.github/workflows/business-office-equipment-render.yml'
  push:
    branches:
      - 'agent/business-office-mobile-field-social-overhaul'
    paths:
      - 'packages/business-office-control-plane/**'
      - 'packages/shared-ui/BusinessOffice_Equipment.html'
      - 'packages/shared-ui/BusinessOffice_ControlPlane*.html'
      - 'apps/business-office/**'
      - 'business-packs/template-business/**'
      - 'scripts/build-business-office-installation.js'
      - 'scripts/render-business-office-equipment.js'
      - '.github/workflows/business-office-equipment-render.yml'

permissions:
  contents: read

jobs:
  render-equipment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install render dependencies
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Build neutral standalone Business Office
        run: |
          rm -rf artifacts/business-office-equipment
          node scripts/build-business-office-installation.js \
            --pack template-business \
            --mode standalone \
            --out artifacts/business-office-equipment/render-bundle
      - name: Render Owner Foreman and Field Staff equipment workflows
        run: node scripts/render-business-office-equipment.js artifacts/business-office-equipment/render-bundle artifacts/business-office-equipment/renders
      - name: Upload equipment render evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: business-office-equipment-renders-${{ github.run_id }}
          path: artifacts/business-office-equipment/
          if-no-files-found: error
          retention-days: 90
