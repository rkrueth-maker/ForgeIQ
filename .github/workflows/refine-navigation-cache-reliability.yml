name: Refine Navigation Cache Reliability

on:
  push:
    branches:
      - agent/navigation-and-module-cache-speed
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: refine-navigation-cache-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refine:
    if: github.ref_name == 'agent/navigation-and-module-cache-speed' || github.event.pull_request.head.ref == 'agent/navigation-and-module-cache-speed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/navigation-and-module-cache-speed
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Apply and verify reliability refinements
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/apply-navigation-cache-refinement.py
          node scripts/verify-navigation-cache-performance.js
          node scripts/verify-change-governance.js
          node scripts/verify-reusable-business-office-contracts.js
          node scripts/verify-unified-app-architecture.js
          node scripts/verify-owner-portal-next.js
          node scripts/verify-business-office.js
          node scripts/verify-unified-client-routing-runtime.js
          node scripts/verify-task-messaging.js
          node scripts/verify-task-messaging-hardening.js
          node scripts/verify-unified-app-ux-complete.js
      - name: Remove generated evidence and temporary files
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- artifacts/business-office/verification.json artifacts/task-messaging/verification.json
          rm -f artifacts/change-governance/verification.json
          rm -f artifacts/product-architecture/verification.json
          rm -f artifacts/reusable-business-office-contracts/verification.json
          rm -f artifacts/task-messaging/hardening-verification.json
          rm -f artifacts/unified-app-ux/verification.json
          rm -f artifacts/unified-shell/assembly.json
          rm -f artifacts/unified-source-assembly/verification.json
          rm -f launch-control/evidence/unified-app-architecture-verification.json
          rm -f scripts/apply-navigation-cache-refinement.py
          rm -f .github/workflows/refine-navigation-cache-reliability.yml
          node scripts/verify-navigation-cache-performance.js
          git diff --check
      - name: Commit reliability refinements
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Preserve complete records while accelerating navigation'
          git push origin HEAD:agent/navigation-and-module-cache-speed
