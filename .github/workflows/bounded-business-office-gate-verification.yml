name: Bounded Business Office Gate Verification

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/bounded-business-office-gate-verification.yml

permissions:
  contents: write
  actions: write
  issues: write

concurrency:
  group: bounded-business-office-gate-verification
  cancel-in-progress: false

jobs:
  dispatch-and-record:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Remove temporary helper and establish final main
        id: final
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/bounded-business-office-gate-verification.yml
          git add .github/workflows/bounded-business-office-gate-verification.yml
          git commit -m "Remove bounded gate verification helper"
          git push origin HEAD:main
          final_sha="$(git rev-parse HEAD)"
          echo "sha=${final_sha}" >> "$GITHUB_OUTPUT"
          echo "FINAL_SHA=${final_sha}" >> "$GITHUB_ENV"

      - name: Verify the five scanner targets on final main
        shell: bash
        run: |
          set -euo pipefail
          files=(
            artifacts/business-office-separation/builds/highway38-combined/BusinessOffice_Index.html
            artifacts/business-office-separation/builds/template-business-standalone/BusinessOffice_Index.html
            artifacts/separate-business-office-platform/builds/highway38-combined/BusinessOffice_Index.html
            artifacts/separate-business-office-platform/builds/template-business-standalone/BusinessOffice_Index.html
            packages/shared-ui/BusinessOffice_Index.html
          )
          for file in "${files[@]}"; do
            grep -Fq '<meta name="viewport" content="width=device-width, initial-scale=1">' "$file"
            grep -Fq '<title>Business Office</title>' "$file"
          done
          test "$(git status --porcelain)" = ""

      - name: Dispatch both requested workflows on final main
        shell: bash
        run: |
          set -euo pipefail
          echo "DISPATCHED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          gh api --method POST "repos/${REPO}/actions/workflows/complete-ecosystem-launch.yml/dispatches" -f ref=main
          gh api --method POST "repos/${REPO}/actions/workflows/post-deploy-acceptance.yml/dispatches" -f ref=main

      - name: Find and wait for exact workflow runs
        id: runs
        shell: bash
        run: |
          set -euo pipefail

          find_run() {
            local workflow="$1"
            local id=""
            for attempt in $(seq 1 60); do
              id="$(gh api "repos/${REPO}/actions/workflows/${workflow}/runs?branch=main&event=workflow_dispatch&per_page=30" --jq ".workflow_runs[] | select(.head_sha == \"${FINAL_SHA}\" and .created_at >= \"${DISPATCHED_AT}\") | .id" | head -n1)"
              if [[ -n "$id" ]]; then
                printf '%s' "$id"
                return 0
              fi
              sleep 5
            done
            return 1
          }

          wait_run() {
            local id="$1"
            local state conclusion
            for attempt in $(seq 1 240); do
              state="$(gh api "repos/${REPO}/actions/runs/${id}" --jq '.status')"
              conclusion="$(gh api "repos/${REPO}/actions/runs/${id}" --jq '.conclusion // ""')"
              if [[ "$state" == "completed" ]]; then
                printf '%s' "$conclusion"
                return 0
              fi
              sleep 10
            done
            printf '%s' timeout
            return 0
          }

          complete_id="$(find_run complete-ecosystem-launch.yml)"
          post_id="$(find_run post-deploy-acceptance.yml)"
          complete_result="$(wait_run "$complete_id")"
          post_result="$(wait_run "$post_id")"

          echo "complete_id=${complete_id}" >> "$GITHUB_OUTPUT"
          echo "post_id=${post_id}" >> "$GITHUB_OUTPUT"
          echo "complete_result=${complete_result}" >> "$GITHUB_OUTPUT"
          echo "post_result=${post_result}" >> "$GITHUB_OUTPUT"

      - name: Record bounded verification on Issue 31
        if: always()
        shell: bash
        env:
          COMPLETE_ID: ${{ steps.runs.outputs.complete_id }}
          POST_ID: ${{ steps.runs.outputs.post_id }}
          COMPLETE_RESULT: ${{ steps.runs.outputs.complete_result }}
          POST_RESULT: ${{ steps.runs.outputs.post_result }}
        run: |
          set -euo pipefail
          marker='<!-- bounded-business-office-scanner-cleanup -->'
          complete_url="https://github.com/${REPO}/actions/runs/${COMPLETE_ID:-unknown}"
          post_url="https://github.com/${REPO}/actions/runs/${POST_ID:-unknown}"
          cat > /tmp/comment.md <<EOF
          ${marker}
          ## Bounded Business Office scanner cleanup verification

          - Final current main: \`${FINAL_SHA}\`
          - Five BusinessOffice_Index.html title/viewport markers: **VERIFIED**
          - Complete Ecosystem Launch Gate: **${COMPLETE_RESULT:-NOT_RECORDED}** — ${complete_url}
          - Post-Deploy Ecosystem Acceptance: **${POST_RESULT:-NOT_RECORDED}** — ${post_url}
          - Separation architecture reopened: **No**
          - North Star successful installation invalidated: **No**
          - North Star resources deleted: **No**
          - External actions enabled: **No**
          EOF
          existing="$(gh api "repos/${REPO}/issues/31/comments" --paginate --jq ".[] | select(.body | contains(\"${marker}\")) | .id" | tail -n1)"
          if [[ -n "$existing" ]]; then
            gh api --method PATCH "repos/${REPO}/issues/comments/${existing}" -f body="$(cat /tmp/comment.md)" >/dev/null
          else
            gh api --method POST "repos/${REPO}/issues/31/comments" -f body="$(cat /tmp/comment.md)" >/dev/null
          fi

      - name: Require both gates to pass
        shell: bash
        env:
          COMPLETE_RESULT: ${{ steps.runs.outputs.complete_result }}
          POST_RESULT: ${{ steps.runs.outputs.post_result }}
        run: |
          set -euo pipefail
          test "$COMPLETE_RESULT" = success
          test "$POST_RESULT" = success
