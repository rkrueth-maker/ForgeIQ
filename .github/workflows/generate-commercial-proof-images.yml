name: Generate Commercial Proof Images

on:
  push:
    branches:
      - revise/product-proof-commercial-review
    paths:
      - 'tests/fixtures/commercial-proof-generator.html'
      - 'tools/render-commercial-proof-images.mjs'
      - '.github/workflows/generate-commercial-proof-images.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'tests/fixtures/commercial-proof-generator.html'
      - 'tools/render-commercial-proof-images.mjs'
      - '.github/workflows/generate-commercial-proof-images.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    if: github.head_ref == 'revise/product-proof-commercial-review' || github.ref_name == 'revise/product-proof-commercial-review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: revise/product-proof-commercial-review
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright and Pillow
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
          python -m pip install pillow
      - name: Render revised PNG proofs
        run: node tools/render-commercial-proof-images.mjs
      - name: Verify image dimensions
        run: |
          python - <<'PY'
          from PIL import Image
          paths = [
            'assets/rick-review-problem-snapshot-v1.png',
            'assets/rick-review-basic-layout-v1.png',
            'assets/rick-review-project-packet-v1.png',
            'assets/rick-review-shop-flow-v1.png',
            'assets/rick-review-business-cleanup-v1.png',
            'assets/rick-review-cleanup-rescue-v1.png',
            'assets/rick-review-workflow-opportunity-v1.png',
            'assets/product-proof/automation-opportunity-snapshot.png',
            'assets/product-proof/fixture-jig-concept-review.png',
            'assets/product-proof/robot-tending-concept-pack.png',
          ]
          for path in paths:
              with Image.open(path) as image:
                  assert image.format == 'PNG', (path, image.format)
                  assert image.size == (1600, 1000), (path, image.size)
                  print(path, image.size)
          PY
      - name: Upload verified PNGs to corrective branch
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BRANCH: revise/product-proof-commercial-review
        run: |
          set -euo pipefail
          files=(
            assets/rick-review-problem-snapshot-v1.png
            assets/rick-review-basic-layout-v1.png
            assets/rick-review-project-packet-v1.png
            assets/rick-review-shop-flow-v1.png
            assets/rick-review-business-cleanup-v1.png
            assets/rick-review-cleanup-rescue-v1.png
            assets/rick-review-workflow-opportunity-v1.png
            assets/product-proof/automation-opportunity-snapshot.png
            assets/product-proof/fixture-jig-concept-review.png
            assets/product-proof/robot-tending-concept-pack.png
          )
          for file in "${files[@]}"; do
            encoded=$(base64 -w 0 "$file")
            sha=$(curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/contents/$file?ref=$BRANCH" | jq -r '.sha')
            jq -n \
              --arg message "Replace $file with revised commercial proof" \
              --arg content "$encoded" \
              --arg sha "$sha" \
              --arg branch "$BRANCH" \
              '{message:$message,content:$content,sha:$sha,branch:$branch}' > payload.json
            curl -fsSL -X PUT \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/contents/$file" \
              --data-binary @payload.json >/dev/null
            echo "Uploaded $file"
          done