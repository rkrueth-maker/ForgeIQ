name: Diagnose PR 290 Quote Commercial

on:
  push:
    branches:
      - agent/complete-navigation-settings-audit
    paths:
      - '.github/workflows/diagnose-pr290-quote-commercial.yml'
      - 'apps-script/business-office/BusinessOffice_QuoteBuilder_Index.html'
      - 'apps-script/business-office/BusinessOffice_QuoteBuilder_Commercial.gs'
      - 'apps-script/business-office/BusinessOffice_QuoteBuilder_Commercial_Client.html'
      - 'apps-script/business-office/BusinessOffice_QuoteBuilder_Proposal.html'
      - 'scripts/verify-quote-builder-commercial-complete.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/complete-navigation-settings-audit
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Capture verifier output
        shell: bash
        run: |
          set +e
          mkdir -p diagnostics
          node scripts/verify-quote-builder-commercial-complete.js > diagnostics/pr290-quote-commercial.log 2>&1
          code=$?
          echo "exit_code=$code" >> diagnostics/pr290-quote-commercial.log
          cat diagnostics/pr290-quote-commercial.log
          exit 0
      - name: Commit diagnostic
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add diagnostics/pr290-quote-commercial.log
          git commit -m 'Record PR 290 Quote Builder commercial diagnostic' || exit 0
          git push origin HEAD:agent/complete-navigation-settings-audit
