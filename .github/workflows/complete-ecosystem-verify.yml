name: Complete Ecosystem Hard-Rule Verify
on:
  pull_request:
    paths:
      - '*.html'
      - '*.js'
      - '*.css'
      - '*.svg'
      - 'brand/**'
      - 'business-os/**'
      - 'customer-portal/**'
      - 'social/**'
      - 'docs/launch/**'
      - 'scripts/verify-complete-ecosystem.js'
      - '.github/workflows/complete-ecosystem-verify.yml'
  push:
    branches: [complete-ecosystem-live-launch-2026-07-11]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run complete ecosystem hard-rule verification
        run: node scripts/verify-complete-ecosystem.js
