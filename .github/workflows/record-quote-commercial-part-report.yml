name: Record Commercial Package Part Report

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  record:
    if: github.head_ref == 'feature/quote-builder-commercial-complete'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/quote-builder-commercial-complete
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Write part report
        run: |
          mkdir -p artifacts/quote-builder-commercial
          node <<'NODE' > artifacts/quote-builder-commercial/package-part-report.txt
          const fs=require('fs'),crypto=require('crypto'),dir='scripts/.quote-commercial-package';
          const names=fs.readdirSync(dir).filter(n=>n.endsWith('.part')).sort();
          let combined='';
          for(const name of names){const raw=fs.readFileSync(`${dir}/${name}`,'utf8'),clean=raw.replace(/\s/g,'');const invalid=[...clean].filter(ch=>!/^[A-Za-z0-9+/=]$/.test(ch));console.log(`${name}: raw=${raw.length} clean=${clean.length} invalid=${invalid.length}`);combined+=clean;}
          const bytes=Buffer.from(combined,'base64');
          console.log(`combined=${combined.length}`);console.log(`decoded=${bytes.length}`);console.log(`actual=${crypto.createHash('sha256').update(bytes).digest('hex')}`);console.log('expected=26e675cd56e2c46767c4d894f8da8c7ef6e1ec21333262b4bab074575b211d86');
          NODE
          rm -f .github/workflows/record-quote-commercial-part-report.yml
      - name: Commit part report
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record commercial package part integrity'
          git push origin HEAD:feature/quote-builder-commercial-complete
