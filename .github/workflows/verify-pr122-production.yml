name: Verify PR 122 production

on:
  push:
    branches: [agent/separate-tasks-supabase-customer-portal]
    paths:
      - '.github/workflows/verify-pr122-production.yml'

permissions:
  actions: read
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/separate-tasks-supabase-customer-portal
          fetch-depth: 0
      - name: Read production workflow and artifact
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: 9f508f288ff6f4b47a48d7bb0463e92236c597b2
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .h38-production-evidence
          RUNS=$(curl -sSfL -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-owner-portal-hard-rule-production.yml/runs?event=push&head_sha=${TARGET_SHA}&per_page=10")
          RUN=$(printf '%s' "$RUNS" | jq -c '.workflow_runs | sort_by(.run_number) | last')
          test "$RUN" != "null"
          RUN_ID=$(printf '%s' "$RUN" | jq -r '.id')
          ARTIFACTS=$(curl -sSfL -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts?per_page=100")
          printf '%s\n' "$RUN" | jq --argjson artifacts "$ARTIFACTS" '{id,run_number,status,conclusion,event,head_sha,created_at,updated_at,html_url,artifacts:($artifacts.artifacts|map({id,name,size_in_bytes,expired,created_at,expires_at,digest}))}' > .h38-production-evidence/pr122-production.json
          cat .h38-production-evidence/pr122-production.json
          test "$(jq -r '.conclusion' .h38-production-evidence/pr122-production.json)" = "success"
          test "$(jq -r '.artifacts | length' .h38-production-evidence/pr122-production.json)" -ge 1
      - name: Commit verification evidence
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .h38-production-evidence/pr122-production.json
          git commit -m 'Record PR 122 production evidence'
          git push origin HEAD:agent/separate-tasks-supabase-customer-portal
