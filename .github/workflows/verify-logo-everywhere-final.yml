name: Verify Logo Everywhere Final

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/verify-logo-everywhere-final.yml'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Verify current and legacy pages
        shell: bash
        run: |
          set -euo pipefail
          npm init -y >/dev/null 2>&1
          npm install --silent playwright@1.54.1
          npx playwright install --with-deps chromium >/dev/null
          python3 -m http.server 4173 >/tmp/http.log 2>&1 &
          pid=$!
          trap 'kill $pid || true' EXIT
          sleep 2
          node - <<'NODE'
          const { chromium }=require('playwright');
          const fs=require('fs');
          (async()=>{
            const browser=await chromium.launch({headless:true});
            const checks=[['index.html',true],['services.html',true],['sample-library.html',false],['quote-sheet-builder.html',false],['real-proof-lab.html',false],['404.html',false]];
            const results=[];
            for(const [name,expectMenu] of checks){
              const page=await browser.newPage({viewport:{width:390,height:844}});
              await page.goto('http://127.0.0.1:4173/'+name,{waitUntil:'domcontentloaded',timeout:15000});
              await page.waitForSelector('img.brand-logo',{timeout:10000});
              const logo=page.locator('img.brand-logo').first();
              const src=await logo.getAttribute('src');
              const alt=await logo.getAttribute('alt');
              const size=await logo.evaluate(el=>({w:el.getBoundingClientRect().width,h:el.getBoundingClientRect().height}));
              const text=(await page.locator('.brand-text').first().textContent()||'').replace(/\s+/g,' ');
              if(!src||!src.includes('assets/highway38-logo.png?v=20260713-logo3'))throw new Error(name+': stale logo source');
              if(alt!=='Highway 38 Solutions')throw new Error(name+': alt failed');
              if(size.h<29||size.h>37)throw new Error(name+': mobile height '+size.h);
              if(!/Highway\s*38\s*Solutions/i.test(text))throw new Error(name+': fallback text missing');
              const menu=page.locator('.eco-menu');
              if(expectMenu&&await menu.count()){
                await menu.click();
                if(await menu.getAttribute('aria-expanded')!=='true')throw new Error(name+': menu failed');
              }
              results.push(`${name}: PASS — ${size.w.toFixed(1)}×${size.h.toFixed(1)}`);
              await page.close();
            }
            await browser.close();
            fs.writeFileSync('/tmp/results.txt',results.join('\n'));
          })().catch(err=>{console.error(err);process.exit(1)});
          NODE
      - name: Record final pass
        shell: bash
        run: |
          set -euo pipefail
          {
            echo
            echo '## Final browser verification after 404 correction'
            sed 's/^/- /' /tmp/results.txt
            echo '- Browser failure count: 0'
            echo '- Third-logo header and fallback text: PASS'
            echo '- Mobile menu behavior: PASS'
          } >> docs/verification/LOGO_EVERYWHERE_2026-07-13.md
          rm .github/workflows/verify-logo-everywhere-final.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record final logo-everywhere browser pass'
          git push origin main
