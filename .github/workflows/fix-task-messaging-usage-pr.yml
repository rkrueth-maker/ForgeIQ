name: Fix task messaging usage accounting

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/text-messaging-task-assignment' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Make usage recording idempotent
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('apps-script/business-office/BusinessOffice_TaskMessaging_20_SMS.gs')
          text = path.read_text()
          start = text.index('function h38TmRecordUsage_(')
          end = text.index('function h38TmSendMessage_(', start)
          replacement = '''function h38TmRecordUsage_(message, direction) {
            direction = direction || message.Direction;
            var body = message["Message Body"] || "",
              segments = Math.max(1, Math.ceil(body.length / 160)),
              existing = h38TmRead_("USAGE", { includeVoided: true }).find(
                function (row) {
                  return (
                    row["Message ID"] === message["Message ID"] &&
                    row.Direction === direction
                  );
                },
              ),
              values = {
                "Message ID": message["Message ID"],
                Provider: message.Provider || "twilio",
                Direction: direction,
                Segments: segments,
                "Provider Price": message["Provider Price"] || "",
                "Provider Price Unit": message["Provider Price Unit"] || "",
                "Carrier Fee Estimate": existing
                  ? existing["Carrier Fee Estimate"] || ""
                  : "",
                "Recorded Time": h38TmNow_(),
                Notes:
                  "One usage row is maintained per message and direction; provider price may arrive after delivery sync.",
              };
            return existing
              ? h38TmUpdate_("USAGE", existing["Usage ID"], values)
              : h38TmAppend_("USAGE", values);
          }
          '''
          path.write_text(text[:start] + replacement + text[end:])
          PY
          npx --yes prettier@3.6.2 --write apps-script/business-office/BusinessOffice_TaskMessaging_20_SMS.gs
          node scripts/verify-task-messaging.js

      - name: Commit usage correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps-script/business-office/BusinessOffice_TaskMessaging_20_SMS.gs artifacts/task-messaging/verification.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Make SMS usage reporting idempotent'
          git push origin HEAD:${{ github.head_ref }}
