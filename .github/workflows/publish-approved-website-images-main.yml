name: Publish Approved Website Images to Main

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write

concurrency:
  group: publish-approved-website-images-main
  cancel-in-progress: false

jobs:
  publish-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply all four approved image placements
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          version = '20260715-approved-images-main'

          index_path = Path('index.html')
          index = index_path.read_text()
          index = index.replace(
              'commercial-evolution.css?v=20260714-commercial-evolution',
              f'commercial-evolution.css?v={version}',
              1,
          )
          hero_old = '''      <aside class="commercial-hero__proof" aria-label="What customers receive">\n        <img src="assets/highway38-logo.png?v=20260713-logo2" alt="Highway 38 Solutions" width="112" height="86">'''
          hero_new = '''      <aside class="commercial-hero__proof" aria-label="What customers receive">\n        <figure class="approved-hero-visual" data-image-classification="representative-environment">\n          <img src="assets/approved-website-images/homepage-hero-garage-workspace.webp?v=20260715-approved-images-main" alt="Organized garage and workshop with workbench, tools, storage, and clear work zones." width="720" height="405" decoding="async" fetchpriority="high">\n        </figure>\n        <img src="assets/highway38-logo.png?v=20260713-logo2" alt="Highway 38 Solutions" width="112" height="86">'''
          if hero_old not in index:
              raise SystemExit('Homepage hero insertion point changed.')
          index = index.replace(hero_old, hero_new, 1)

          process_old = '''        <div class="commercial-grid commercial-grid--4 commercial-process">\n          <article class="commercial-card"><h3>1. Send the rough version</h3><p>Describe what is messy, blocked, unclear, or costing time. Share only the project information that is necessary.</p></article>\n          <article class="commercial-card"><h3>2. Confirm exact scope</h3><p>The service, deliverables, price, timing, revision allowance, exclusions, and boundaries are confirmed before work begins.</p></article>\n          <article class="commercial-card"><h3>3. Build and review</h3><p>The work is organized, checked, and reviewed by Highway 38 Solutions before anything is sent or completed.</p></article>\n          <article class="commercial-card"><h3>4. Use the finished result</h3><p>Receive a clear handoff showing the recommended next action, remaining decisions, assumptions, and unknowns.</p></article>\n        </div>'''
          process_new = '''        <div class="approved-process-layout">\n          <figure class="approved-image-figure approved-image-figure--planning" data-image-classification="representative-environment">\n            <img src="assets/approved-website-images/project-planning-desk.webp?v=20260715-approved-images-main" alt="Project planning documents, measurements, notes, and layout materials arranged on a work surface." width="720" height="405" loading="lazy" decoding="async">\n          </figure>\n          <div class="commercial-grid commercial-process approved-process-grid">\n            <article class="commercial-card"><h3>1. Send the rough version</h3><p>Describe what is messy, blocked, unclear, or costing time. Share only the project information that is necessary.</p></article>\n            <article class="commercial-card"><h3>2. Confirm exact scope</h3><p>The service, deliverables, price, timing, revision allowance, exclusions, and boundaries are confirmed before work begins.</p></article>\n            <article class="commercial-card"><h3>3. Build and review</h3><p>The work is organized, checked, and reviewed by Highway 38 Solutions before anything is sent or completed.</p></article>\n            <article class="commercial-card"><h3>4. Use the finished result</h3><p>Receive a clear handoff showing the recommended next action, remaining decisions, assumptions, and unknowns.</p></article>\n          </div>\n        </div>'''
          if process_old not in index:
              raise SystemExit('Homepage How It Works insertion point changed.')
          index = index.replace(process_old, process_new, 1)
          index_path.write_text(index)

          solutions_path = Path('solutions.html')
          solutions = solutions_path.read_text()
          solutions = solutions.replace(
              'commercial-evolution.css?v=20260714-commercial-evolution',
              f'commercial-evolution.css?v={version}',
              1,
          )
          digital_old = '''</p></div><div class="product-grid" data-products="implementation"></div></div></section><section class="section" id="manufacturing">'''
          digital_new = '''</p></div><figure class="approved-image-figure approved-solution-image approved-image-figure--workflow" data-image-classification="representative-environment"><img src="assets/approved-website-images/business-workflow-office.webp?v=20260715-approved-images-main" alt="Organized business workspace with a computer displaying a structured workflow and planning materials." width="720" height="405" loading="lazy" decoding="async"></figure><div class="product-grid" data-products="implementation"></div></div></section><section class="section" id="manufacturing">'''
          if digital_old not in solutions:
              raise SystemExit('Digital Workflows insertion point changed.')
          solutions = solutions.replace(digital_old, digital_new, 1)

          manufacturing_old = '''</p></div><div class="product-grid" data-products="manufacturing"></div></div></section><section class="section alt"><div class="container"><div class="cta">'''
          manufacturing_new = '''</p></div><figure class="approved-image-figure approved-solution-image approved-image-figure--manufacturing" data-image-classification="representative-environment"><img src="assets/approved-website-images/manufacturing-automation.webp?v=20260715-approved-images-main" alt="Manufacturing workspace with automation equipment, fixtures, and production planning context." width="720" height="405" loading="lazy" decoding="async"></figure><div class="product-grid" data-products="manufacturing"></div></div></section><section class="section alt"><div class="container"><div class="cta">'''
          if manufacturing_old not in solutions:
              raise SystemExit('Manufacturing insertion point changed.')
          solutions = solutions.replace(manufacturing_old, manufacturing_new, 1)
          solutions_path.write_text(solutions)

          css_path = Path('commercial-evolution.css')
          css = css_path.read_text()
          if '.approved-hero-visual{' in css:
              raise SystemExit('Approved image CSS already exists.')
          css = css.rstrip() + '''\n.approved-hero-visual{margin:-1.35rem -1.35rem 1rem;overflow:hidden;border-radius:1.35rem 1.35rem .9rem .9rem;background:var(--h38-sage)}.approved-hero-visual img,.approved-image-figure img{display:block;width:100%;height:auto;aspect-ratio:16/9;object-fit:cover}.approved-process-layout{display:grid;grid-template-columns:minmax(0,.9fr) minmax(0,1.1fr);gap:1rem;align-items:stretch}.approved-image-figure{margin:0;min-width:0;overflow:hidden;border:1px solid var(--h38-line);border-radius:1.15rem;background:#fff;box-shadow:var(--h38-shadow)}.approved-process-layout .approved-image-figure img{height:100%;min-height:360px}.approved-process-grid{grid-template-columns:repeat(2,minmax(0,1fr));align-content:stretch}.approved-process-grid .commercial-card{min-width:0}.approved-solution-image{margin:0 0 1.25rem}.approved-solution-image img{max-height:420px}.approved-image-figure--workflow img{object-position:center}.approved-image-figure--manufacturing img{object-position:center 48%}\n'''
          old_1000 = '@media(max-width:1000px){.commercial-grid--4{grid-template-columns:repeat(2,1fr)}.commercial-hero__grid,.experience-grid{grid-template-columns:minmax(0,1fr)}}'
          new_1000 = '@media(max-width:1000px){.commercial-grid--4{grid-template-columns:repeat(2,1fr)}.commercial-hero__grid,.experience-grid,.approved-process-layout{grid-template-columns:minmax(0,1fr)}.approved-process-layout .approved-image-figure img{height:auto;min-height:0}}'
          if old_1000 not in css:
              raise SystemExit('Responsive 1000px CSS insertion point changed.')
          css = css.replace(old_1000, new_1000, 1)
          old_780 = '@media(max-width:780px){.commercial-grid,.commercial-grid--4,.commercial-statbar__grid,.portal-preview{grid-template-columns:1fr}'
          new_780 = '@media(max-width:780px){.commercial-grid,.commercial-grid--4,.commercial-statbar__grid,.portal-preview,.approved-process-grid{grid-template-columns:1fr}'
          if old_780 not in css:
              raise SystemExit('Responsive 780px CSS insertion point changed.')
          css = css.replace(old_780, new_780, 1)
          css_path.write_text(css)
          PY

      - name: Verify all approved assets and bounded scope
        shell: bash
        run: |
          set -euo pipefail
          files=(
            assets/approved-website-images/homepage-hero-garage-workspace.webp
            assets/approved-website-images/project-planning-desk.webp
            assets/approved-website-images/business-workflow-office.webp
            assets/approved-website-images/manufacturing-automation.webp
          )
          for file_path in "${files[@]}"; do
            test -s "$file_path"
            file "$file_path" | grep -q 'Web/P image'
          done
          python3 <<'PY'
          from pathlib import Path
          import re

          expected = {
              'assets/approved-website-images/homepage-hero-garage-workspace.webp': ('index.html', 'Organized garage and workshop with workbench, tools, storage, and clear work zones.', False),
              'assets/approved-website-images/project-planning-desk.webp': ('index.html', 'Project planning documents, measurements, notes, and layout materials arranged on a work surface.', True),
              'assets/approved-website-images/business-workflow-office.webp': ('solutions.html', 'Organized business workspace with a computer displaying a structured workflow and planning materials.', True),
              'assets/approved-website-images/manufacturing-automation.webp': ('solutions.html', 'Manufacturing workspace with automation equipment, fixtures, and production planning context.', True),
          }
          for asset, (page, alt, lazy) in expected.items():
              text = Path(page).read_text()
              matches = [tag for tag in re.findall(r'<img\b[^>]+>', text) if asset in tag]
              if len(matches) != 1:
                  raise SystemExit(f'{asset} expected exactly once in {page}; found {len(matches)}')
              tag = matches[0]
              if f'alt="{alt}"' not in tag:
                  raise SystemExit(f'Alt mismatch: {asset}')
              if lazy != ('loading="lazy"' in tag):
                  raise SystemExit(f'Loading policy mismatch: {asset}')
              if 'width="720"' not in tag or 'height="405"' not in tag:
                  raise SystemExit(f'Dimensions missing: {asset}')
          combined = Path('index.html').read_text() + Path('solutions.html').read_text()
          if combined.count('data-image-classification="representative-environment"') != 4:
              raise SystemExit('All four representative image classifications are required.')
          forbidden = ['completed Highway 38 project', 'customer proof image', 'before-and-after evidence']
          for phrase in forbidden:
              if phrase.lower() in combined.lower():
                  raise SystemExit(f'Forbidden representative-image claim: {phrase}')
          PY
          node scripts/verify-commercial-system.js
          node scripts/verify-highway38-final-polish.js
          node --check sample-raster-images.js
          git diff --check

      - name: Commit directly to main and remove runner
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/publish-approved-website-images-main.yml
          python3 <<'PY'
          import subprocess
          allowed = {
              'index.html',
              'solutions.html',
              'commercial-evolution.css',
              '.github/workflows/publish-approved-website-images-main.yml',
          }
          changed = set(subprocess.check_output(['git', 'status', '--short'], text=True).splitlines())
          paths = {line[3:] for line in changed}
          if not paths.issubset(allowed):
              raise SystemExit(f'Unexpected modified files: {sorted(paths - allowed)}')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html solutions.html commercial-evolution.css .github/workflows/publish-approved-website-images-main.yml
          git commit -m 'Publish all approved Highway 38 website images'
          git push origin HEAD:main
