name: Manufacturing Image Repair Diagnostics

on:
  push:
    branches: [main]

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      FAILED_RUN_ID: 30049442232
    steps:
      - name: Publish concise verifier failure
        shell: bash
        run: |
          set -euo pipefail
          gh run view "$FAILED_RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed > "$RUNNER_TEMP/failed.log" || true
          issue="$(gh issue list --repo "$GITHUB_REPOSITORY" --search 'Manufacturing image repair in:title' --state all --limit 1 --json number --jq '.[0].number // empty')"
          body_file="$RUNNER_TEMP/report.md"
          {
            echo '# Manufacturing image repair diagnostics'
            echo
            echo "Failed run: \`$FAILED_RUN_ID\`"
            echo
            echo '## Error summary'
            echo '```text'
            grep -Ei '(^|[^a-z])(error|failed|failure|mismatch|missing|invalid|expected|assertion|process completed)([^a-z]|$)' "$RUNNER_TEMP/failed.log" | tail -n 180 || true
            echo '```'
            echo
            echo '## Final 40 log lines'
            echo '```text'
            tail -n 40 "$RUNNER_TEMP/failed.log"
            echo '```'
          } > "$body_file"
          if [[ -n "$issue" ]]; then
            gh issue edit "$issue" --repo "$GITHUB_REPOSITORY" --title 'Manufacturing image repair diagnostics' --body-file "$body_file"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title 'Manufacturing image repair diagnostics' --body-file "$body_file"
          fi
