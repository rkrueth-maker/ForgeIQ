name: Manufacturing Image Repair Diagnostics

on:
  push:
    branches: [main]

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPAIR_COMMIT: e61f6fb051d5978b6897bd8614ed2ea0531321b9
    steps:
      - name: Publish all runs for prior repair commit
        shell: bash
        run: |
          set -euo pipefail
          runs="$(gh run list --repo "$GITHUB_REPOSITORY" --commit "$REPAIR_COMMIT" --limit 100 --json databaseId,name,workflowName,status,conclusion,headSha,event,url,createdAt,updatedAt)"
          issue="$(gh issue list --repo "$GITHUB_REPOSITORY" --search 'Manufacturing image repair in:title' --state all --limit 1 --json number --jq '.[0].number // empty')"
          body_file="$RUNNER_TEMP/report.md"
          {
            echo '# Manufacturing image repair diagnostics'
            echo
            echo "Commit: \`$REPAIR_COMMIT\`"
            echo
            echo '```json'
            echo "$runs" | jq .
            echo '```'
          } > "$body_file"
          if [[ -n "$issue" ]]; then
            gh issue edit "$issue" --repo "$GITHUB_REPOSITORY" --title 'Manufacturing image repair diagnostics' --body-file "$body_file"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title 'Manufacturing image repair diagnostics' --body-file "$body_file"
          fi
