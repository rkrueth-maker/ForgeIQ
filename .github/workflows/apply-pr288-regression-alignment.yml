name: Apply PR 288 Regression Alignment

on:
  push:
    branches:
      - agent/business-office-startup-performance

permissions:
  contents: write

concurrency:
  group: apply-pr288-regression-alignment
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/business-office-startup-performance
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Align stale project-example test with accepted page
        shell: bash
        run: |
          set -euo pipefail
          node scripts/verify-change-governance.js
          python3 - <<'PY'
          from pathlib import Path
          path=Path('tests/test_scheduler_web_dashboard.py')
          text=path.read_text(encoding='utf-8')
          old='    assert "Demonstration materials use sample information" in html_response.get_data(as_text=True)'
          new='    assert "Eight complete project demonstrations" in html_response.get_data(as_text=True)\n    assert "Representative demonstrations." in html_response.get_data(as_text=True)'
          if text.count(old)!=1:
              raise SystemExit('Public example test marker changed unexpectedly.')
          path.write_text(text.replace(old,new,1),encoding='utf-8')
          PY
          rm -f .github/workflows/apply-pr288-regression-alignment.yml
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pytest -q
          node scripts/verify-change-governance.js
          node scripts/verify-one-shot-ux.js
          node scripts/verify-owner-business-office-ux.js
          node scripts/verify-business-office-control-plane.js
          node scripts/verify-reusable-business-office-contracts.js
          git diff --check
      - name: Commit regression alignment
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/test_scheduler_web_dashboard.py .github/workflows/apply-pr288-regression-alignment.yml
          git commit -m 'Align project example regression with current site'
          git push origin HEAD:agent/business-office-startup-performance
