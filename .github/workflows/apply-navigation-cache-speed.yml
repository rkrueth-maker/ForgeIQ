name: Apply Navigation Cache Speed Pass

on:
  push:
    branches:
      - agent/navigation-and-module-cache-speed

permissions:
  contents: write

concurrency:
  group: apply-navigation-cache-speed
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/navigation-and-module-cache-speed
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Apply navigation and route-cache performance build
        shell: bash
        run: |
          set -euo pipefail
          node scripts/verify-change-governance.js
          python3 - <<'PY'
          from pathlib import Path
          import json
          import re

          def read(path):
              return Path(path).read_text(encoding='utf-8')

          def write(path, text):
              Path(path).write_text(text, encoding='utf-8')

          def replace_once(text, old, new, label):
              count=text.count(old)
              if count!=1:
                  raise SystemExit(f'{label}: expected one marker, found {count}')
              return text.replace(old,new,1)

          def regex_once(text, pattern, replacement, label):
              updated,count=re.subn(pattern,replacement,text,count=1,flags=re.S)
              if count!=1:
                  raise SystemExit(f'{label}: expected one regex match, found {count}')
              return updated

          # Correct the visible module grouping and ordering.
          path='apps-script/business-office/BusinessOffice_ModuleContract.gs'
          text=read(path)
          text=replace_once(text,"var H38_UNIFIED_MODULE_CONTRACT_VERSION = '2026-07-23-v1';","var H38_UNIFIED_MODULE_CONTRACT_VERSION = '2026-07-24-v2';",'contract version')
