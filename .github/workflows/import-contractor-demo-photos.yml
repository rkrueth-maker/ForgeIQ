name: Import exact contractor demo photos
on:
  push:
    branches:
      - fix/contractor-demo-cache-key
    paths:
      - .github/workflows/import-contractor-demo-photos.yml
permissions:
  contents: write
jobs:
  import-photos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/contractor-demo-cache-key
          fetch-depth: 0
      - name: Download exact uploaded files
        run: |
          set -euo pipefail
          mkdir -p assets/contractor-demo
          curl -L --fail --retry 3 'https://at.adobe.com/QWWdedH36JWV9nrT' -o assets/contractor-demo/flower-before.png
          curl -L --fail --retry 3 'https://at.adobe.com/ZSKCQvisEQNOi3Df' -o assets/contractor-demo/flower-after.png
          curl -L --fail --retry 3 'https://at.adobe.com/VimEbSoqEzBrZEKu' -o assets/contractor-demo/driveway-before.jpg
          curl -L --fail --retry 3 'https://at.adobe.com/ImhDF25AnY3FULpy' -o assets/contractor-demo/driveway-after.jpg
          curl -L --fail --retry 3 'https://at.adobe.com/YBlPDAiw8fKxaPqq' -o assets/contractor-demo/pond-before.jpg
          curl -L --fail --retry 3 'https://at.adobe.com/eHvwmmvfngPCXBUk' -o assets/contractor-demo/pond-after.jpg
          curl -L --fail --retry 3 'https://at.adobe.com/hDE55Wl3dnsy8YOd' -o assets/contractor-demo/lot-before.jpg
          curl -L --fail --retry 3 'https://at.adobe.com/Jb8Tj5J7vLkospox' -o assets/contractor-demo/lot-after.jpg
          file assets/contractor-demo/*
          test $(stat -c%s assets/contractor-demo/flower-before.png) -gt 50000
          test $(stat -c%s assets/contractor-demo/flower-after.png) -gt 50000
          test $(stat -c%s assets/contractor-demo/driveway-before.jpg) -gt 50000
          test $(stat -c%s assets/contractor-demo/driveway-after.jpg) -gt 50000
          test $(stat -c%s assets/contractor-demo/pond-before.jpg) -gt 50000
          test $(stat -c%s assets/contractor-demo/pond-after.jpg) -gt 50000
          test $(stat -c%s assets/contractor-demo/lot-before.jpg) -gt 50000
          test $(stat -c%s assets/contractor-demo/lot-after.jpg) -gt 50000
      - name: Replace illustration mappings and force cache refresh
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('assets/js/h38-contractor-demo-data.js')
          s=p.read_text()
          replacements={
            'assets/contractor-demo/flower-before.svg':'assets/contractor-demo/flower-before.png?v=20260722-exact',
            'assets/contractor-demo/flower-after.svg':'assets/contractor-demo/flower-after.png?v=20260722-exact',
            'assets/contractor-demo/driveway-before.svg':'assets/contractor-demo/driveway-before.jpg?v=20260722-exact',
            'assets/contractor-demo/driveway-after.svg':'assets/contractor-demo/driveway-after.jpg?v=20260722-exact',
            'assets/contractor-demo/pond-before.svg':'assets/contractor-demo/pond-before.jpg?v=20260722-exact',
            'assets/contractor-demo/pond-after.svg':'assets/contractor-demo/pond-after.jpg?v=20260722-exact',
            'assets/contractor-demo/lot-before.svg':'assets/contractor-demo/lot-before.jpg?v=20260722-exact',
            'assets/contractor-demo/lot-after.svg':'assets/contractor-demo/lot-after.jpg?v=20260722-exact',
            'version: "2026.07.22.3"':'version: "2026.07.22.4"'
          }
          for a,b in replacements.items(): s=s.replace(a,b)
          p.write_text(s)
          for name in ['contractor-demo.html','contractor-demo-quote.html']:
            q=Path(name)
            t=q.read_text().replace('h38-contractor-demo-data.js?v=20260722a','h38-contractor-demo-data.js?v=20260722-exact-photos')
            q.write_text(t)
          PY
          rm -f assets/contractor-demo/*.svg
          rm -f .github/workflows/import-contractor-demo-photos.yml
      - name: Commit exact photos
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Use exact uploaded contractor demo photos'
          git push origin HEAD:fix/contractor-demo-cache-key
