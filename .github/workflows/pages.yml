name: Deploy Highway 38 site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout current source
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stage static site bundle
        run: |
          rm -rf _site
          mkdir -p _site
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='tests/' \
            --exclude='reports/' \
            --exclude='logs/' \
            --exclude='scripts/' \
            --exclude='shopify/' \
            --exclude='modules/' \
            --exclude='*.py' \
            --exclude='requirements.txt' \
            --exclude='*.toml' \
            --exclude='*.code-workspace' \
            --exclude='*.md' \
            ./ _site/

      - name: Upload current root site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
          name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Deploy current source to Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
