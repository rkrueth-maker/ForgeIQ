name: Inspect unified production run

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    if: ${{ github.head_ref == 'agent/text-messaging-task-assignment' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Read final production run and artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: b7b6e5ff87d06ce237b892a9222c5a7351814d25
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .h38-evidence
          RUNS=$(curl -sSfL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-owner-portal-hard-rule-production.yml/runs?event=push&head_sha=${TARGET_SHA}&per_page=10")
          RUN=$(printf '%s' "$RUNS" | jq -c '.workflow_runs | sort_by(.run_number) | last')
          test "$RUN" != "null"
          RUN_ID=$(printf '%s' "$RUN" | jq -r '.id')
          ARTIFACTS=$(curl -sSfL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts?per_page=100")
          printf '%s\n' "$RUN" | jq --argjson artifacts "$ARTIFACTS" '{id,run_number,status,conclusion,event,head_sha,created_at,updated_at,html_url,artifacts:($artifacts.artifacts|map({id,name,size_in_bytes,expired,created_at,expires_at}))}' > .h38-evidence/production-b7b6e5ff.json
          cat .h38-evidence/production-b7b6e5ff.json
          test "$(jq -r '.conclusion' .h38-evidence/production-b7b6e5ff.json)" = "success"
          test "$(jq -r '.artifacts | length' .h38-evidence/production-b7b6e5ff.json)" -ge 1
      - name: Commit inspection record to temporary branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .h38-evidence/production-b7b6e5ff.json
          git commit -m 'Record final unified production run evidence'
          git push origin HEAD:${{ github.head_ref }}
