name: Legacy Business Office Repair Diagnostics (Manual Only)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: highway-38-legacy-business-office-repair-diagnostics
  cancel-in-progress: false

jobs:
  diagnose-without-production-write:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run source and deployment-contract diagnostics
        run: |
          npm install
          npm run test:business-office
          node scripts/verify-business-office-existing-deployment.js
          node scripts/verify-owner-portal-routing.js
      - name: Confirm repair workflow is non-deploying
        run: |
          echo 'PASS — legacy repair is diagnostic only.'
          echo 'No clasp create-script, create-deployment, deployment update, trigger creation, or external action is allowed.'
          echo 'Use Deploy Unified Owner Portal for the accepted existing project and deployments.'
      - name: Upload diagnostic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-business-office-repair-diagnostic-${{ github.run_id }}
          path: |
            artifacts/business-office/
            artifacts/owner-portal-routing/
          if-no-files-found: warn
          retention-days: 30
