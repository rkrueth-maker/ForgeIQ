name: Generate Product Proof PNGs

on:
  push:
    branches:
      - fix/real-sample-images
    paths:
      - 'tests/fixtures/product-proof-generator.html'
      - '.github/workflows/generate-product-proof-pngs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out proof branch
        uses: actions/checkout@v4
        with:
          ref: fix/real-sample-images
          fetch-depth: 0

      - name: Start local preview
        run: |
          python3 -m http.server 8000 --bind 127.0.0.1 > /tmp/h38-proof-generator.log 2>&1 &
          echo $! > /tmp/h38-proof-generator.pid
          sleep 2

      - name: Render product proof PNG files
        shell: bash
        run: |
          set -euo pipefail
          chrome="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser)"
          mkdir -p assets/product-proof
          declare -A names=(
            [H38-P008]='digital-workflow-build.png'
            [H38-P009]='cleanup-implementation.png'
            [H38-P010]='automation-opportunity-snapshot.png'
            [H38-P011]='shop-bottleneck-roi-audit.png'
            [H38-P012]='automation-vendor-quote-pack.png'
            [H38-P013]='fixture-jig-concept-review.png'
            [H38-P014]='vision-inspection-concept-review.png'
            [H38-P015]='robot-tending-concept-pack.png'
          )
          for id in H38-P008 H38-P009 H38-P010 H38-P011 H38-P012 H38-P013 H38-P014 H38-P015; do
            "$chrome" --headless=new --no-sandbox --disable-gpu --disable-dev-shm-usage \
              --hide-scrollbars --virtual-time-budget=3000 --window-size=1200,675 \
              --screenshot="assets/product-proof/${names[$id]}" \
              "http://127.0.0.1:8000/tests/fixtures/product-proof-generator.html?id=$id"
            test -s "assets/product-proof/${names[$id]}"
          done

      - name: Commit generated raster assets
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/product-proof/*.png
          if git diff --cached --quiet; then
            echo 'Generated proof PNGs already match the branch.'
            exit 0
          fi
          git commit -m 'Add generated product proof PNGs'
          git push origin HEAD:fix/real-sample-images
