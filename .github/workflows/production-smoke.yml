name: Production Site Smoke Check

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/production-smoke.yml'
      - 'scripts/verify-issue83-source.sh'
      - 'scripts/verify-one-shot-ux.js'
      - 'ux-unified-public.css'
      - 'request-flow.js'
      - 'customer-portal-ux.js'
      - 'public-expansion.js'
      - 'index.html'
      - 'products.html'
      - 'product.html'
      - 'sample-library-now.html'
      - 'start-request.html'
      - 'customer-portal.html'
      - 'problem-starter.html'
      - 'automation-opportunity-planning.html'
      - 'digital-file-cleanup-planning.html'
      - 'fixture-jig-concept-review.html'
      - 'garage-layout-planning.html'
      - 'manufacturing-bottleneck-analysis.html'
      - 'project-planning-packets.html'
      - 'robot-tending-concept-planning.html'
      - 'shop-layout-flow-review.html'
      - 'small-business-workflow-cleanup.html'
      - 'vision-inspection-concept-planning.html'
      - 'service-landing.js'
      - 'issue83-enhancements.js'
      - 'issue83-enhancements.css'
      - 'catalog-data.js'
      - 'commercial.js'
      - 'commercial.css'
      - 'catalog-navigation.js'
      - 'product-detail.js'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/production-smoke.yml'
      - 'scripts/verify-issue83-source.sh'
      - 'scripts/verify-one-shot-ux.js'
      - 'docs/commercial-system/production-smoke-request.md'
      - 'ux-unified-public.css'
      - 'request-flow.js'
      - 'customer-portal-ux.js'
      - 'public-expansion.js'
      - 'index.html'
      - 'products.html'
      - 'product.html'
      - 'sample-library-now.html'
      - 'start-request.html'
      - 'customer-portal.html'
      - 'problem-starter.html'
      - 'automation-opportunity-planning.html'
      - 'digital-file-cleanup-planning.html'
      - 'fixture-jig-concept-review.html'
      - 'garage-layout-planning.html'
      - 'manufacturing-bottleneck-analysis.html'
      - 'project-planning-packets.html'
      - 'robot-tending-concept-planning.html'
      - 'shop-layout-flow-review.html'
      - 'small-business-workflow-cleanup.html'
      - 'vision-inspection-concept-planning.html'
      - 'service-landing.js'
      - 'issue83-enhancements.js'
      - 'issue83-enhancements.css'
      - 'catalog-data.js'
      - 'commercial.js'
      - 'commercial.css'
      - 'catalog-navigation.js'
      - 'product-detail.js'

permissions:
  contents: read

jobs:
  pull-request-source-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify proposed public source markers
        shell: bash
        run: |
          set +e
          bash scripts/verify-issue83-source.sh > /tmp/issue83-source-report.txt 2>&1
          status=$?
          cat /tmp/issue83-source-report.txt
          exit "$status"
      - name: Upload Issue 83 source report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue83-source-report
          path: /tmp/issue83-source-report.txt
          if-no-files-found: error

  production-smoke:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Verify deployed GitHub Pages site
        shell: bash
        run: |
          set -euo pipefail
          base='https://rkrueth-maker.github.io/highway-38-solutions'
          fetch_until_ready() {
            local path="$1"
            local pattern="$2"
            local out="$3"
            for attempt in $(seq 1 24); do
              if curl --fail --location --silent --show-error --max-time 30 "$base/$path?deployment=${GITHUB_SHA}" -o "$out" && grep -Fq "$pattern" "$out"; then
                return 0
              fi
              sleep 10
            done
            echo "Production check failed for $path; expected: $pattern" >&2
            return 1
          }

          fetch_until_ready '' 'Big problems.' /tmp/home.html
          grep -Fq 'Clear plans.' /tmp/home.html
          grep -Fq 'h38-outcome-grid' /tmp/home.html
          grep -Fq 'Start a Request' /tmp/home.html
          fetch_until_ready 'products.html' 'Choose the smallest service that produces a useful result.' /tmp/products.html
          grep -Fq '15 fixed-price services. 9 approved bundles. 4 scoped systems.' /tmp/products.html
          fetch_until_ready 'product.html?id=H38-P001' 'data-product-detail-single' /tmp/product.html
          fetch_until_ready 'sample-library-now.html' 'See the finished work before you choose a service.' /tmp/samples.html
          fetch_until_ready 'start-request.html' 'What would you like to have when this is finished?' /tmp/request.html
          grep -Fq 'data-request-step="1"' /tmp/request.html
          grep -Fq 'data-request-step="3"' /tmp/request.html
          fetch_until_ready 'problem-starter.html' 'The Highway 38 Problem Starter' /tmp/problem-starter.html

          fetch_until_ready 'automation-opportunity-planning.html' '<title>Automation Opportunity Planning | Highway 38 Solutions</title>' /tmp/automation.html
          fetch_until_ready 'digital-file-cleanup-planning.html' '<title>Digital File Cleanup Planning | Highway 38 Solutions</title>' /tmp/digital-cleanup.html
          fetch_until_ready 'fixture-jig-concept-review.html' '<title>Fixture and Jig Concept Review | Highway 38 Solutions</title>' /tmp/fixture.html
          fetch_until_ready 'garage-layout-planning.html' '<title>Garage Layout Planning | Highway 38 Solutions</title>' /tmp/garage.html
          fetch_until_ready 'manufacturing-bottleneck-analysis.html' '<title>Manufacturing Bottleneck Analysis | Highway 38 Solutions</title>' /tmp/bottleneck.html
          fetch_until_ready 'project-planning-packets.html' '<title>Project Planning Packets | Highway 38 Solutions</title>' /tmp/project.html
          fetch_until_ready 'robot-tending-concept-planning.html' '<title>Robot Tending Concept Planning | Highway 38 Solutions</title>' /tmp/robot.html
          fetch_until_ready 'shop-layout-flow-review.html' '<title>Shop Layout and Flow Review | Highway 38 Solutions</title>' /tmp/shop.html
          fetch_until_ready 'small-business-workflow-cleanup.html' '<title>Small-Business Workflow Cleanup | Highway 38 Solutions</title>' /tmp/workflow.html
          fetch_until_ready 'vision-inspection-concept-planning.html' '<title>Vision Inspection Concept Planning | Highway 38 Solutions</title>' /tmp/vision.html

          grep -Fq 'data-owner-link="true"' /tmp/samples.html
          if grep -Fq '25,000+ CNC programs' /tmp/home.html /tmp/products.html /tmp/samples.html; then
            echo 'Prohibited 25,000+ CNC programs claim found on deployed public pages.' >&2
            exit 1
          fi

          echo 'Production GitHub Pages smoke check passed.'
