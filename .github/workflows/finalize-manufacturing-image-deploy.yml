name: Finalize Manufacturing Image Deployment

on:
  push:
    branches: [main]

permissions:
  contents: write
  actions: write
  issues: write

concurrency:
  group: finalize-manufacturing-image-deploy
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPAIR_SHA: 1a1657c8f87fb302301872c72b05828f58915c02
      APPROVED_SHA256: e311000da5b001aab8c57716f709404f6685b4c433410babb30c3cbbc17f6d0c
      LIVE_ROOT: https://rkrueth-maker.github.io/highway-38-solutions

    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Cancel obsolete waiting repair run
        shell: bash
        run: |
          set -euo pipefail
          runs="$(gh run list --repo "$GITHUB_REPOSITORY" --commit d7bc0fce01d6796808e71b9b10c780ae9d45fe49 --limit 100 --json databaseId,workflowName,status,conclusion)"
          jq -r '.[] | select(.workflowName=="Restore Exact Approved Manufacturing Image" and (.status=="in_progress" or .status=="queued")) | .databaseId' <<<"$runs" | while read -r run_id; do
            if [[ -n "$run_id" ]]; then
              gh run cancel "$run_id" --repo "$GITHUB_REPOSITORY" || true
            fi
          done

      - name: Verify clean repair source and required gates
        shell: bash
        run: |
          set -euo pipefail
          git merge-base --is-ancestor "$REPAIR_SHA" HEAD
          unexpected="$(git diff --name-only "$REPAIR_SHA"..HEAD | grep -v '^.github/workflows/finalize-manufacturing-image-deploy.yml$' || true)"
          if [[ -n "$unexpected" ]]; then
            echo 'Unexpected files changed after the repair commit:'
            echo "$unexpected"
            exit 1
          fi
          node scripts/verify-change-governance.js
          python3 scripts/verify-public-images.py
          node scripts/verify-public-image-placements.js
          node scripts/verify-public-website-architecture.js
          node scripts/verify-public-ecosystem-tools.js
          test "$(sha256sum assets/approved-website-images/manufacturing-automation.jpg | awk '{print $1}')" = "$APPROVED_SHA256"
          grep -Fq 'manufacturing-automation.jpg?v=e311000d' solutions.html
          grep -Fq 'manufacturing-automation.jpg?v=e311000d' about.html
          grep -Fq 'manufacturing-automation.jpg?v=e311000d' robotics-automation.html
          git diff --check

      - name: Remove finalizer and create clean accepted commit
        shell: bash
        run: |
          set -euo pipefail
          base_at_start="$(git rev-parse HEAD)"
          rm -f .github/workflows/finalize-manufacturing-image-deploy.yml
          git fetch origin main
          if [[ "$(git rev-parse origin/main)" != "$base_at_start" ]]; then
            echo 'Main changed during finalization; refusing to overwrite concurrent work.'
            exit 1
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/finalize-manufacturing-image-deploy.yml
          git commit -m 'Remove manufacturing image deployment finalizer'
          git push origin HEAD:main
          git rev-parse HEAD > "$RUNNER_TEMP/final-main-sha.txt"

      - name: Dispatch canonical Pages workflow for exact final commit
        shell: bash
        run: |
          set -euo pipefail
          final_sha="$(cat "$RUNNER_TEMP/final-main-sha.txt")"
          gh workflow run pages.yml --repo "$GITHUB_REPOSITORY" --ref main
          run_id=''
          run_url=''
          for attempt in $(seq 1 60); do
            run_json="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow pages.yml --branch main --limit 40 --json databaseId,headSha,status,conclusion,url,event | jq -c --arg sha "$final_sha" '[.[] | select(.headSha==$sha)][0] // empty')"
            if [[ -n "$run_json" ]]; then
              run_id="$(jq -r '.databaseId' <<<"$run_json")"
              run_url="$(jq -r '.url' <<<"$run_json")"
              status="$(jq -r '.status' <<<"$run_json")"
              conclusion="$(jq -r '.conclusion // ""' <<<"$run_json")"
              echo "Pages run ${run_id}: ${status} ${conclusion}"
              if [[ "$status" == completed ]]; then
                test "$conclusion" = success
                break
              fi
            fi
            sleep 10
          done
          test -n "$run_id"
          printf '%s\n' "$run_id" > "$RUNNER_TEMP/pages-run-id.txt"
          printf '%s\n' "$run_url" > "$RUNNER_TEMP/pages-run-url.txt"

      - name: Verify cache-busted live pages and exact image bytes
        shell: bash
        run: |
          set -euo pipefail
          final_sha="$(cat "$RUNNER_TEMP/final-main-sha.txt")"
          run_id="$(cat "$RUNNER_TEMP/pages-run-id.txt")"
          run_url="$(cat "$RUNNER_TEMP/pages-run-url.txt")"
          marker="${run_id}-$(date +%s)"
          live_sha="$(curl -fsSL --connect-timeout 15 --max-time 30 "${LIVE_ROOT}/deployed-main-sha.txt?flush=${marker}")"
          test "$live_sha" = "$final_sha"
          for page in solutions about robotics-automation; do
            curl -fsSL --connect-timeout 15 --max-time 30 "${LIVE_ROOT}/${page}.html?flush=${marker}" -o "$RUNNER_TEMP/${page}.html"
            grep -Fq 'assets/approved-website-images/manufacturing-automation.jpg?v=e311000d' "$RUNNER_TEMP/${page}.html"
          done
          curl -fsSL --connect-timeout 15 --max-time 30 "${LIVE_ROOT}/assets/approved-website-images/manufacturing-automation.jpg?v=e311000d&flush=${marker}" -o "$RUNNER_TEMP/live-manufacturing.jpg"
          test "$(sha256sum "$RUNNER_TEMP/live-manufacturing.jpg" | awk '{print $1}')" = "$APPROVED_SHA256"
          python -m pip install --disable-pip-version-check pillow
          python3 -c "from PIL import Image,ImageStat; import os; p=os.environ['RUNNER_TEMP']+'/live-manufacturing.jpg'; im=Image.open(p); im.load(); assert im.format=='JPEG' and im.size==(1600,900); assert max(ImageStat.Stat(im.convert('RGB')).stddev)>=20; print('LIVE PASS: exact approved image is visible and nonblank.')"
          git push origin --delete agent/exact-manufacturing-image-transfer >/dev/null 2>&1 || true
          body="PASS — Exact approved manufacturing image repair is live at commit ${final_sha}. Governance and all required public image, placement, architecture, and ecosystem checks passed. GitHub Pages run ${run_id} succeeded; deployed-main-sha matches; solutions.html, about.html, and robotics-automation.html use manufacturing-automation.jpg?v=e311000d; live bytes match SHA-256 ${APPROVED_SHA256}. Run: ${run_url}"
          gh issue edit 287 --repo "$GITHUB_REPOSITORY" --title 'Manufacturing image repair — PASS' --body "$body"
          gh issue close 287 --repo "$GITHUB_REPOSITORY" --reason completed

      - name: Report finalization failure
        if: failure()
        shell: bash
        run: |
          body="BLOCKED — Manufacturing image deployment finalization failed. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gh issue edit 287 --repo "$GITHUB_REPOSITORY" --title 'Manufacturing image repair — BLOCKED' --body "$body" || true
