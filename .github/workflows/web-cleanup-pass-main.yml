name: Web Cleanup Pass Main

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/web-cleanup-pass-main.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Normalize shared page assets safely
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          changed=[]
          cache='20260713-cleanup1'
          for path in sorted(Path('.').glob('*.html')):
              text=path.read_text(encoding='utf-8')
              original=text

              # Current shared assets and the approved second logo only.
              text=re.sub(r'ecosystem\.css\?v=[^"\']+',f'ecosystem.css?v={cache}',text)
              text=re.sub(r'ecosystem\.js\?v=[^"\']+',f'ecosystem.js?v={cache}',text)
              text=re.sub(r'brand-global\.css\?v=[^"\']+',f'brand-global.css?v={cache}',text)
              text=re.sub(r'brand-global\.js\?v=[^"\']+',f'brand-global.js?v={cache}',text)
              text=re.sub(r'assets/highway38-logo\.png\?v=[^"\']+','assets/highway38-logo.png?v=20260713-logo2',text)

              # Remove accidental duplicate shared tags while preserving first occurrence.
              patterns=[
                  r'<link rel="stylesheet" href="brand-global\.css\?v=[^"]+">',
                  r'<script defer src="brand-global\.js\?v=[^"]+"></script>',
                  r'<link rel="stylesheet" href="ecosystem\.css\?v=[^"]+">',
                  r'<script defer src="ecosystem\.js\?v=[^"]+"></script>'
              ]
              for pattern in patterns:
                  matches=list(re.finditer(pattern,text))
                  for match in reversed(matches[1:]):
                      text=text[:match.start()]+text[match.end():]

              # Baseline document language and responsive viewport without reserializing HTML.
              if re.search(r'<html(?![^>]*\blang=)',text,re.I):
                  text=re.sub(r'<html\b','<html lang="en"',text,count=1,flags=re.I)
              if 'name="viewport"' not in text.lower() and '</head>' in text.lower():
                  text=re.sub(r'</head>','<meta name="viewport" content="width=device-width,initial-scale=1"></head>',text,count=1,flags=re.I)

              # External new-tab links must not receive opener access.
              def secure_target(match):
                  tag=match.group(0)
                  if re.search(r'\brel=',tag,re.I):
                      rel_match=re.search(r'rel="([^"]*)"',tag,re.I)
                      if rel_match:
                          values=set(rel_match.group(1).split())|{'noopener','noreferrer'}
                          tag=tag[:rel_match.start(1)]+' '.join(sorted(values))+tag[rel_match.end(1):]
                  else:
                      tag=tag[:-1]+' rel="noopener noreferrer">'
                  return tag
              text=re.sub(r'<a\b[^>]*target="_blank"[^>]*>',secure_target,text,flags=re.I)

              if text!=original:
                  path.write_text(text,encoding='utf-8')
                  changed.append(path.name)

          Path('/tmp/normalized-files.txt').write_text('\n'.join(changed))
          PY

      - name: Audit source, links, assets, IDs, and image accessibility
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet beautifulsoup4
          python - <<'PY'
          from bs4 import BeautifulSoup
          from pathlib import Path
          from urllib.parse import urlsplit,unquote
          import json,re

          root=Path('.')
          pages=sorted(root.glob('*.html'))
          issues=[]
          stats={'pages':len(pages),'links':0,'images':0,'scripts':0,'stylesheets':0}

          def local_target(raw):
              if not raw or raw.startswith(('#','mailto:','tel:','javascript:','data:')):
                  return None
              parts=urlsplit(raw)
              if parts.scheme or parts.netloc:
                  return None
              path=unquote(parts.path)
              if not path:
                  return None
              return path

          for page in pages:
              text=page.read_text(encoding='utf-8')
              soup=BeautifulSoup(text,'html.parser')
              if not soup.html or soup.html.get('lang')!='en': issues.append([page.name,'document','missing lang=en'])
              if not soup.title or not soup.title.get_text(strip=True): issues.append([page.name,'document','missing title'])
              if not soup.find('meta',attrs={'name':'viewport'}): issues.append([page.name,'document','missing viewport'])

              ids={}
              for el in soup.find_all(id=True): ids.setdefault(el['id'],0);ids[el['id']]+=1
              for value,count in ids.items():
                  if count>1: issues.append([page.name,'duplicate-id',f'{value} × {count}'])

              for img in soup.find_all('img'):
                  stats['images']+=1
                  if not img.has_attr('alt'): issues.append([page.name,'image-alt',img.get('src','(no src)')])
                  target=local_target(img.get('src'))
                  if target and not (root/target).exists(): issues.append([page.name,'missing-image',target])

              for script in soup.find_all('script',src=True):
                  stats['scripts']+=1
                  target=local_target(script.get('src'))
                  if target and not (root/target).exists(): issues.append([page.name,'missing-script',target])

              for link in soup.find_all('link',href=True):
                  if 'stylesheet' in (link.get('rel') or []): stats['stylesheets']+=1
                  target=local_target(link.get('href'))
                  if target and not (root/target).exists(): issues.append([page.name,'missing-link-asset',target])

              for anchor in soup.find_all('a',href=True):
                  stats['links']+=1
                  href=anchor.get('href')
                  target=local_target(href)
                  if target:
                      candidate=root/target
                      if target.endswith('/'):
                          candidate=candidate/'index.html'
                      if not candidate.exists(): issues.append([page.name,'broken-link',href])
                  if anchor.get('target')=='_blank':
                      rel=set(anchor.get('rel') or [])
                      if not {'noopener','noreferrer'}.issubset(rel): issues.append([page.name,'link-security',href])

              # Shared-brand contract for every top-level public page.
              if 'brand-global.js?v=20260713-cleanup1' not in text: issues.append([page.name,'branding','brand-global.js cache key missing'])
              if 'brand-global.css?v=20260713-cleanup1' not in text: issues.append([page.name,'branding','brand-global.css cache key missing'])
              if any(marker in text for marker in ['20260713-logo1','20260713-logo3','brand/h38-swoosh-logo.webp','brand/highway-38-mark.svg']):
                  issues.append([page.name,'branding','retired logo reference'])

          Path('/tmp/source-audit.json').write_text(json.dumps({'stats':stats,'issues':issues},indent=2))
          print(json.dumps({'stats':stats,'issue_count':len(issues),'issues':issues[:80]},indent=2))
          PY

      - name: Browser audit every top-level page
        shell: bash
        run: |
          set -euo pipefail
          npm init -y >/dev/null 2>&1
          npm install --silent playwright@1.54.1
          npx playwright install --with-deps chromium >/dev/null
          python3 -m http.server 4173 >/tmp/h38-http.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid || true' EXIT
          sleep 2
          node - <<'NODE'
          const { chromium }=require('playwright');
          const fs=require('fs');
          const path=require('path');
          (async()=>{
            const pages=fs.readdirSync('.').filter(x=>x.endsWith('.html')).sort();
            const browser=await chromium.launch({headless:true});
            const results=[];
            for(const name of pages){
              const page=await browser.newPage({viewport:{width:390,height:844}});
              const consoleErrors=[];
              const failed=[];
              page.on('console',msg=>{if(msg.type()==='error')consoleErrors.push(msg.text())});
              page.on('requestfailed',req=>failed.push(req.url()+' — '+(req.failure()?.errorText||'failed')));
              try{
                await page.goto('http://127.0.0.1:4173/'+name,{waitUntil:'domcontentloaded',timeout:15000});
                await page.waitForTimeout(500);
                const metrics=await page.evaluate(()=>({
                  scrollWidth:document.documentElement.scrollWidth,
                  clientWidth:document.documentElement.clientWidth,
                  logos:[...document.querySelectorAll('img.brand-logo')].map(x=>({src:x.getAttribute('src'),alt:x.getAttribute('alt'),complete:x.complete,naturalWidth:x.naturalWidth,naturalHeight:x.naturalHeight})),
                  title:document.title
                }));
                const issues=[];
                if(!metrics.title.trim())issues.push('empty title');
                if(metrics.scrollWidth>metrics.clientWidth+4)issues.push(`mobile overflow ${metrics.scrollWidth}/${metrics.clientWidth}`);
                if(!metrics.logos.length)issues.push('no rendered brand logo');
                for(const logo of metrics.logos){
                  if(!logo.complete||!logo.naturalWidth)issues.push('logo failed to load');
                  if(logo.alt!=='Highway 38 Solutions')issues.push('logo alt mismatch');
                  if(!logo.src?.includes('assets/highway38-logo.png?v=20260713-logo2'))issues.push('logo source mismatch');
                }
                const menu=page.locator('.eco-menu');
                if(await menu.count()){
                  await menu.first().click();
                  if(await menu.first().getAttribute('aria-expanded')!=='true')issues.push('mobile menu aria-expanded failed');
                }
                if(consoleErrors.length)issues.push('console: '+consoleErrors.slice(0,3).join(' | '));
                if(failed.length)issues.push('requests: '+failed.slice(0,3).join(' | '));
                results.push({page:name,status:issues.length?'FAIL':'PASS',issues,metrics});
              }catch(err){results.push({page:name,status:'FAIL',issues:[err.message]});}
              await page.close();
            }
            await browser.close();
            fs.writeFileSync('/tmp/browser-audit.json',JSON.stringify(results,null,2));
            const failedResults=results.filter(x=>x.status==='FAIL');
            console.log(JSON.stringify({pages:results.length,failures:failedResults.length,failed:failedResults},null,2));
          })().catch(err=>{console.error(err);process.exit(1)});
          NODE

      - name: Commit safe cleanup and audit report to main
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import json
          source=json.loads(Path('/tmp/source-audit.json').read_text())
          browser=json.loads(Path('/tmp/browser-audit.json').read_text())
          failed=[x for x in browser if x['status']=='FAIL']
          normalized=Path('/tmp/normalized-files.txt').read_text().splitlines()
          out=[]
          out += ['# Website Cleanup Pass — 2026-07-13','']
          out += [f'- Top-level pages audited: {source["stats"]["pages"]}',f'- Internal/external links inspected: {source["stats"]["links"]}',f'- Images inspected: {source["stats"]["images"]}',f'- Script references inspected: {source["stats"]["scripts"]}',f'- Stylesheet references inspected: {source["stats"]["stylesheets"]}',f'- Source issues found: {len(source["issues"])}',f'- Browser/mobile failures: {len(failed)}','']
          out += ['## Safe normalization applied']+[f'- `{x}`' for x in normalized]+['']
          out += ['## Source issues']
          out += [f'- `{p}` — **{kind}**: {detail}' for p,kind,detail in source['issues']] or ['- None']
          out += ['','## Browser and mobile results']
          for row in browser:
              line=f'- `{row["page"]}` — **{row["status"]}**'
              if row.get('issues'): line+=': '+'; '.join(row['issues'])
              out.append(line)
          Path('docs/verification/WEBSITE_CLEANUP_2026-07-13.md').write_text('\n'.join(out)+'\n')
          PY
          rm .github/workflows/web-cleanup-pass-main.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Run full website cleanup and page audit'
          git push origin main
