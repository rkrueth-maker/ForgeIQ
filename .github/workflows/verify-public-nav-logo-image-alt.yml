name: Verify Public Nav Logo Image Alt

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/verify-public-nav-logo-image-alt.yml'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Verify public logo contract
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import struct
          data=Path('assets/highway38-logo.png').read_bytes()
          assert data[:8] == b'\x89PNG\r\n\x1a\n'
          assert struct.unpack('>II',data[16:24]) == (68,72)
          assert data[-12:] == b'\x00\x00\x00\x00IEND\xaeB`\x82'
          js=Path('ecosystem.js').read_text()
          css=Path('ecosystem.css').read_text()
          for value in ['class="brand-logo"','assets/highway38-logo.png?v=20260713-logo1','alt="Highway 38 Solutions"','class="brand-text"',"links.classList.toggle('is-open')","button.setAttribute('aria-expanded'"]:
              assert value in js, value
          assert 'height:36px' in css and 'height:30px' in css and 'width:auto' in css
          pages=[]
          for path in Path('.').glob('*.html'):
              text=path.read_text()
              if '<nav class="site-nav"' in text and 'ecosystem.js' in text:
                  assert 'ecosystem.js?v=20260713-logo1' in text, path
                  pages.append(path.name)
          Path('/tmp/pages').write_text('\n'.join(sorted(pages)))
          PY
      - name: Run Lighthouse image-alt audit
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 4173 >/tmp/http.log 2>&1 &
          pid=$!
          trap 'kill $pid || true' EXIT
          sleep 2
          npx --yes lighthouse@12 http://127.0.0.1:4173/index.html --only-categories=accessibility --chrome-flags='--headless --no-sandbox --disable-gpu' --output=json --output-path=/tmp/lighthouse.json --quiet
          node - <<'NODE'
          const fs=require('fs');
          const r=JSON.parse(fs.readFileSync('/tmp/lighthouse.json','utf8'));
          const audit=r.audits['image-alt'];
          if(!audit || audit.score!==1) throw new Error(`image-alt audit failed: ${audit&&audit.score}`);
          fs.writeFileSync('/tmp/scores',`Accessibility: ${r.categories.accessibility.score}\nImage alt: ${audit.score}\n`);
          NODE
      - name: Record successful verification
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/verification
          {
            echo '# Public Navigation Logo Verification — 2026-07-13'
            echo
            echo '- Asset: `assets/highway38-logo.png`'
            echo '- PNG: 68 × 72, valid'
            echo '- Desktop height: 36px'
            echo '- Mobile height: 30px'
            echo '- Text fallback: PASS'
            echo '- Mobile menu contract: PASS'
            echo '- Lighthouse image-alt: PASS'
            sed 's/^/- /' /tmp/scores
            echo
            echo '## Covered pages'
            sed 's/^/- `/' /tmp/pages | sed 's/$/`/'
          } > docs/verification/PUBLIC_NAV_LOGO_2026-07-13.md
          rm -f .github/workflows/verify-public-nav-logo.yml .github/workflows/verify-public-nav-logo-final.yml .github/workflows/verify-public-nav-logo-image-alt.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record successful public nav logo verification'
          git push origin main
