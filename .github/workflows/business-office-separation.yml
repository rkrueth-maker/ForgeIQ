name: Verify Business Office Separation

on:
  push:
    branches: [business-office-separation]
    paths:
      - 'apps-script/business-office/**'
      - 'apps/business-office/**'
      - 'apps/highway38-website/**'
      - 'apps/highway38-owner-portal/**'
      - 'packages/**'
      - 'business-packs/**'
      - 'scripts/business-office/**'
      - 'scripts/assemble-business-office-app.sh'
      - 'scripts/deploy-business-office-standalone.sh'
      - 'scripts/verify-business-office-separation.js'
      - 'scripts/verify-business-office-clean-install.js'
      - 'package.json'
      - '.github/workflows/business-office-separation.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps-script/business-office/**'
      - 'apps/**'
      - 'packages/**'
      - 'business-packs/**'
      - 'scripts/**business-office**'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  separation-and-clean-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install
      - name: Verify current Business Office source
        run: npm run test:business-office
      - name: Verify product separation and clean installation plan
        run: npm run test:business-office-separation
      - name: Assemble Highway 38 combined source
        run: |
          mkdir -p artifacts/assembled-highway38
          bash scripts/assemble-business-office-app.sh artifacts/assembled-highway38 business-packs/highway38/apps-script/BusinessOffice_Pack.gs "$GITHUB_WORKSPACE"
          grep -F "packId:'highway38'" artifacts/assembled-highway38/BusinessOffice_00_Pack.gs
      - name: Assemble neutral standalone source
        run: |
          mkdir -p artifacts/assembled-template
          bash scripts/assemble-business-office-app.sh artifacts/assembled-template business-packs/template-business/apps-script/BusinessOffice_Pack.gs "$GITHUB_WORKSPACE"
          grep -F "packId:'template-business'" artifacts/assembled-template/BusinessOffice_00_Pack.gs
          ! grep -R -E 'Highway 38 Solutions|rkrueth|AKfyc|1kDDKW|1Vq8Uj|11ak4Q' artifacts/assembled-template/BusinessOffice_00_Pack.gs
      - name: Upload separation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: business-office-separation-${{ github.run_id }}
          path: |
            artifacts/business-office/
            artifacts/business-office-separation/
            artifacts/business-office-clean-install/
            artifacts/assembled-highway38/
            artifacts/assembled-template/
          if-no-files-found: error
          retention-days: 90
