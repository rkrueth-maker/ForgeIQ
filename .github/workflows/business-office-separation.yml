name: Business Office Separation

on:
  push:
    branches:
      - separate-business-office-platform
    paths:
      - '.github/workflows/business-office-separation.yml'
      - 'scripts/inventory-business-office-separation.js'
      - 'apps-script/business-office/**'
      - 'apps-script/business-office-sync/**'
      - 'apps-script/integrated-backend/**'
      - 'apps-script/core-engine/owner-portal-next/**'
      - 'portal.html'
      - 'ecosystem.js'
      - 'brand-global.js'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/business-office-separation.yml'
      - 'scripts/inventory-business-office-separation.js'
      - 'apps-script/business-office/**'
      - 'apps-script/business-office-sync/**'
      - 'apps-script/integrated-backend/**'
      - 'apps-script/core-engine/owner-portal-next/**'
      - 'portal.html'
      - 'ecosystem.js'
      - 'brand-global.js'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Inventory Highway 38 coupling
        run: node scripts/inventory-business-office-separation.js
      - name: Stage source snapshot
        run: |
          mkdir -p artifacts/business-office-separation/source
          cp -R apps-script/business-office artifacts/business-office-separation/source/business-office
          cp -R apps-script/business-office-sync artifacts/business-office-separation/source/business-office-sync
          cp apps-script/integrated-backend/H38_Business_Office_Bridge.gs artifacts/business-office-separation/source/
          cp scripts/verify-business-office.js artifacts/business-office-separation/source/
          cp scripts/deploy-business-office-production.sh artifacts/business-office-separation/source/
      - name: Upload separation inventory and source
        uses: actions/upload-artifact@v4
        with:
          name: business-office-separation-inventory-${{ github.run_id }}
          path: artifacts/business-office-separation/
          if-no-files-found: error
          retention-days: 90
