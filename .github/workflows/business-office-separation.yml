name: Business Office Separation Materialization

on:
  push:
    branches:
      - separate-business-office-platform
    paths:
      - '.github/workflows/business-office-separation.yml'
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/business-office-separation.yml'
      - 'scripts/materialize-business-office-platform.js'
      - 'scripts/.materialize-parts/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: business-office-separation-materialization
  cancel-in-progress: false

jobs:
  materialize-test-and-commit:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: separate-business-office-platform
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Check whether materialization is pending
        id: pending
        shell: bash
        run: |
          if [[ -f scripts/materialize-business-office-platform.js ]]; then
            echo 'run=true' >> "$GITHUB_OUTPUT"
          else
            echo 'run=false' >> "$GITHUB_OUTPUT"
            echo 'Platform is already materialized.'
          fi
      - name: Materialize separated platform
        if: steps.pending.outputs.run == 'true'
        run: node scripts/materialize-business-office-platform.js
      - name: Verify neutral platform and data isolation
        if: steps.pending.outputs.run == 'true'
        run: |
          node scripts/verify-business-office-isolation.js
          node scripts/verify-business-office-separation.js
      - name: Verify existing Highway 38 Business Office
        if: steps.pending.outputs.run == 'true'
        run: |
          npm install
          npm run test:business-office
      - name: Commit generated architecture
        if: steps.pending.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git checkout HEAD -- .github/workflows/business-office-separation.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Materialize separated Business Office platform'
          git push origin HEAD:separate-business-office-platform
