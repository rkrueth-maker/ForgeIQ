name: Complete Ecosystem Launch Gate

on:
  push:
    branches:
      - complete-ecosystem-live-launch-2026-07-11
      - main
    paths:
      - 'launch-control/**'
      - 'customer-portal.html'
      - 'business-concept-builder.html'
      - 'scripts/verify-complete-ecosystem-launch.js'
      - '.github/workflows/complete-ecosystem-launch.yml'
  pull_request:
    paths:
      - 'launch-control/**'
      - 'customer-portal.html'
      - 'business-concept-builder.html'
      - 'scripts/verify-complete-ecosystem-launch.js'
      - '.github/workflows/complete-ecosystem-launch.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hard-rule-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Verify complete ecosystem launch controls
        run: node scripts/verify-complete-ecosystem-launch.js
      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: complete-ecosystem-verification
          path: launch-control/evidence/complete-ecosystem-verification.json
          if-no-files-found: error
          retention-days: 90
