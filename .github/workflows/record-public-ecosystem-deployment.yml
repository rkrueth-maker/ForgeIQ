name: Record Public Ecosystem Deployment

on:
  push:
    branches:
      - complete-ecosystem-live-launch-2026-07-11
    paths:
      - '.github/workflows/record-public-ecosystem-deployment.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  record:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: complete-ecosystem-live-launch-2026-07-11
          fetch-depth: 0
      - name: Verify live URLs and write evidence
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_URL: https://rkrueth-maker.github.io/highway-38-solutions
        run: |
          set -euo pipefail
          MERGE_SHA="$(gh api repos/${GITHUB_REPOSITORY}/pulls/39 --jq '.merge_commit_sha')"
          MERGED_AT="$(gh api repos/${GITHUB_REPOSITORY}/pulls/39 --jq '.merged_at')"
          test -n "${MERGE_SHA}" && test "${MERGE_SHA}" != "null"
          declare -A CHECKS=(
            [ecosystem-status.html]='Highway 38 Solutions · Ecosystem'
            [customer-portal.html]='Nothing entered here is transmitted'
            [business-concept-builder.html]='Turn a skill or problem into a testable business'
            [tool-center.html]='data-tool="project"'
            [proof-center.html]='public-proof-manifest'
            [index.html]='data-h38-ecosystem-entry'
          )
          mkdir -p launch-control/deployments
          URL_ROWS=''
          for page in "${!CHECKS[@]}"; do
            body="$(curl --fail --silent --show-error --location "${BASE_URL}/${page}")"
            grep -Fq "${CHECKS[$page]}" <<<"${body}"
            URL_ROWS="${URL_ROWS}\n    {\"url\": \"${BASE_URL}/${page}\", \"status\": \"PASS\"},"
          done
          URL_ROWS="${URL_ROWS%,}"
          cat > launch-control/deployments/public-ecosystem-live-2026-07-11.json <<JSON
          {
            "release": "complete-ecosystem-live-launch-2026-07-11",
            "masterIssue": 31,
            "integrationIssue": 37,
            "sourcePullRequest": 39,
            "mergeCommit": "${MERGE_SHA}",
            "mergedAt": "${MERGED_AT}",
            "verifiedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "environment": "GitHub Pages production",
            "rollback": {
              "preLaunchCommit": "3bd325f",
              "method": "Revert PR #39 merge and verify restored GitHub Pages URLs"
            },
            "externalActions": {
              "customerEmail": "LOCKED",
              "paymentProcessing": "LOCKED",
              "socialPublishing": "LOCKED",
              "advertisingSpend": "LOCKED",
              "finalDelivery": "LOCKED"
            },
            "liveUrls": [${URL_ROWS}
            ],
            "result": "PASS"
          }
          JSON
          python3 -m json.tool launch-control/deployments/public-ecosystem-live-2026-07-11.json >/dev/null
      - name: Commit deployment evidence to execution branch
        run: |
          if git diff --quiet; then
            echo 'Deployment evidence already current.'
            exit 0
          fi
          git config user.name 'highway-38-launch-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add launch-control/deployments/public-ecosystem-live-2026-07-11.json
          git commit -m 'Record verified public ecosystem deployment'
          git push origin HEAD:complete-ecosystem-live-launch-2026-07-11
