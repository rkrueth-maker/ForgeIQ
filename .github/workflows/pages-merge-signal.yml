name: Pages Merge Signal

on:
  pull_request_target:
    types:
      - closed
    branches:
      - main

permissions:
  contents: read

jobs:
  signal:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Confirm merged release
        run: |
          echo "Merged PR: ${{ github.event.pull_request.number }}"
          echo "Current main will be deployed by the protected Pages workflow."
