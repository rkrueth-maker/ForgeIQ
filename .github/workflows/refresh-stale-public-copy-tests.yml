name: Refresh Stale Public Copy Tests

on:
  push:
    branches:
      - rebuild/unified-apps-script-shell
    paths:
      - '.github/workflows/refresh-stale-public-copy-tests.yml'

permissions:
  contents: write

jobs:
  patch-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out rebuild branch
        uses: actions/checkout@v4
        with:
          ref: rebuild/unified-apps-script-shell
          fetch-depth: 0

      - name: Replace retired copy assertions with current page contracts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path('tests/test_scheduler_web_dashboard.py'): {
                  'assert "Hypothetical examples" in html_response.get_data(as_text=True)':
                  'assert "Demonstration materials use sample information" in html_response.get_data(as_text=True)'
              },
              Path('tests/test_web_dashboard_smoke.py'): {
                  'assert "What needs to work better?" in page':
                  'assert "Choose the smallest useful starting point." in page'
              },
          }

          for file_path, changes in replacements.items():
              text = file_path.read_text(encoding='utf-8')
              for old, new in changes.items():
                  if old not in text:
                      if new in text:
                          continue
                      raise SystemExit(f'Expected stale assertion not found in {file_path}: {old}')
                  text = text.replace(old, new, 1)
              file_path.write_text(text, encoding='utf-8')
          PY

      - name: Commit exact test refresh
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'Tests are already current.'
            exit 0
          fi
          git config user.name 'Highway 38 Build Automation'
          git config user.email 'actions@users.noreply.github.com'
          git add tests/test_scheduler_web_dashboard.py tests/test_web_dashboard_smoke.py
          git commit -m 'Refresh public page copy assertions'
          git push origin HEAD:rebuild/unified-apps-script-shell
