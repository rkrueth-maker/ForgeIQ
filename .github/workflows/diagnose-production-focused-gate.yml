name: Diagnose Production Focused Gate

on:
  push:
    branches: [main]
    paths:
      - 'docs/.production-focused-gate-diagnostic-trigger'

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact source
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verify Business Office source
        id: business_office
        continue-on-error: true
        run: node scripts/verify-business-office.js

      - name: Verify Business Office runtime helpers
        id: runtime_helpers
        continue-on-error: true
        run: node scripts/verify-business-office-runtime-helpers.js

      - name: Verify unified client routing runtime
        id: client_routing
        continue-on-error: true
        run: node scripts/verify-unified-client-routing-runtime.js

      - name: Verify task and messaging hardening
        id: task_messaging
        continue-on-error: true
        run: node scripts/verify-task-messaging-hardening.js

      - name: Verify complete Quote Builder
        id: quote_builder
        continue-on-error: true
        run: node scripts/verify-quote-builder-complete.js

      - name: Verify direct Quote Builder performance
        id: quote_performance
        continue-on-error: true
        run: node scripts/verify-quote-builder-direct-performance.js

      - name: Verify Quote Builder camera polish
        id: quote_camera
        continue-on-error: true
        run: node scripts/verify-quote-camera-polish.js

      - name: Verify Business Office Quote Builder replacement routing
        id: quote_routing
        continue-on-error: true
        run: node scripts/verify-quote-builder-business-office-routing.js

      - name: Record exact diagnostic outcomes
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > "$RUNNER_TEMP/focused-gate.md" <<EOF
          ## Production focused gate diagnostic

          - Commit: ${GITHUB_SHA}
          - Business Office source: ${{ steps.business_office.outcome }}
          - Runtime helpers: ${{ steps.runtime_helpers.outcome }}
          - Unified client routing: ${{ steps.client_routing.outcome }}
          - Task and messaging hardening: ${{ steps.task_messaging.outcome }}
          - Quote Builder complete: ${{ steps.quote_builder.outcome }}
          - Quote Builder direct performance: ${{ steps.quote_performance.outcome }}
          - Quote Builder camera: ${{ steps.quote_camera.outcome }}
          - Quote Builder replacement routing: ${{ steps.quote_routing.outcome }}

          This workflow does not deploy or change Google resources.
          EOF
          gh issue comment 173 --repo "$GITHUB_REPOSITORY" --body-file "$RUNNER_TEMP/focused-gate.md"

      - name: Enforce focused gate
        if: always()
        shell: bash
        run: |
          test '${{ steps.business_office.outcome }}' = success
          test '${{ steps.runtime_helpers.outcome }}' = success
          test '${{ steps.client_routing.outcome }}' = success
          test '${{ steps.task_messaging.outcome }}' = success
          test '${{ steps.quote_builder.outcome }}' = success
          test '${{ steps.quote_performance.outcome }}' = success
          test '${{ steps.quote_camera.outcome }}' = success
          test '${{ steps.quote_routing.outcome }}' = success
