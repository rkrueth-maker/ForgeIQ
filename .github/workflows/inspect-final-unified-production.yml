name: Inspect final unified production

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/inspect-final-unified-production.yml'

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Read final production run and retained artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: b7b6e5ff87d06ce237b892a9222c5a7351814d25
        shell: bash
        run: |
          set -euo pipefail
          RUNS=$(curl -sSfL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-owner-portal-hard-rule-production.yml/runs?event=push&head_sha=${TARGET_SHA}&per_page=10")
          RUN=$(printf '%s' "$RUNS" | jq -c '.workflow_runs | sort_by(.run_number) | last')
          test "$RUN" != "null"
          RUN_ID=$(printf '%s' "$RUN" | jq -r '.id')
          ARTIFACTS=$(curl -sSfL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts?per_page=100")
          mkdir -p /tmp/h38-evidence
          printf '%s\n' "$RUN" | jq --argjson artifacts "$ARTIFACTS" '{id,run_number,status,conclusion,event,head_sha,created_at,updated_at,html_url,artifacts:($artifacts.artifacts|map({id,name,size_in_bytes,expired,created_at,expires_at}))}' > /tmp/h38-evidence/production-b7b6e5ff.json
          cat /tmp/h38-evidence/production-b7b6e5ff.json
          test "$(jq -r '.conclusion' /tmp/h38-evidence/production-b7b6e5ff.json)" = "success"
          test "$(jq -r '.artifacts | length' /tmp/h38-evidence/production-b7b6e5ff.json)" -ge 1
      - name: Store inspection record on temporary branch
        uses: actions/checkout@v4
        with:
          ref: agent/text-messaging-task-assignment
          fetch-depth: 0
      - name: Commit inspection record
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .h38-evidence
          cp /tmp/h38-evidence/production-b7b6e5ff.json .h38-evidence/production-b7b6e5ff.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .h38-evidence/production-b7b6e5ff.json
          git commit -m 'Record final unified production evidence'
          git push origin HEAD:agent/text-messaging-task-assignment
