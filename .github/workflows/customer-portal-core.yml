name: Customer Portal Core Verify

on:
  pull_request:
    branches:
      - main
    paths:
      - 'core-engine/customer-portal/**'
      - 'scripts/verify-customer-portal-core.js'
      - '.github/workflows/customer-portal-core.yml'
      - 'customer-portal.html'
  push:
    branches:
      - main
    paths:
      - 'core-engine/customer-portal/**'
      - 'scripts/verify-customer-portal-core.js'
      - '.github/workflows/customer-portal-core.yml'
      - 'customer-portal.html'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Verify customer portal authorization and controlled workflows
        run: node scripts/verify-customer-portal-core.js
      - name: Upload customer portal security evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: customer-portal-core-${{ github.run_id }}
          path: |
            launch-control/evidence/customer-portal-core-verification.json
            launch-control/evidence/customer-portal-security-sample.json
          if-no-files-found: error
          retention-days: 90
