name: Diagnose PR 288

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install regression dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm ci
      - name: Capture focused verifier output
        shell: bash
        run: |
          set +e
          mkdir -p pr288-diagnostics
          run_check() {
            name="$1"; shift
            "$@" > "pr288-diagnostics/${name}.log" 2>&1
            echo $? > "pr288-diagnostics/${name}.exit"
          }
          run_check one-shot node scripts/verify-one-shot-ux.js
          run_check reusable node scripts/verify-reusable-business-office-contracts.js
          run_check owner-business-ux node scripts/verify-owner-business-office-ux.js
          run_check control-plane node scripts/verify-business-office-control-plane.js
          run_check live-readiness node scripts/verify-business-office-live-readiness.js
          run_check task-messaging node scripts/verify-task-messaging.js
          run_check task-messaging-hardening node scripts/verify-task-messaging-hardening.js
          run_check isolation node scripts/verify-business-office-isolation.js
          run_check separation node scripts/verify-business-office-separation.js
          run_check modular-suite node scripts/verify-modular-business-office-suite.js
          run_check contact-options node scripts/verify-contact-options.js
          run_check issue83-source bash scripts/verify-issue83-source.sh
          run_check commercial-system node scripts/verify-commercial-system.js
          run_check final-polish node scripts/verify-highway38-final-polish.js
          run_check pytest python -m pytest -q
          find pr288-diagnostics -type f -maxdepth 1 -print -exec sh -c 'echo ---; tail -n 260 "$1"' _ {} \;
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pr288-diagnostics-${{ github.run_id }}
          path: pr288-diagnostics
          retention-days: 7
