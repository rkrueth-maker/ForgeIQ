name: Approved Website Image Implementation Runner

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write

concurrency:
  group: approved-website-image-implementation-runner
  cancel-in-progress: false

jobs:
  run-branch-helper:
    runs-on: ubuntu-latest
    steps:
      - name: Check out image implementation branch
        uses: actions/checkout@v4
        with:
          ref: approved-website-image-implementation
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Execute reviewed branch helper steps
        id: helper
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m pip install --disable-pip-version-check pillow pyyaml 2>&1 | tee "$RUNNER_TEMP/approved-image-helper.log"
          python <<'PY' 2>&1 | tee -a "$RUNNER_TEMP/approved-image-helper.log"
          import os
          import subprocess
          from pathlib import Path
          import yaml

          workflow = yaml.safe_load(Path('.github/workflows/approved-image-implementation-helper.yml').read_text())
          wanted = [
              'Download, optimize, and place approved images',
              'Apply approved image placements only',
              'Verify bounded image implementation',
              'Commit only approved image implementation files',
          ]
          steps = {step.get('name'): step for step in workflow['jobs']['implement']['steps'] if isinstance(step, dict)}
          for name in wanted:
              step = steps.get(name)
              if not step or 'run' not in step:
                  raise SystemExit(f'Missing reviewed helper step: {name}')
              print(f'::group::{name}', flush=True)
              subprocess.run(step['run'], shell=True, executable='/bin/bash', check=True, env=os.environ)
              print('::endgroup::', flush=True)
          PY

      - name: Report exact helper failure to Issue 100
        if: steps.helper.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          REPORT="$RUNNER_TEMP/approved-image-helper-report.md"
          {
            echo '## Approved image implementation helper HOLD'
            echo
            echo 'The branch did not advance. Exact runner output:'
            echo
            echo '```text'
            tail -c 50000 "$RUNNER_TEMP/approved-image-helper.log"
            echo
            echo '```'
            echo
            echo "Runner source commit: \`${GITHUB_SHA}\`"
          } > "$REPORT"
          gh issue comment 100 --repo "$GITHUB_REPOSITORY" --body-file "$REPORT"

      - name: Remove temporary runner from main
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git worktree add "$RUNNER_TEMP/h38-main-cleanup" origin/main
          cd "$RUNNER_TEMP/h38-main-cleanup"
          git checkout -B main origin/main
          rm -f .github/workflows/approved-image-implementation-runner.yml
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/approved-image-implementation-runner.yml
          git commit -m 'Remove approved image implementation runner'
          git push origin HEAD:main

      - name: Preserve failure conclusion
        if: steps.helper.outcome == 'failure'
        run: exit 1
