name: Verify Reusable Business Office Architecture

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/verify-reusable-business-office-architecture.yml'
      - 'apps/business-office/**'
      - 'apps-script/business-office/BusinessOffice_ModuleContract.gs'
      - 'apps-script/business-office/BusinessOffice_ActionContract.gs'
      - 'apps-script/business-office/BusinessOffice_ModuleAccess.gs'
      - 'packages/**'
      - 'business-packs/template-business/**'
      - 'scripts/build-business-office-installation.js'
      - 'scripts/verify-reusable-business-office-contracts.js'
      - 'scripts/verify-source-boundaries.js'
      - 'docs/architecture/AUTHORITATIVE_SOURCE_BOUNDARIES.md'
      - 'docs/architecture/UNIFIED_APP_CHANGE_RULES.md'
      - 'AGENTS.md'
  pull_request:
    branches: [main]
    paths:
      - 'apps/business-office/**'
      - 'apps-script/business-office/BusinessOffice_ModuleContract.gs'
      - 'apps-script/business-office/BusinessOffice_ActionContract.gs'
      - 'apps-script/business-office/BusinessOffice_ModuleAccess.gs'
      - 'packages/**'
      - 'business-packs/template-business/**'
      - 'scripts/build-business-office-installation.js'
      - 'scripts/verify-reusable-business-office-contracts.js'
      - 'scripts/verify-source-boundaries.js'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: reusable-business-office-architecture-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Verify reusable module and action contracts
        run: node scripts/verify-reusable-business-office-contracts.js
      - name: Upload reusable architecture evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reusable-business-office-architecture-${{ github.run_id }}
          path: artifacts/reusable-business-office-contracts/
          if-no-files-found: warn
          retention-days: 90
