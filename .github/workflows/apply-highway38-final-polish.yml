name: Apply Highway 38 Final Polish

on:
  push:
    branches:
      - highway38-final-polish
    paths:
      - '.github/workflows/apply-highway38-final-polish.yml'

permissions:
  contents: write

jobs:
  apply-polish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out polish branch
        uses: actions/checkout@v4
        with:
          ref: highway38-final-polish
          fetch-depth: 0

      - name: Apply exact bounded changes
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def replace_exact(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'HOLD: expected one match in {path}, found {count}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_exact(
              'index.html',
              'Programmed and maintained thousands of CNC jobs over many years, including standardized tooling, post-processor support, feeds and speeds, and repeatable programming practices.',
              'Built and maintained repeatable CNC programming practices over many years, including standardized tooling, post-processor support, feeds and speeds, and documented setup methods.'
          )

          replace_exact(
              'catalog-data.js',
              '"ownerPortalUrl": "https://script.google.com/macros/s/AKfycbzr0hoImRF4iQ1gR90Cr17juP8PODkEWRorXxW6qralEYTGLhOU33E1wYEPU_3duQKpQg/exec"',
              '"ownerPortalUrl": "portal.html"'
          )

          replace_exact(
              'scripts/verify-commercial-system.js',
              "if (!catalog.ownerPortalUrl?.startsWith('https://script.google.com/macros/s/')) fail('Controlled Owner Portal URL is missing or invalid'); else pass('controlled Owner Portal URL is present');",
              "if (catalog.ownerPortalUrl !== 'portal.html') fail('Public catalog Owner Portal route must use portal.html'); else pass('public catalog Owner Portal route uses portal.html');"
          )

          portal = Path('portal.html')
          text = portal.read_text(encoding='utf-8')
          old = """      function activate(name,source){
        Object.entries(panels).forEach(([key,panel])=>panel.classList.toggle('is-active',key===name));
        tabs.forEach(tab=>tab.setAttribute('aria-selected',String(tab.dataset.panel===name && (source?tab===source:tab.id===`tab-${name==='operations'?'operations':'office'}`))));
        localStorage.setItem('h38OwnerPortalPanel',name);
        message.style.display='block';
        message.textContent=name==='operations'?'Live Operations & Social workspace':'Live Business Office & Upload workspace';
        setTimeout(()=>{message.style.display='none';},1800);
      }
      tabs.forEach(tab=>tab.addEventListener('click',()=>activate(tab.dataset.panel,tab)));
      document.querySelectorAll('.owner-area').forEach(button=>button.addEventListener('click',()=>activate(button.dataset.panel)));
      document.querySelectorAll('.owner-frame').forEach(frame=>frame.addEventListener('load',()=>{message.textContent='Secure workspace loaded';setTimeout(()=>{message.style.display='none';},1200);}));
      const saved=localStorage.getItem('h38OwnerPortalPanel');
      if(saved&&panels[saved])activate(saved);"""
          new = """      const hashToPanel={operations:'operations','business-office':'office',office:'office',upload:'office'};
      const panelToHash={operations:'operations',office:'business-office'};
      function requestedPanel(){return hashToPanel[location.hash.replace(/^#/,'').toLowerCase()]||'';}
      function activate(name,source,updateUrl=true){
        Object.entries(panels).forEach(([key,panel])=>panel.classList.toggle('is-active',key===name));
        tabs.forEach(tab=>tab.setAttribute('aria-selected',String(tab.dataset.panel===name && (source?tab===source:tab.id===`tab-${name==='operations'?'operations':'office'}`))));
        localStorage.setItem('h38OwnerPortalPanel',name);
        if(updateUrl)history.replaceState(null,'',`#${panelToHash[name]}`);
        message.style.display='block';
        message.textContent=name==='operations'?'Live Operations & Social workspace':'Live Business Office & Upload workspace';
        setTimeout(()=>{message.style.display='none';},1800);
      }
      tabs.forEach(tab=>tab.addEventListener('click',()=>activate(tab.dataset.panel,tab,true)));
      document.querySelectorAll('.owner-area').forEach(button=>button.addEventListener('click',()=>activate(button.dataset.panel,null,true)));
      document.querySelectorAll('.owner-frame').forEach(frame=>frame.addEventListener('load',()=>{message.textContent='Secure workspace loaded';setTimeout(()=>{message.style.display='none';},1200);}));
      window.addEventListener('hashchange',()=>{const requested=requestedPanel();if(requested)activate(requested,null,false);});
      const requested=requestedPanel();
      const saved=localStorage.getItem('h38OwnerPortalPanel');
      if(requested)activate(requested,null,false);else if(saved&&panels[saved])activate(saved,null,false);else activate('operations',null,false);"""
          if text.count(old) != 1:
              raise SystemExit('HOLD: Owner Portal script contract did not match exactly')
          portal.write_text(text.replace(old, new, 1), encoding='utf-8')

          ui_files = [
              'apps-script/business-office/BusinessOffice_Index.html',
              'packages/shared-ui/BusinessOffice_Index.html',
              'artifacts/business-office-separation/builds/highway38-combined/BusinessOffice_Index.html',
              'artifacts/business-office-separation/builds/template-business-standalone/BusinessOffice_Index.html',
              'artifacts/separate-business-office-platform/builds/highway38-combined/BusinessOffice_Index.html',
              'artifacts/separate-business-office-platform/builds/template-business-standalone/BusinessOffice_Index.html',
          ]
          old_title = "    document.getElementById('appTitle').textContent = branding.businessOfficeName || 'Business Office';\n"
          new_title = old_title + "    document.title = `${branding.businessOfficeName || 'Business Office'} | ${branding.businessName || 'Business'}`;\n"
          for file in ui_files:
              replace_exact(file, old_title, new_title)
          PY

          mkdir -p scripts docs/verification artifacts/final-polish
          cat > scripts/verify-highway38-final-polish.js <<'EOF'
          #!/usr/bin/env node
          'use strict';
          const fs=require('fs');
          const path=require('path');
          const vm=require('vm');
          const root=path.resolve(__dirname,'..');
          const failures=[];const passes=[];
          const read=rel=>fs.readFileSync(path.join(root,rel),'utf8');
          const exists=rel=>fs.existsSync(path.join(root,rel));
          const check=(name,ok,evidence='')=>(ok?passes:failures).push({name,evidence});

          const index=read('index.html');
          const portal=read('portal.html');
          const sample=read('sample-library-now.html');
          const brand=read('brand-global.js');
          const businessUi=read('apps-script/business-office/BusinessOffice_Index.html');
          const sharedUi=read('packages/shared-ui/BusinessOffice_Index.html');
          const commercialVerifier=read('scripts/verify-commercial-system.js');
          const urlDoc=read('docs/verification/HIGHWAY38_FINAL_URLS.md');

          const context={window:{}};vm.createContext(context);vm.runInContext(read('catalog-data.js'),context);
          const catalog=context.window.H38_CATALOG;

          check('homepage headline',index.includes('<h1>Big problems. Clear plans.</h1>'));
          check('dominant Problem Snapshot CTA',index.includes('href="start-request.html?product=H38-P001">Start with a $99 Problem Snapshot'));
          check('finished examples secondary CTA',index.includes('href="sample-library-now.html">See Finished Examples'));
          check('no immediate charge reassurance',index.includes('Submitting a request does not create a charge.'));
          check('remote service explanation',/completed remotely/i.test(index));
          check('unsupported CNC quantity removed',!/(?:thousands of CNC jobs|programmed thousands)/i.test(index));
          check('public Rick attribution absent',!rootHtml().some(({file,text})=>file!=='portal.html'&&/Rick\s+Krueth/i.test(text)));

          check('catalog has 15 products',catalog.products.length===15,String(catalog.products.length));
          check('catalog has 9 bundles',catalog.bundles.length===9,String(catalog.bundles.length));
          check('catalog Owner Portal route is clean',catalog.ownerPortalUrl==='portal.html',catalog.ownerPortalUrl);
          check('commercial verifier enforces clean route',commercialVerifier.includes("catalog.ownerPortalUrl !== 'portal.html'"));
          check('Sample Library contains all product proof',sample.includes('data-samples="all"'));
          check('Sample Library contains bundle proof',sample.includes('data-bundles'));
          check('Sample Library Owner Portal uses clean route',sample.includes('href="portal.html">Owner Portal'));

          check('Owner Portal stable operations hash',portal.includes("panelToHash={operations:'operations',office:'business-office'}"));
          check('Owner Portal reads requested workspace hash',portal.includes('function requestedPanel()'));
          check('Owner Portal has Operations and Business Office workspaces',/Operations &amp; Social/.test(portal)&&/>Business Office</.test(portal));
          check('Owner Portal has no spreadsheet destination',!/docs\.google\.com\/spreadsheets/i.test(portal));
          check('Owner Portal embeds only Google Apps Script',([...portal.matchAll(/<iframe\b[^>]*src="([^"]+)"/g)]).every(m=>m[1].startsWith('https://script.google.com/macros/s/')));
          check('legacy public Owner links are rewritten',brand.includes("link.href='portal.html'")&&brand.includes("link.removeAttribute('target')"));

          for(const [name,ui] of [['Highway 38 Business Office',businessUi],['shared Business Office',sharedUi]]){
            check(`${name} viewport`,/name="viewport"/.test(ui));
            check(`${name} title`,/<title>Business Office<\/title>/.test(ui));
            check(`${name} dynamic business branding`,ui.includes("branding.businessOfficeName || 'Business Office'")&&ui.includes('branding.logoUrl'));
            check(`${name} dynamic browser title`,ui.includes('document.title = `${branding.businessOfficeName'));
            check(`${name} mobile layout`,/@media \(max-width:800px\)/.test(ui));
            check(`${name} administrative spreadsheet confirmation`,ui.includes('Administrative spreadsheet')&&ui.includes('Open the administrative spreadsheet outside the Owner Portal?'));
            check(`${name} approval boundary`,ui.includes('does not move money, fund payroll, file returns, or provide tax advice'));
          }

          check('legacy Owner Portal source retained',exists('apps-script/core-engine/owner-portal-next/RUNTIME_TEST_RUNBOOK.md'));
          check('URL plan documents public URL',urlDoc.includes('https://rkrueth-maker.github.io/highway-38-solutions/'));
          check('URL plan documents Owner Portal URL',urlDoc.includes('/portal.html'));
          check('URL plan documents Business Office hash',urlDoc.includes('/portal.html#business-office'));
          check('URL plan preserves approval for DNS',/Do not change DNS.*owner approval/i.test(urlDoc));
          check('public pages contain no direct spreadsheet links',!rootHtml().filter(x=>x.file!=='portal.html').some(x=>/docs\.google\.com\/spreadsheets/i.test(x.text)));
          check('external actions remain locked in portal',/remain owner-approval gated/.test(portal));

          function rootHtml(){return fs.readdirSync(root).filter(f=>f.endsWith('.html')).map(file=>({file,text:read(file)}));}
          const result={status:failures.length?'HOLD':'PASS',sourceCommit:process.env.GITHUB_SHA||'',passed:passes.length,failed:failures.length,passes,failures};
          fs.mkdirSync(path.join(root,'artifacts/final-polish'),{recursive:true});
          fs.writeFileSync(path.join(root,'artifacts/final-polish/verification.json'),JSON.stringify(result,null,2)+'\n');
          console.log(JSON.stringify(result,null,2));
          process.exit(failures.length?1:0);
          EOF

          cat > docs/verification/HIGHWAY38_FINAL_URLS.md <<'EOF'
          # Highway 38 Final URL and Access Plan

          ## Current stable URLs

          - Public website: `https://rkrueth-maker.github.io/highway-38-solutions/`
          - Customer request: `https://rkrueth-maker.github.io/highway-38-solutions/start-request.html`
          - Sample Library: `https://rkrueth-maker.github.io/highway-38-solutions/sample-library-now.html`
          - Problem Starter: `https://rkrueth-maker.github.io/highway-38-solutions/problem-starter.html`
          - Owner Portal: `https://rkrueth-maker.github.io/highway-38-solutions/portal.html`
          - Owner Operations workspace: `https://rkrueth-maker.github.io/highway-38-solutions/portal.html#operations`
          - Business Office workspace: `https://rkrueth-maker.github.io/highway-38-solutions/portal.html#business-office`

          Normal owner use starts at the Owner Portal. The embedded Google Apps Script URLs are implementation details, not the normal shareable destination. Administrative spreadsheets remain separately labeled, confirmation-protected, and outside ordinary operation.

          ## Future branded structure

          - `https://www.highway38solutions.com/`
          - `https://www.highway38solutions.com/start`
          - `https://www.highway38solutions.com/samples`
          - `https://www.highway38solutions.com/owner`

          A custom domain is technically ready after the owner approves the domain purchase, registrar, DNS records, and recurring cost. Do not change DNS, connect billing, purchase a domain, or publish a new domain without owner approval.

          ## DNS and redirect plan

          1. Purchase or confirm the approved domain.
          2. Add the GitHub Pages custom-domain record and required DNS records.
          3. Verify HTTPS issuance before announcing the domain.
          4. Keep the current GitHub Pages URLs working as rollback destinations.
          5. Redirect branded `/start`, `/samples`, and `/owner` routes to the current canonical pages without exposing raw Apps Script or spreadsheet URLs.

          ## Cost and security

          GitHub Pages hosting remains free. A custom domain typically creates only the registrar's recurring domain fee; no purchase is authorized by this document. HTTPS should remain mandatory. Owner Portal and Business Office access continue to rely on authorized Google accounts and existing approval gates.

          ## Rollback

          Remove the custom-domain DNS records and GitHub Pages custom-domain setting, then return all public references to the GitHub Pages URLs above. Do not delete the legacy Owner Portal, Apps Script deployments, workbooks, Drive storage, or acceptance evidence during a URL rollback.
          EOF

          cat > .github/workflows/highway38-final-polish.yml <<'EOF'
          name: Highway 38 Final Polish Acceptance

          on:
            push:
              branches:
                - highway38-final-polish
                - main
            pull_request:
              branches:
                - main
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            acceptance:
              runs-on: ubuntu-latest
              steps:
                - name: Check out repository
                  uses: actions/checkout@v4
                - name: Use Node.js
                  uses: actions/setup-node@v4
                  with:
                    node-version: '24'
                - name: Install JavaScript dependencies
                  run: npm install
                - name: Install Chromium
                  run: npx playwright install --with-deps chromium
                - name: Verify final polish contract
                  run: node scripts/verify-highway38-final-polish.js
                - name: Verify Owner Portal routing
                  run: node scripts/verify-owner-portal-routing.js
                - name: Verify commercial system
                  run: node scripts/verify-commercial-system.js
                - name: Verify Business Office
                  run: node scripts/verify-business-office.js
                - name: Verify Business Office separation
                  run: node scripts/verify-business-office-separation.js
                - name: Run full commercial and browser suite
                  run: npm run test:commercial
                - name: Upload final-polish evidence
                  if: always()
                  uses: actions/upload-artifact@v4
                  with:
                    name: highway38-final-polish-${{ github.run_id }}
                    path: |
                      artifacts/final-polish/verification.json
                      artifacts/owner-portal-routing/verification.json
                      launch-control/evidence/complete-ecosystem-verification.json
                    if-no-files-found: warn
                    retention-days: 90

            python-regression:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: '3.11'
                - run: python -m pip install --upgrade pip
                - run: pip install -r requirements.txt
                - run: python -m pytest -q
          EOF

          rm .github/workflows/apply-highway38-final-polish.yml

      - name: Verify bounded changes
        shell: bash
        run: |
          set -euo pipefail
          node scripts/verify-highway38-final-polish.js
          node scripts/verify-owner-portal-routing.js
          node scripts/verify-commercial-system.js
          git diff --check

      - name: Commit final polish changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Polish Highway 38 public and owner access paths'
          git push origin HEAD:highway38-final-polish
