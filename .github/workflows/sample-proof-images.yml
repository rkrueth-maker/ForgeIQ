name: Raster Sample Proof Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'sample-library-now.html'
      - 'assets/contractor-demo/**'
      - 'assets/demo-workthroughs/**'
      - '.github/workflows/sample-proof-images.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-raster-proof:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install image review dependency
        run: python3 -m pip install --quiet Pillow

      - name: Verify current project-example image contract
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p raster-proof-artifacts
          python3 - <<'PY'
          from pathlib import Path
          from urllib.parse import urlsplit
          from PIL import Image, ImageStat
          import re

          root=Path('.')
          html=(root/'sample-library-now.html').read_text(encoding='utf-8')
          cards=len(re.findall(r'class="project-card(?:"|\s)',html))
          if cards!=8:
              raise SystemExit(f'Expected 8 project cards, found {cards}')
          figures=re.findall(r'<figure>[\s\S]*?<img\s+src="([^"]+)"[^>]*alt="([^"]+)"[^>]*>[\s\S]*?</figure>',html)
          if len(figures)!=16:
              raise SystemExit(f'Expected 16 project figure images, found {len(figures)}')
          exact=['deck-before.webp','deck-after.webp','irrigation-before.webp','irrigation-after.webp','kitchen-before.webp','kitchen-after.webp']
          sources=[urlsplit(src).path for src,_ in figures]
          for name in exact:
              matches=[src for src in sources if src.endswith('/'+name)]
              if len(matches)!=1:
                  raise SystemExit(f'Expected one direct {name} reference, found {len(matches)}')
          if 'at.adobe.com' in html or 'background-image' in html:
              raise SystemExit('Project examples contain a remote or CSS image substitution.')
          reviewed=[]
          for src,alt in figures:
              path=root/urlsplit(src).path
              if not path.exists():
                  raise SystemExit(f'Missing project image: {path}')
              with Image.open(path) as image:
                  image.load()
                  rgb=image.convert('RGB')
                  if image.width<400 or image.height<240:
                      raise SystemExit(f'Project image is too small: {path} {image.size}')
                  if max(ImageStat.Stat(rgb.resize((80,50))).stddev)<8:
                      raise SystemExit(f'Project image appears visually blank: {path}')
                  reviewed.append((path,alt,image.size))
          report=[f'Project examples: {cards}',f'Direct local project images: {len(figures)}','Controlled deck/irrigation/kitchen images: 6']
          for path,alt,size in reviewed:
              report.append(f'{path} {size[0]}x{size[1]} — {alt}')
          Path('raster-proof-artifacts/source-image-report.txt').write_text('\n'.join(report)+'\n',encoding='utf-8')
          print('\n'.join('PASS: '+line for line in report))
          PY

      - name: Start local site
        run: |
          python3 -m http.server 8000 --bind 127.0.0.1 > /tmp/h38-raster-server.log 2>&1 &
          echo $! > /tmp/h38-raster-server.pid
          sleep 2

      - name: Verify rendered project examples
        shell: bash
        run: |
          set -euo pipefail
          chrome="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser)"
          "$chrome" --headless=new --no-sandbox --disable-gpu --disable-dev-shm-usage \
            --virtual-time-budget=5000 --dump-dom \
            http://127.0.0.1:8000/sample-library-now.html \
            > raster-proof-artifacts/rendered-samples.html
          project_count="$(grep -o '<article class="project-card' raster-proof-artifacts/rendered-samples.html | wc -l | tr -d ' ')"
          figure_count="$(grep -o '<figure>' raster-proof-artifacts/rendered-samples.html | wc -l | tr -d ' ')"
          test "$project_count" = "8"
          test "$figure_count" = "16"
          for name in deck-before.webp deck-after.webp irrigation-before.webp irrigation-after.webp kitchen-before.webp kitchen-after.webp; do
            grep -Fq "assets/demo-workthroughs/$name" raster-proof-artifacts/rendered-samples.html
          done
          printf 'Project examples: %s\nDirect project figure images: %s\nApproved deck/irrigation/kitchen images: 6\n' "$project_count" "$figure_count" > raster-proof-artifacts/raster-proof-report.txt

      - name: Build project-example contact sheets
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from urllib.parse import urlsplit
          from PIL import Image, ImageDraw, ImageFont
          import re
          html=Path('sample-library-now.html').read_text(encoding='utf-8')
          items=[]
          for index,(src,alt) in enumerate(re.findall(r'<figure>[\s\S]*?<img\s+src="([^"]+)"[^>]*alt="([^"]+)"[^>]*>[\s\S]*?</figure>',html),1):
              items.append((f'{index:02d}',alt,Path(urlsplit(src).path)))
          out=Path('raster-proof-artifacts');out.mkdir(exist_ok=True)
          font=ImageFont.load_default()
          def sheet(columns,cell_w,cell_h,target):
              rows=(len(items)+columns-1)//columns
              canvas=Image.new('RGB',(columns*cell_w,rows*cell_h),'#ece6dc')
              draw=ImageDraw.Draw(canvas)
              for i,(number,title,source) in enumerate(items):
                  x=(i%columns)*cell_w;y=(i//columns)*cell_h
                  draw.rounded_rectangle((x+10,y+10,x+cell_w-10,y+cell_h-10),16,fill='white',outline='#d7cec2',width=2)
                  draw.text((x+22,y+20),f'{number}  {title}',font=font,fill='#17242a')
                  image=Image.open(source).convert('RGB')
                  image.thumbnail((cell_w-44,cell_h-72),Image.Resampling.LANCZOS)
                  canvas.paste(image,(x+(cell_w-image.width)//2,y+54+(cell_h-72-image.height)//2))
              canvas.save(target,optimize=True)
          sheet(4,420,320,out/'all-project-example-images.jpg')
          sheet(1,760,520,out/'mobile-project-example-images.jpg')
          PY

      - name: Upload project raster proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raster-project-example-proof
          path: raster-proof-artifacts
          if-no-files-found: warn
          retention-days: 30
