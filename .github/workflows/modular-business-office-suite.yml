name: Modular Business Office Suite

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps-script/business-office/BusinessOffice_ModuleRegistry.gs'
      - 'apps/business-office/BusinessOffice_ModuleRegistry.gs'
      - 'apps-script/business-office/BusinessOffice_Modular_Suite.html'
      - 'packages/shared-ui/BusinessOffice_Modular_Suite.html'
      - 'apps-script/business-office/BusinessOffice_Web.gs'
      - 'apps/business-office/BusinessOffice_Web.gs'
      - 'scripts/verify-modular-business-office-suite.js'
      - '.github/workflows/modular-business-office-suite.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-full-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Verify full modular product family
        run: node scripts/verify-modular-business-office-suite.js
      - name: Verify existing Business Office contracts
        run: |
          node scripts/verify-business-office.js
          node scripts/verify-business-office-runtime-helpers.js
          node scripts/verify-business-office-separation.js
          node scripts/verify-business-office-clean-install.js
      - name: Verify shared source boundaries
        run: node scripts/verify-source-boundaries.js
