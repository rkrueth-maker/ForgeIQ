<style>
.bo-control{max-width:1180px;margin:0 auto;padding-bottom:10px}.bo-control-hero{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border-radius:18px;padding:22px;margin-bottom:16px}.bo-control-hero h2{margin:3px 0 7px;font-size:clamp(25px,6vw,38px)}.bo-control-hero p{margin:0;color:#e8f2fb}.bo-action-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}.bo-action{min-height:84px!important;padding:15px!important;border:2px solid var(--border)!important;border-radius:14px!important;background:#fff!important;color:var(--navy)!important;display:flex!important;align-items:center!important;gap:13px!important;text-align:left!important;font-size:17px!important}.bo-action.primary{background:var(--navy)!important;color:#fff!important;border-color:var(--navy)!important}.bo-action-icon{font-size:29px;min-width:34px;text-align:center}.bo-control-panel{background:#fff;border:1px solid var(--border);border-radius:15px;padding:16px;margin:14px 0}.bo-control-panel h2,.bo-control-panel h3{margin-top:0}.bo-control-card{border:1px solid var(--border);border-radius:13px;padding:14px;margin:10px 0;background:#fff}.bo-control-card strong{display:block;font-size:17px;margin-bottom:5px}.bo-control-form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.bo-control-form .wide{grid-column:1/-1}.bo-control-form input,.bo-control-form select,.bo-control-form textarea{min-height:54px;font-size:16px}.bo-control-form textarea{min-height:100px}.bo-control-toolbar{display:flex;flex-wrap:wrap;gap:9px;margin-top:12px}.bo-control-toolbar button{min-height:54px}.bo-control-hold{background:var(--warn);border-radius:10px;padding:11px;line-height:1.4;margin:10px 0}.bo-control-chips{display:flex;flex-wrap:wrap;gap:7px;margin:8px 0}.bo-control-chip{padding:6px 9px;border-radius:999px;background:var(--light);font-size:12px;font-weight:800}.bo-control-preview{max-width:100%;max-height:280px;border-radius:12px;margin-top:8px}.bo-control-bottom{display:none}.bo-control-summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.bo-control-summary article{border:1px solid var(--border);border-radius:12px;padding:14px}.bo-control-summary b{display:block;font-size:28px;color:var(--navy)}
@media(max-width:800px){.bo-control{padding-bottom:76px}.bo-action-grid{grid-template-columns:1fr 1fr}.bo-action{min-height:94px!important;flex-direction:column!important;justify-content:center!important;text-align:center!important;padding:10px!important}.bo-action-icon{font-size:32px}.bo-control-form{grid-template-columns:1fr}.bo-control-form .wide{grid-column:auto}.bo-control-summary{grid-template-columns:1fr 1fr}.bo-control-bottom{display:grid;grid-template-columns:repeat(4,1fr);position:fixed;left:0;right:0;bottom:0;z-index:40;background:#fff;border-top:1px solid var(--border);padding:6px}.bo-control-bottom button{background:#fff;color:var(--navy);padding:5px;min-height:58px;font-size:11px}.bo-control-bottom span{display:block;font-size:21px}nav{display:none!important}.layout{display:block!important}main{padding:10px!important}.bo-control-panel{padding:13px}.bo-control-hero{padding:17px;border-radius:14px}}
</style>
<script>
var BO_CONTROL_UI={data:null};
function boControlUiCall(action,args){showLoading(true);return new Promise(function(resolve,reject){google.script.run.withSuccessHandler(function(value){showLoading(false);resolve(value);}).withFailureHandler(function(error){showLoading(false);showToast(error.message||String(error),true);reject(error);}).boControlApiLive({action:action,args:args||{}});});}
function boControlUiEscape(value){return String(value==null?'':value).replace(/[&<>'"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c];});}
function boControlUiJs(value){return String(value||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function boControlUiHost(html){document.getElementById('content').innerHTML='<div class="bo-control">'+html+'</div>'+boControlUiBottom();}
function boControlUiBottom(){return '<div class="bo-control-bottom"><button onclick="boControlUiRoute(\'home\')"><span>⌂</span>Home</button><button onclick="boControlUiRoute(\'field\')"><span>✓</span>Work</button><button onclick="boControlUiRoute(\'photo\')"><span>📷</span>Camera</button><button onclick="boControlUiRoute(\'more\')"><span>⋯</span>More</button></div>';}
function boControlUiBack(){return '<button class="secondary" onclick="boControlUiRoute(\'home\')">← Control Center</button>';}
function boControlUiAction(item){return '<button class="bo-action '+(item.primary?'primary':'')+'" onclick="boControlUiRoute(\''+boControlUiJs(item.route.replace(/^control:/,''))+'\')"><span class="bo-action-icon">'+boControlUiEscape(item.icon)+'</span><span>'+boControlUiEscape(item.label)+'</span></button>';}
function boControlUiTask(task,buttons){return '<article class="bo-control-card"><strong>'+boControlUiEscape(task['Task Title']||task['Task ID'])+'</strong><div>'+boControlUiEscape(task.Priority||'Normal')+' · '+boControlUiEscape(task['Due Date']||'No due date')+'</div><div class="boundary">'+boControlUiEscape(task.Instructions||task.Notes||'')+'</div><div class="bo-control-chips"><span class="bo-control-chip">'+boControlUiEscape(task.Status||'Open')+'</span><span class="bo-control-chip">'+boControlUiEscape(task['Required Proof']||'Completion Photo, Notes')+'</span></div>'+(buttons||'')+'</article>';}
async function boControlUiLoad(){BO_CONTROL_UI.data=await boControlUiCall('bootstrap');return BO_CONTROL_UI.data;}
async function boControlUiHome(){var data=await boControlUiLoad(),user=data.user||{};state.module='control';renderNav();boControlUiHost('<section class="bo-control-hero"><div>BUSINESS OFFICE CONTROL</div><h2>Good day, '+boControlUiEscape(user.displayName||user.role||'User')+'</h2><p>Choose the work. Business Office handles the modules, records, credentials, proof, and approvals.</p></section>'+(data.status!=='PASS'?'<div class="bo-control-hold"><b>Owner setup required.</b> '+boControlUiEscape(data.schema&&data.schema.message||'Initialize the control plane.')+'</div>':'')+'<div class="bo-action-grid">'+(data.actions||[]).map(boControlUiAction).join('')+'</div><section class="bo-control-panel"><h3>Needs attention</h3><div class="bo-control-summary"><article><b>'+((data.tasks||[]).length)+'</b><span>Assigned work</span></article><article><b>'+((data.proofQueue||[]).length)+'</b><span>Photos to review</span></article><article><b>'+((data.socialQueue||[]).length)+'</b><span>Social drafts / review</span></article></div></section>');}
async function boControlUiField(){var data=await boControlUiLoad(),session=data.currentSession,tasks=data.tasks||[],html=boControlUiBack()+'<section class="bo-control-hero"><div>FIELD OPERATIONS</div><h2>'+(session?'Work in progress':'My assigned work')+'</h2><p>Time, instructions, photos, notes, receipts, and closeout stay connected.</p></section>';if(session)html+='<section class="bo-control-panel"><h3>Current work</h3><div class="bo-control-chips"><span class="bo-control-chip">'+boControlUiEscape(session.Status)+'</span><span class="bo-control-chip">Task '+boControlUiEscape(session['Task ID'])+'</span><span class="bo-control-chip">Started '+boControlUiEscape(session['Started Time'])+'</span></div><div class="bo-control-toolbar">'+(session.Status==='WORKING'?'<button class="secondary" onclick="boControlUiFieldEvent(\'PAUSE\')">Pause</button>':'<button class="secondary" onclick="boControlUiFieldEvent(\'RESUME\')">Resume</button>')+'<button class="primary" onclick="boControlUiPhoto(\'Completion\')">Completion photo</button><button class="primary" onclick="boControlUiCloseoutForm()">Complete & clock out</button></div></section>';html+='<section class="bo-control-panel"><h3>Assigned tasks</h3>'+(tasks.length?tasks.map(function(task){return boControlUiTask(task,!session?'<div class="bo-control-toolbar"><button class="primary" onclick="boControlUiClockIn(\''+boControlUiJs(task['Task ID'])+'\')">Start work</button></div>':'');}).join(''):'<div class="empty">No open assigned tasks.</div>')+'</section>';boControlUiHost(html);}
async function boControlUiAssign(){var data=await boControlUiLoad();boControlUiHost(boControlUiBack()+'<section class="bo-control-panel"><h2>Assign field task</h2><div class="bo-control-form"><label class="wide">Task title<input id="bocTaskTitle"></label><label>Assigned user ID<input id="bocAssignedUser"></label><label>Assigned role<select id="bocAssignedRole"><option value="">Choose role</option><option>Foreman</option><option>Field Staff</option><option>Staff</option></select></label><label>Priority<select id="bocPriority"><option>Normal</option><option>High</option><option>Urgent</option><option>Low</option></select></label><label>Due date<input id="bocDue" type="date"></label><label>Customer ID<input id="bocCustomer"></label><label>Job ID<input id="bocJob"></label><label>Work Order ID<input id="bocWorkOrder"></label><label class="wide">Instructions<textarea id="bocInstructions"></textarea></label><fieldset class="wide"><legend>Required closeout proof</legend><label><input id="bocBefore" type="checkbox"> Before photo</label><label><input id="bocProgress" type="checkbox"> Progress photo</label><label><input id="bocCompletion" type="checkbox" checked> Completion photo</label><label><input id="bocChecklist" type="checkbox"> Checklist</label><label><input id="bocNotes" type="checkbox" checked> Final notes</label></fieldset></div><div class="bo-control-hold">Assignment is internal. No customer message is sent.</div><div class="bo-control-toolbar"><button class="primary" onclick="boControlUiSaveTask()">Assign task</button></div></section><section class="bo-control-panel"><h3>Open work</h3>'+(data.tasks||[]).slice(0,6).map(function(task){return boControlUiTask(task,'');}).join('')+'</section>');}
function boControlUiPreview(inputId,hostId){var file=document.getElementById(inputId).files[0],host=document.getElementById(hostId);host.innerHTML='';if(file&&file.type.indexOf('image/')===0){var image=document.createElement('img');image.src=URL.createObjectURL(file);image.className='bo-control-preview';host.appendChild(image);}}
async function boControlUiPhoto(type){var data=await boControlUiLoad(),tasks=data.tasks||[],session=data.currentSession,selected=session&&session['Task ID']||'',photoType=type||'Progress';boControlUiHost(boControlUiBack()+'<section class="bo-control-panel"><h2>Add job photo</h2><div class="bo-control-form"><label>Task<select id="bocPhotoTask">'+tasks.map(function(task){return '<option value="'+boControlUiEscape(task['Task ID'])+'" '+(task['Task ID']===selected?'selected':'')+'>'+boControlUiEscape(task['Task Title'])+'</option>';}).join('')+'</select></label><label>Photo type<select id="bocPhotoType"><option '+(photoType==='Before'?'selected':'')+'>Before</option><option '+(photoType==='Progress'?'selected':'')+'>Progress</option><option '+(photoType==='Completion'?'selected':'')+'>Completion</option><option>Issue</option></select></label><label class="wide">Take picture / choose photo<input id="bocPhotoFile" type="file" accept="image/jpeg,image/png,image/heic,image/heif" capture="environment" onchange="boControlUiPreview(\'bocPhotoFile\',\'bocPhotoPreview\')"></label><div class="wide" id="bocPhotoPreview"></div><label class="wide">Caption / progress note<textarea id="bocPhotoCaption"></textarea></label></div><div class="bo-control-hold">The original is filed privately. Customer visibility stays off until Owner approval.</div><div class="bo-control-toolbar"><button class="primary" onclick="boControlUiSavePhoto()">Save photo privately</button></div></section>');}
async function boControlUiReceipt(){var data=await boControlUiLoad(),tasks=data.tasks||[];boControlUiHost(boControlUiBack()+'<section class="bo-control-panel"><h2>Scan receipt</h2><div class="bo-control-form"><label class="wide">Take picture / choose PDF<input id="bocReceiptFile" type="file" accept="application/pdf,image/jpeg,image/png,image/heic,image/heif" capture="environment" onchange="boControlUiPreview(\'bocReceiptFile\',\'bocReceiptPreview\')"></label><div class="wide" id="bocReceiptPreview"></div><label>Job<select id="bocReceiptJob"><option value="">Choose job</option>'+tasks.filter(function(task){return task['Job ID'];}).map(function(task){return '<option value="'+boControlUiEscape(task['Job ID'])+'" data-customer="'+boControlUiEscape(task['Customer ID'])+'">'+boControlUiEscape(task['Task Title'])+'</option>';}).join('')+'</select></label><label>Customer ID<input id="bocReceiptCustomer"></label><label>Vendor ID<input id="bocReceiptVendor"></label><label>Date<input id="bocReceiptDate" type="date"></label><label>Total<input id="bocReceiptTotal" type="number" step="0.01"></label><label>Tax<input id="bocReceiptTax" type="number" step="0.01"></label><label>Category<select id="bocReceiptCategory"><option>Materials</option><option>Fuel</option><option>Equipment</option><option>Subcontractor</option><option>Other</option></select></label><label>Payment method<select id="bocReceiptPayment"><option>Company Card</option><option>Cash</option><option>Personal Reimbursement</option><option>Vendor Account</option></select></label></div><div class="bo-control-hold">Creates a private receipt for review. No accounting post, payment, or customer charge occurs.</div><div class="bo-control-toolbar"><button class="primary" onclick="boControlUiSaveReceipt()">Submit receipt</button></div></section>');}
async function boControlUiProof(){var data=await boControlUiLoad(),rows=data.proofQueue||[];boControlUiHost(boControlUiBack()+'<section class="bo-control-hero"><div>FIELD PROOF REVIEW</div><h2>Choose what the customer may see</h2><p>Original photos stay in the internal customer and job records.</p></section><section class="bo-control-panel">'+(rows.length?rows.map(function(row){var id=boControlUiJs(row['Task Proof ID']);return '<article class="bo-control-card"><strong>'+boControlUiEscape(row['Photo Type'])+' · Task '+boControlUiEscape(row['Task ID'])+'</strong><div>'+boControlUiEscape(row.Caption||'No caption')+'</div><div class="bo-control-toolbar"><button class="primary" onclick="boControlUiApproveProof(\''+id+'\',true)">Approve & share</button><button class="secondary" onclick="boControlUiApproveProof(\''+id+'\',false)">Approve internal only</button></div></article>';}).join(''):'<div class="empty">No photos await Owner review.</div>')+'</section>');}
async function boControlUiSocial(){var data=await boControlUiLoad(),rows=await boControlUiCall('socialList'),caps=data.capabilities||{},draft=caps.prepareSocial?'<section class="bo-control-panel"><h3>Create social draft</h3><div class="bo-control-form"><label>Platform<select id="bocSocialPlatform"><option>Facebook</option><option>Instagram</option><option>Google Business Profile</option><option>LinkedIn</option></select></label><label>Content type<select id="bocSocialType"><option>Project Update</option><option>Before and After</option><option>Service Tip</option><option>Customer Story</option><option>Promotion</option></select></label><label>Customer ID<input id="bocSocialCustomer"></label><label>Job ID<input id="bocSocialJob"></label><label>Approved source document ID<input id="bocSocialDocument"></label><label class="wide">Caption<textarea id="bocSocialCaption"></textarea></label><label class="wide">Hashtags<input id="bocSocialHashtags"></label></div><div class="bo-control-toolbar"><button class="primary" onclick="boControlUiSaveSocial()">Save draft</button></div></section>':'';boControlUiHost(boControlUiBack()+'<section class="bo-control-hero"><div>SOCIAL CONTROL</div><h2>Prepare. Review. Approve.</h2><p>Publishing remains locked until a provider and separate release approval are configured.</p></section>'+draft+'<section class="bo-control-panel"><h3>Content queue</h3>'+rows.map(function(row){var id=boControlUiJs(row['Social Content ID']),buttons='<button class="secondary" onclick="boControlUiSocialAction(\''+id+'\',\'SUBMIT_REVIEW\')">Submit review</button>';if(caps.approveSocial)buttons+='<button class="primary" onclick="boControlUiSocialAction(\''+id+'\',\'APPROVE\')">Approve</button><button class="secondary" onclick="boControlUiSocialAction(\''+id+'\',\'REVISE\')">Revise</button><button class="secondary" onclick="boControlUiSocialAction(\''+id+'\',\'PUBLISH\')">Publish selected</button>';if(caps.markSocialPosted)buttons+='<button class="secondary" onclick="boControlUiSocialAction(\''+id+'\',\'MARK_POSTED\')">Mark posted</button>';return '<article class="bo-control-card"><strong>'+boControlUiEscape(row.Platform)+' · '+boControlUiEscape(row['Content Type'])+'</strong><div>'+boControlUiEscape(row.Caption)+'</div><div class="bo-control-chips"><span class="bo-control-chip">'+boControlUiEscape(row.Status)+'</span><span class="bo-control-chip">'+boControlUiEscape(row['Approval Status'])+'</span></div><div class="bo-control-toolbar">'+buttons+'</div></article>';}).join('')+'</section>');}
function boControlUiMore(){boControlUiHost(boControlUiBack()+'<section class="bo-control-panel"><h2>Apps and modules</h2><div class="bo-action-grid"><button class="bo-action" onclick="openModule(\'customers\')"><span class="bo-action-icon">👤</span><span>Customers</span></button><button class="bo-action" onclick="openModule(\'quotes\')"><span class="bo-action-icon">＋</span><span>Quotes</span></button><button class="bo-action" onclick="openModule(\'jobs\')"><span class="bo-action-icon">🛠</span><span>Jobs</span></button><button class="bo-action" onclick="openModule(\'documents\')"><span class="bo-action-icon">📁</span><span>Documents</span></button><button class="bo-action" onclick="openModule(\'reports\')"><span class="bo-action-icon">▥</span><span>Reports</span></button></div></section>');}
async function boControlUiRoute(route){if(route==='home'||route==='control'||route==='')return boControlUiHome();if(route==='field')return boControlUiField();if(route==='assign')return boControlUiAssign();if(route==='photo')return boControlUiPhoto('Progress');if(route==='receipt')return boControlUiReceipt();if(route==='proof')return boControlUiProof();if(route==='social')return boControlUiSocial();if(route==='more')return boControlUiMore();if(route==='approvals')return openModule('approvals');if(route==='time')return openModule('time');if(route==='quote-builder')return openModule('quotes');}
async function boControlUiClockIn(taskId){try{await boControlUiCall('clockIn',{payload:{taskId:taskId}});showToast('Clocked in. Task and time entry started.');boControlUiField();}catch(error){}}
async function boControlUiFieldEvent(event){try{var session=BO_CONTROL_UI.data.currentSession;await boControlUiCall('fieldTransition',{sessionId:session['Field Session ID'],event:event,payload:{}});showToast(event==='RESUME'?'Work resumed. Break time was calculated automatically.':'Field session updated.');boControlUiField();}catch(error){}}
function boControlUiCloseoutForm(){boControlUiHost(boControlUiBack()+'<section class="bo-control-panel"><h2>Complete task and clock out</h2><div class="bo-control-form"><label class="wide">Final notes<textarea id="bocCloseNotes"></textarea></label><label><input id="bocCloseChecklist" type="checkbox"> Checklist complete</label></div><div class="bo-control-toolbar"><button class="secondary" onclick="boControlUiPhoto(\'Completion\')">Add completion photo</button><button class="primary" onclick="boControlUiCloseout()">Complete task & clock out</button></div></section>');}
async function boControlUiCloseout(){try{await boControlUiCall('closeout',{payload:{sessionId:BO_CONTROL_UI.data.currentSession['Field Session ID'],notes:document.getElementById('bocCloseNotes').value.trim(),checklistComplete:document.getElementById('bocCloseChecklist').checked,ownerReviewRequired:true}});showToast('Clocked out. Time and proof are ready for review.');boControlUiHome();}catch(error){}}
async function boControlUiSaveTask(){try{var proof=[];if(document.getElementById('bocBefore').checked)proof.push('Before Photo');if(document.getElementById('bocProgress').checked)proof.push('Progress Photo');if(document.getElementById('bocCompletion').checked)proof.push('Completion Photo');if(document.getElementById('bocChecklist').checked)proof.push('Checklist');if(document.getElementById('bocNotes').checked)proof.push('Notes');var job=document.getElementById('bocJob').value;await boControlUiCall('assignTask',{values:{'Task Title':document.getElementById('bocTaskTitle').value,'Assigned User ID':document.getElementById('bocAssignedUser').value,'Assigned Role':document.getElementById('bocAssignedRole').value,Priority:document.getElementById('bocPriority').value,'Due Date':document.getElementById('bocDue').value,'Customer ID':document.getElementById('bocCustomer').value,'Job ID':job,'Work Order ID':document.getElementById('bocWorkOrder').value,Instructions:document.getElementById('bocInstructions').value,'Linked Record Type':job?'Job':'','Linked Record ID':job,'Required Proof':proof.join(',')||'Completion Photo,Notes','Customer Visibility Rule':'Owner Approval'}});showToast('Task assigned. No customer message was sent.');boControlUiField();}catch(error){}}
async function boControlUiSavePhoto(){try{var file=document.getElementById('bocPhotoFile').files[0];if(!file)throw new Error('Take or choose a photo first.');await boControlUiCall('saveProof',{payload:{taskId:document.getElementById('bocPhotoTask').value,photoType:document.getElementById('bocPhotoType').value,fileName:file.name,mimeType:file.type||mimeFromName(file.name),base64Data:await toBase64(file),caption:document.getElementById('bocPhotoCaption').value}});showToast('Photo filed privately.');boControlUiField();}catch(error){showToast(error.message||String(error),true);}}
async function boControlUiSaveReceipt(){try{var file=document.getElementById('bocReceiptFile').files[0];if(!file)throw new Error('Take or choose a receipt first.');var select=document.getElementById('bocReceiptJob'),option=select.options[select.selectedIndex],customer=document.getElementById('bocReceiptCustomer').value||(option&&option.dataset.customer)||'',total=Number(document.getElementById('bocReceiptTotal').value||0),tax=Number(document.getElementById('bocReceiptTax').value||0);await boControlUiCall('captureReceipt',{payload:{fileName:file.name,mimeType:file.type||mimeFromName(file.name),base64Data:await toBase64(file),jobId:select.value,customerId:customer,vendorId:document.getElementById('bocReceiptVendor').value,date:document.getElementById('bocReceiptDate').value,total:total,tax:tax,subtotal:Math.max(0,total-tax),expenseCategory:document.getElementById('bocReceiptCategory').value,paymentMethod:document.getElementById('bocReceiptPayment').value}});showToast('Receipt logged for review. Nothing was posted.');boControlUiHome();}catch(error){showToast(error.message||String(error),true);}}
async function boControlUiApproveProof(id,visible){try{await boControlUiCall('approveProof',{proofId:id,customerVisible:visible===true});showToast('Photo reviewed.');boControlUiProof();}catch(error){}}
async function boControlUiSaveSocial(){try{await boControlUiCall('socialSave',{values:{Platform:document.getElementById('bocSocialPlatform').value,'Content Type':document.getElementById('bocSocialType').value,'Customer ID':document.getElementById('bocSocialCustomer').value,'Job ID':document.getElementById('bocSocialJob').value,'Source Document ID':document.getElementById('bocSocialDocument').value,Caption:document.getElementById('bocSocialCaption').value,Hashtags:document.getElementById('bocSocialHashtags').value}});showToast('Social draft saved. Nothing was published.');boControlUiSocial();}catch(error){}}
async function boControlUiSocialAction(id,action){try{var notes=/APPROVE|REVISE/.test(action)?prompt('Decision notes:','')||'':'';var result=await boControlUiCall('socialAction',{recordId:id,action:action,notes:notes});if(result&&result.status==='HOLD')showToast(result.reason,true);else showToast('Social control updated. No automatic post occurred.');boControlUiSocial();}catch(error){}}
(function(){var originalRenderNav=window.renderNav;window.renderNav=function(){originalRenderNav();var nav=document.getElementById('nav');if(nav&&!document.getElementById('boControlNav'))nav.insertAdjacentHTML('afterbegin','<button id="boControlNav" class="'+(state.module==='control'?'active':'')+'" onclick="boControlUiHome()">Control Center</button>');};var originalStart=window.start;window.start=async function(){await originalStart();var role=state.bootstrap.context.user.role;if(role==='Owner'||role==='Administrator')await boControlUiHome();else if(['Foreman','Field Staff','Staff'].indexOf(role)>=0)await boControlUiField();};})();
</script>
