<script>
(function(){
  'use strict';
  var baseRoute=window.boControlUiRoute;
  function esc(value){return boControlUiEscape(value);}
  function js(value){return boControlUiJs(value);}
  function filePayload(id){var file=document.getElementById(id)&&document.getElementById(id).files[0];if(!file)return Promise.resolve({});return toBase64(file).then(function(data){return{fileName:file.name,mimeType:file.type||mimeFromName(file.name),base64Data:data};});}
  function option(value,label,selected){return'<option value="'+esc(value)+'" '+(selected?'selected':'')+'>'+esc(label)+'</option>';}
  function assetName(data,id){var row=(data.assets||[]).find(function(item){return item['Asset ID']===id;});return row?row['Asset Name']||row['Asset Number']||id:id;}
  function openAssignments(data){return(data.assignments||[]).filter(function(row){return row.Status==='Assigned'||row.Status==='In Use';});}
  function summary(data){var s=data.summary||{};return'<div class="bo-control-summary"><article><b>'+Number(s.available||0)+'</b><span>Available</span></article><article><b>'+Number(s.assigned||0)+'</b><span>Assigned</span></article><article><b>'+Number(s.serviceDue||0)+'</b><span>Service due</span></article><article><b>'+Number(s.outOfService||0)+'</b><span>Unavailable</span></article></div>';}
  function card(asset,data){var caps=data.capabilities||{},open=openAssignments(data).find(function(row){return row['Asset ID']===asset['Asset ID'];}),buttons=[];
    if(caps.assignEquipment&&asset.Availability==='Available'&&asset.Status!=='Out of Service')buttons.push('<button class="primary" onclick="boEquipmentUiAssignForm(\''+js(asset['Asset ID'])+'\')">Assign / check out</button>');
    if(open)buttons.push('<button class="primary" onclick="boEquipmentUiReturnForm(\''+js(open['Job Equipment ID'])+'\')">Return / check in</button>');
    if(caps.inspectEquipment)buttons.push('<button class="secondary" onclick="boEquipmentUiInspectForm(\''+js(asset['Asset ID'])+'\',\''+js(open&&open['Job Equipment ID']||'')+'\')">Inspect</button>');
    if(caps.serviceEquipment)buttons.push('<button class="secondary" onclick="boEquipmentUiServiceForm(\''+js(asset['Asset ID'])+'\')">Maintenance</button>');
    return'<article class="bo-control-card"><strong>'+esc(asset['Asset Name']||asset['Asset Number']||asset['Asset ID'])+'</strong><div>'+esc([asset.Make,asset.Model,asset['Asset Type']].filter(Boolean).join(' · '))+'</div><div class="bo-control-chips"><span class="bo-control-chip">'+esc(asset.Status||'Active')+'</span><span class="bo-control-chip">'+esc(asset.Availability||'Available')+'</span><span class="bo-control-chip">'+esc((asset['Meter Type']||'Hours')+': '+(asset['Current Meter']||0))+'</span></div><div class="boundary">'+esc(asset['Current Location']||'No location')+(asset['Current Employee ID']?' · Employee '+esc(asset['Current Employee ID']):'')+(asset['Current Job ID']?' · Job '+esc(asset['Current Job ID']):'')+'</div><div class="bo-control-toolbar">'+buttons.join('')+'</div></article>';
  }
  async function load(){return boControlUiCall('equipmentList');}
  window.boEquipmentUiOpen=async function(){try{var data=await load(),caps=data.capabilities||{},actions=[];if(caps.manageEquipment)actions.push('<button class="primary" onclick="boEquipmentUiAssetForm()">Add equipment</button>');if(caps.assignEquipment)actions.push('<button class="secondary" onclick="boEquipmentUiAssignmentBoard()">Assignments</button>');if(caps.serviceEquipment)actions.push('<button class="secondary" onclick="boEquipmentUiServiceBoard()">Service history</button>');boControlUiHost(boControlUiBack()+'<section class="bo-control-hero"><div>EQUIPMENT & ASSETS</div><h2>Know what is ready, assigned, or due.</h2><p>Equipment stays linked to employees, jobs, tasks, photos, inspections, maintenance, and internal job cost.</p></section><section class="bo-control-panel">'+summary(data)+'<div class="bo-control-toolbar">'+actions.join('')+'</div></section><section class="bo-control-panel"><h3>'+(caps.assignEquipment?'Equipment register':'My assigned equipment')+'</h3>'+((data.assets||[]).length?(data.assets||[]).map(function(row){return card(row,data);}).join(''):'<div class="empty">No equipment records are available for this credential.</div>')+'</section>');}catch(error){showToast(error.message||String(error),true);}};
  window.boEquipmentUiAssetForm=async function(assetId){var data=await load(),asset=(data.assets||[]).find(function(row){return row['Asset ID']===assetId;})||{};boControlUiHost(boControlUiBack()+'<section class="bo-control-panel"><h2>'+(assetId?'Edit equipment':'Add equipment')+'</h2><div class="bo-control-form"><label>Equipment number<input id="boEqNumber" value="'+esc(asset['Asset Number']||'')+'"></label><label>Equipment name<input id="boEqName" value="'+esc(asset['Asset Name']||'')+'"></label><label>Type<select id="boEqType">'+['Equipment','Vehicle','Trailer','Tool','Attachment','Rental'].map(function(v){return option(v,v,asset['Asset Type']===v);}).join('')+'</select></label><label>Make<input id="boEqMake" value="'+esc(asset.Make||'')+'"></label><label>Model<input id="boEqModel" value="'+esc(asset.Model||'')+'"></label><label>Serial number<input id="boEqSerial" value="'+esc(asset['Serial Number']||'')+'"></label><label>Year<input id="boEqYear" value="'+esc(asset.Year||'')+'"></label><label>Location<input id="boEqLocation" value="'+esc(asset['Current Location']||'')+'"></label><label>Meter type<select id="boEqMeterType">'+['Hours','Miles','Cycles','None'].map(function(v){return option(v,v,(asset['Meter Type']||'Hours')===v);}).join('')+'</select></label><label>Current meter<input id="boEqMeter" type="number" step="0.1" value="'+esc(asset['Current Meter']||0)+'"></label><label>Hourly cost rate<input id="boEqRate" type="number" step="0.01" value="'+esc(asset['Hourly Cost Rate']||0)+'"></label><label>Next service date<input id="boEqNextDate" type="date" value="'+esc(asset['Next Service Date']||'')+'"></label><label>Next service meter<input id="boEqNextMeter" type="number" step="0.1" value="'+esc(asset['Next Service Meter']||0)+'"></label><label class="wide">Equipment photo<input id="boEqPhoto" type="file" accept="image/jpeg,image/png,image/heic,image/heif" capture="environment" onchange="boControlUiPreview(\'boEqPhoto\',\'boEqPreview\')"></label><div class="wide" id="boEqPreview"></div><label class="wide">Notes<textarea id="boEqNotes">'+esc(asset.Notes||'')+'</textarea></label></div><div class="bo-control-toolbar"><button class="primary" onclick="boEquipmentUiSaveAsset(\''+js(assetId||'')+'\')">Save equipment</button></div></section>');};
  window.boEquipmentUiSaveAsset=async function(assetId){try{var file=await filePayload('boEqPhoto'),values=Object.assign(file,{assetNumber:document.getElementById('boEqNumber').value,assetName:document.getElementById('boEqName').value,assetType:document.getElementById('boEqType').value,make:document.getElementById('boEqMake').value,model:document.getElementById('boEqModel').value,serialNumber:document.getElementById('boEqSerial').value,year:document.getElementById('boEqYear').value,currentLocation:document.getElementById('boEqLocation').value,meterType:document.getElementById('boEqMeterType').value,currentMeter:Number(document.getElementById('boEqMeter').value||0),hourlyCostRate:Number(document.getElementById('boEqRate').value||0),nextServiceDate:document.getElementById('boEqNextDate').value,nextServiceMeter:Number(document.getElementById('boEqNextMeter').value||0),notes:document.getElementById('boEqNotes').value});await boControlUiCall('equipmentSave',{assetId:assetId,values:values});showToast('Equipment saved.');boEquipmentUiOpen();}catch(error){showToast(error.message||String(error),true);}};
  window.boEquipmentUiAssignForm=async function(assetId){var data=await load(),asset=(data.assets||[]).find(function(row){return row['Asset ID']===assetId;})||{},dir=data.directory||{};boControlUiHost(boControlUiBack()+'<section class="bo-control-panel"><h2>Assign '+esc(asset['Asset Name']||assetId)+'</h2><div class="bo-control-form"><label>Employee<select id="boEqEmployee"><option value="">Choose employee</option>'+((dir.employees||[]).map(function(row){return option(row['Employee ID'],row['Display Name'],false);}).join(''))+'</select></label><label>Job<select id="boEqJob"><option value="">No job</option>'+((dir.jobs||[]).map(function(row){return option(row['Job ID'],[row['Job Number'],row['Project Title']].filter(Boolean).join(' · '),false);}).join(''))+'</select></label><label>Task<select id="boEqTask"><option value="">No task</option>'+((dir.tasks||[]).map(function(row){return option(row['Task ID'],row['Task Title'],false);}).join(''))+'</select></label><label>Start meter<input id="boEqStartMeter" type="number" step="0.1" value="'+esc(asset['Current Meter']||0)+'"></label><label>Condition out<select id="boEqConditionOut"><option>Good</option><option>Fair</option><option>Existing Damage</option></select></label><label>Job-cost rate<input id="boEqAssignRate" type="number" step="0.01" value="'+esc(asset['Hourly Cost Rate']||0)+'"></label><label class="wide">Checkout photo<input id="boEqOutPhoto" type="file" accept="image/jpeg,image/png,image/heic,image/heif" capture="environment" onchange="boControlUiPreview(\'boEqOutPhoto\',\'boEqOutPreview\')"></label><div class="wide" id="boEqOutPreview"></div><label class="wide">Notes<textarea id="boEqAssignNotes"></textarea></label></div><div class="bo-control-hold">Assignment is internal. No customer message or accounting post occurs.</div><div class="bo-control-toolbar"><button class="primary" onclick="boEquipmentUiAssign(\''+js(assetId)+'\')">Assign equipment</button></div></section>');};
  window.boEquipmentUiAssign=async function(assetId){try{var file=await filePayload('boEqOutPhoto');await boControlUiCall('equipmentAssign',{values:Object.assign(file,{assetId:assetId,employeeId:document.getElementById('boEqEmployee').value,jobId:document.getElementById('boEqJob').value,taskId:document.getElementById('boEqTask').value,startMeter:Number(document.getElementById('boEqStartMeter').value||0),conditionOut:document.getElementById('boEqConditionOut').value,hourlyCostRate:Number(document.getElementById('boEqAssignRate').value||0),notes:document.getElementById('boEqAssignNotes').value})});showToast('Equipment assigned.');boEquipmentUiOpen();}catch(error){showToast(error.message||String(error),true);}};
  window.boEquipmentUiReturnForm=async function(assignmentId){var data=await load(),assignment=(data.assignments||[]).find(function(row){return row['Job Equipment ID']===assignmentId;})||{};boControlUiHost(boControlUiBack()+'<section class="bo-control-panel"><h2>Return '+esc(assetName(data,assignment['Asset ID']))+'</h2><div class="bo-control-form"><label>End meter<input id="boEqEndMeter" type="number" step="0.1" value="'+esc(assignment['Start Meter']||0)+'"></label><label>Condition in<select id="boEqConditionIn"><option>Good</option><option>Fair</option><option>Needs Service</option><option>Damaged</option><option>Unsafe</option></select></label><label>Return location<input id="boEqReturnLocation"></label><label class="wide">Return photo<input id="boEqInPhoto" type="file" accept="image/jpeg,image/png,image/heic,image/heif" capture="environment" onchange="boControlUiPreview(\'boEqInPhoto\',\'boEqInPreview\')"></label><div class="wide" id="boEqInPreview"></div><label class="wide">Notes<textarea id="boEqReturnNotes"></textarea></label></div><div class="bo-control-hold">Hours and internal job cost are calculated. Nothing is posted to accounting.</div><div class="bo-control-toolbar"><button class="primary" onclick="boEquipmentUiReturn(\''+js(assignmentId)+'\')">Return equipment</button></div></section>');};
  window.boEquipmentUiReturn=async function(assignmentId){try{var file=await filePayload('boEqInPhoto'),result=await boControlUiCall('equipmentReturn',{assignmentId:assignmentId,values:Object.assign(file,{endMeter:Number(document.getElementById('boEqEndMeter').value||0),conditionIn:document.getElementById('boEqConditionIn').value,location:document.getElementById('boEqReturnLocation').value,notes:document.getElementById('boEqReturnNotes').value})});showToast('Equipment returned. '+result.hoursUsed+' hours · $'+result.costAmount+' internal job cost.');boEquipmentUiOpen();}catch(error){showToast(error.message||String(error),true);}};
  window.boEquipmentUiInspectForm=async function(assetId,assignmentId){var data=await load(),asset=(data.assets||[]).find(function(row){return row['Asset ID']===assetId;})||{};boControlUiHost(boControlUiBack()+'<section class="bo-control-panel"><h2>Inspect '+esc(asset['Asset Name']||assetId)+'</h2><div class="bo-control-form"><label>Condition<select id="boEqInspectCondition"><option>Good</option><option>Fair</option><option>Needs Service</option><option>Damaged</option><option>Unsafe</option></select></label><label>Meter reading<input id="boEqInspectMeter" type="number" step="0.1" value="'+esc(asset['Current Meter']||0)+'"></label><label class="wide">Inspection photo<input id="boEqInspectPhoto" type="file" accept="image/jpeg,image/png,image/heic,image/heif" capture="environment" onchange="boControlUiPreview(\'boEqInspectPhoto\',\'boEqInspectPreview\')"></label><div class="wide" id="boEqInspectPreview"></div><label class="wide">Notes<textarea id="boEqInspectNotes"></textarea></label></div><div class="bo-control-toolbar"><button class="primary" onclick="boEquipmentUiInspect(\''+js(assetId)+'\',\''+js(assignmentId||'')+'\')">Save inspection</button></div></section>');};
  window.boEquipmentUiInspect=async function(assetId,assignmentId){try{var file=await filePayload('boEqInspectPhoto');await boControlUiCall('equipmentInspect',{values:Object.assign(file,{assetId:assetId,assignmentId:assignmentId,condition:document.getElementById('boEqInspectCondition').value,meterReading:Number(document.getElementById('boEqInspectMeter').value||0),notes:document.getElementById('boEqInspectNotes').value})});showToast('Inspection saved.');boEquipmentUiOpen();}catch(error){showToast(error.message||String(error),true);}};
  window.boEquipmentUiServiceForm=async function(assetId){var data=await load(),asset=(data.assets||[]).find(function(row){return row['Asset ID']===assetId;})||{};boControlUiHost(boControlUiBack()+'<section class="bo-control-panel"><h2>Maintenance · '+esc(asset['Asset Name']||assetId)+'</h2><div class="bo-control-form"><label>Event type<select id="boEqServiceType"><option>Preventive Maintenance</option><option>Repair</option><option>Inspection</option><option>Fuel / Fluids</option><option>Tire / Track Service</option></select></label><label>Meter reading<input id="boEqServiceMeter" type="number" step="0.1" value="'+esc(asset['Current Meter']||0)+'"></label><label>Cost<input id="boEqServiceCost" type="number" step="0.01"></label><label>Vendor ID<input id="boEqServiceVendor"></label><label>Next service date<input id="boEqServiceDate" type="date"></label><label>Next service meter<input id="boEqServiceNextMeter" type="number" step="0.1"></label><label><input id="boEqReturnService" type="checkbox" checked> Return to service</label><label class="wide">Service document / photo<input id="boEqServiceFile" type="file" accept="application/pdf,image/jpeg,image/png,image/heic,image/heif" capture="environment"></label><label class="wide">Notes<textarea id="boEqServiceNotes"></textarea></label></div><div class="bo-control-hold">Records service history only. It does not create an expense or accounting entry.</div><div class="bo-control-toolbar"><button class="primary" onclick="boEquipmentUiService(\''+js(assetId)+'\')">Record maintenance</button></div></section>');};
  window.boEquipmentUiService=async function(assetId){try{var file=await filePayload('boEqServiceFile');await boControlUiCall('equipmentService',{values:Object.assign(file,{assetId:assetId,eventType:document.getElementById('boEqServiceType').value,meterReading:Number(document.getElementById('boEqServiceMeter').value||0),cost:Number(document.getElementById('boEqServiceCost').value||0),vendorId:document.getElementById('boEqServiceVendor').value,nextServiceDate:document.getElementById('boEqServiceDate').value,nextServiceMeter:Number(document.getElementById('boEqServiceNextMeter').value||0),returnToService:document.getElementById('boEqReturnService').checked,notes:document.getElementById('boEqServiceNotes').value})});showToast('Maintenance recorded. Nothing was posted to accounting.');boEquipmentUiOpen();}catch(error){showToast(error.message||String(error),true);}};
  window.boEquipmentUiAssignmentBoard=window.boEquipmentUiOpen;
  window.boEquipmentUiServiceBoard=window.boEquipmentUiOpen;
  window.boControlUiRoute=async function(route){if(route==='equipment'||route==='control:equipment')return boEquipmentUiOpen();return baseRoute(route);};
})();
</script>
